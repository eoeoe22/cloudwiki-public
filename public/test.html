<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Test Collapsible Headings</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="test-container" class="wiki-content" style="padding: 50px;">
      <h1>Heading 1</h1>
      <p>Level 1 content</p>
      <h2>Heading 2</h2>
      <p>Level 2 content</p>
      <h3>Heading 3</h3>
      <p>Level 3 content</p>
      <h4>Heading 4</h4>
      <p>Level 4 content</p>
      <h5>Heading 5</h5>
      <p>Level 5 content</p>
      <h6>Heading 6</h6>
      <p>Level 6 content</p>
      <h5>Heading 5 Again</h5>
      <p>Level 5 Another content</p>
  </div>

  <script src="/js/common.js"></script>
  <script>
      document.addEventListener('DOMContentLoaded', () => {
          const container = document.getElementById('test-container');
          window.makeCollapsibleSections(container);
      });
  </script>
</body>
</html>
