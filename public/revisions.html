<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title class="app-wiki-name">편집 이력 - CloudWiki</title>
  <link rel="icon" id="wiki-favicon" href="/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800;900&family=Inter:wght@400;500;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <!-- 테마 FOUC 방지: CSS 로드 후 즉시 테마 적용 -->
  <script>try{var t=localStorage.getItem('themeMode');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
  <link rel="stylesheet" href="/render.css">
  <link rel="stylesheet" href="/css/diff.css">
</head>

<body style="-webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;">

  <!-- ── 네비게이션 바 Placeholder ── -->
  <div id="app-header-placeholder"></div>

  <!-- ── 메인 레이아웃 ── -->
  <div class="wiki-layout">
    <div class="wiki-container">
      <!-- 로딩 -->
      <div id="loading" class="wiki-loading">
        <div class="spinner-border text-primary" role="status"></div>
        <span>불러오는 중...</span>
      </div>

      <!-- 리비전 본문 보기 -->
      <div id="revisionViewPage" class="d-none">
        <div class="alert alert-warning py-2 px-3 mb-0 d-flex align-items-center justify-content-between"
          style="position: sticky; top: 0; z-index: 100; border-radius: 0; border-left: none; border-right: none; margin-left: calc(-1 * var(--wiki-container-padding, 1.5rem)); margin-right: calc(-1 * var(--wiki-container-padding, 1.5rem));">
          <span><i class="bi bi-clock-history me-2"></i><strong id="revisionViewLabel"></strong></span>
          <div class="d-flex gap-2">
            <button id="rawViewBtn" class="btn btn-sm btn-outline-secondary btn-icon-collapse" onclick="toggleRawView()">
              <i class="bi bi-code"></i><span class="btn-collapse-text"> Raw</span>
            </button>
            <button class="btn btn-sm btn-warning btn-icon-collapse" onclick="backToRevisions()">
              <i class="bi bi-arrow-left"></i><span class="btn-collapse-text"> 목록으로</span>
            </button>
          </div>
        </div>
        <div class="wiki-article">
          <h1 class="wiki-article-title" id="revisionViewTitle"></h1>
          <div class="wiki-content" id="revisionViewContent"></div>
        </div>
      </div>

      <!-- 리비전 목록 -->
      <div id="revisionsPage" class="d-none">
        <div class="wiki-article" style="width: 100%; max-width: 100vw; overflow-x: hidden;">
          <h2 class="text-break"><i class="bi bi-clock-history"></i> 편집 이력: <span id="revPageTitle"></span></h2>
          <div class="table-responsive"
            style="width: 100%; max-width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch;">
            <div class="revision-list" id="revisionsList" style="min-width: 800px; width: max-content;"></div>
          </div>
          <nav id="revisionsPagination" class="mt-3 d-none" aria-label="편집 이력 페이지네이션">
            <ul class="pagination justify-content-center flex-wrap" id="revisionsPaginationList"></ul>
          </nav>
          <a id="revBackLink" href="#" class="btn btn-wiki-outline mt-3">
            <i class="bi bi-arrow-left"></i> 문서로 돌아가기
          </a>
        </div>
      </div>
    </div>

    <!-- 오른쪽 사이드바 (PC 전용 오프캔버스 컨테이너 및 최근 변경) -->
    <aside class="wiki-sidebar" id="wikiSidebar">
      <div id="app-sidebar-placeholder"></div>

      <!-- 실시간 트렌딩 (PC/모바일 공통) -->
      <div class="mb-4">
        <div class="sidebar-section">
          <h6 class="sidebar-title d-flex justify-content-between align-items-center mb-2">
            <span><i class="bi bi-graph-up-arrow text-danger"></i> 실시간 트렌딩</span>
            <a href="#" class="small text-muted text-decoration-none trending-expand-btn" style="font-size: 0.8rem;">펼치기
              <i class="bi bi-chevron-down"></i></a>
          </h6>
          <div class="position-relative overflow-hidden trending-ticker-wrapper" style="height: 38px;">
            <div id="trendingListPc" class="trending-container trending-ticker-list">
              <div class="placeholder-glow px-2 py-2">
                <span class="placeholder w-100 d-block" style="height: 1.5rem; border-radius: 4px;"></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- PC 전용 최근 변경 -->
      <div class="d-none d-lg-block">
        <div class="sidebar-section sidebar-section-pc-only">
          <h6 class="sidebar-title"><i class="bi bi-clock-history"></i> 최근 변경</h6>
          <div id="recentChangesListPc" class="recent-changes-list recent-changes-container">
            <div class="placeholder-glow">
              <span class="placeholder w-100 d-block mb-2" style="height: 2.5rem; border-radius: 6px;"></span>
              <span class="placeholder w-100 d-block mb-2" style="height: 2.5rem; border-radius: 6px;"></span>
              <span class="placeholder w-100 d-block" style="height: 2.5rem; border-radius: 6px;"></span>
            </div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <!-- ── 푸터 Placeholder ── -->
  <div id="app-footer-placeholder"></div>

  <!-- ── Scripts ── -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@18.0.3/lib/marked.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.2/dist/purify.min.js"></script>

  <script type="module" src="/dist/common.js"></script>
  <script type="module" src="/dist/render.js"></script>
  <script>
    // ── 전역 상태 ──
    let currentSlug = null;
    let isPageDeleted = false;
    const REV_PAGE_SIZE = 10;
    let currentRevPage = 1;
    let totalRevPages = 0;
    let currentRevisionRawContent = '';
    let currentRevisionSlug = '';
    let isRawView = false;
    let isExtensionData = false;

    // 편집 요약 어디에 있든 [+N줄 -M줄] / [+N줄] / [-M줄] 토큰을 초록/빨강으로 색칠.
    // 토큰 사이의 일반 텍스트는 escapeHtml 로 안전하게 인코딩하고, 토큰 자체는
    // \d/+/-/줄/공백/[] 만으로 구성되어 있어 그대로 합성해도 안전하다.
    // [MCP] 접두(admin-mcp.ts 가 부여)는 플러그 아이콘으로 치환해 사람 편집과 구분.
    function renderRevisionSummary(raw) {
      if (!raw) return '(요약 없음)';
      let body = raw;
      let mcpIcon = '';
      const mcpMatch = body.match(/^\s*\[MCP\]\s*/);
      if (mcpMatch) {
        mcpIcon = '<i class="bi bi-plug-fill text-primary me-1" title="[MCP]" aria-label="[MCP]"></i>';
        body = body.slice(mcpMatch[0].length);
      }
      const tokenRe = /\[(?:\+\d+줄(?: -\d+줄)?|-\d+줄)\]/g;
      let html = '';
      let last = 0;
      let m;
      while ((m = tokenRe.exec(body)) !== null) {
        html += escapeHtml(body.slice(last, m.index));
        html += m[0]
          .replace(/\+(\d+)줄/, '<span class="text-success">+$1줄</span>')
          .replace(/-(\d+)줄/, '<span class="text-danger">-$1줄</span>');
        last = m.index + m[0].length;
      }
      html += escapeHtml(body.slice(last));
      return mcpIcon + html;
    }

    // ── URL에서 slug 추출 ──
    function extractSlug() {
      const path = window.location.pathname;
      if (!path.startsWith('/w/')) return null;
      try { return decodeURIComponent(path.substring(3)); } catch { return path.substring(3); }
    }

    // ── 초기화 ──
    document.addEventListener('DOMContentLoaded', async () => {
      await loadConfig();
      await checkAuth();
      currentSlug = extractSlug();
      if (currentSlug) {
        await showRevisions(currentSlug);
        // URL의 ?diff=<revId> 파라미터가 있으면 즉시 diff 모달 표시
        const diffParam = new URLSearchParams(window.location.search).get('diff');
        const diffRevId = diffParam ? Number(diffParam) : NaN;
        if (Number.isInteger(diffRevId) && diffRevId > 0) {
          showDiff(currentSlug, diffRevId);
        }
      } else {
        document.getElementById('loading').classList.add('d-none');
        Swal.fire('오류', '문서를 찾을 수 없습니다.', 'error');
      }
      loadTrending();
      loadRecentChanges();
    });

    // ── 리비전 목록 ──
    async function showRevisions(slug, page = 1) {
      try {
        const isFirstLoad = totalRevPages === 0 && currentRevPage === 1;
        if (isFirstLoad) {
          document.getElementById('loading').classList.remove('d-none');
          document.getElementById('revisionsPage').classList.add('d-none');
        }

        const offset = (page - 1) * REV_PAGE_SIZE;
        const res = await fetch(`/api/w/${encodeURIComponent(slug)}/revisions?offset=${offset}&limit=${REV_PAGE_SIZE}`);
        if (!res.ok) throw new Error('리비전 로딩 실패');

        const data = await res.json();

        if (isFirstLoad) {
          const pageRes = await fetch(`/api/w/${encodeURIComponent(slug)}`);
          const pageData = pageRes.ok ? await pageRes.json() : null;
          isPageDeleted = !!pageData?.deleted_at;

          document.getElementById('revPageTitle').textContent = pageData?.slug || slug;
          document.getElementById('revBackLink').href = `/w/${encodeURIComponent(slug)}`;

          document.title = `편집 이력 - ${pageData?.slug || slug} - ${appConfig.wikiName}`;
        }

        currentRevPage = page;
        totalRevPages = Math.max(1, Math.ceil((data.total || 0) / REV_PAGE_SIZE));

        // 리비전이 삭제되어 범위를 벗어난 페이지를 요청한 경우 마지막 페이지로 이동
        if (data.revisions.length === 0 && data.total > 0) {
          showRevisions(slug, totalRevPages);
          return;
        }

        const listEl = document.getElementById('revisionsList');
        const itemsHtml = data.revisions.map((rev, idx) => {
          const isLatest = page === 1 && idx === 0;
          const date = new Date(rev.created_at * 1000).toLocaleString('ko-KR');
          return `
            <div class="revision-item${isLatest ? ' is-current' : ''} d-flex align-items-center justify-content-between border-bottom py-2">
              <div class="d-flex align-items-center gap-3 flex-grow-1">
                <span class="revision-date text-muted small" style="min-width: 160px;">${date}</span>
                ${rev.author_id ? `<a href="${rev.author_role === 'deleted' ? '/404' : '/profile/' + rev.author_id}" class="revision-author badge bg-light text-dark border text-decoration-none">${escapeHtml(rev.author_name || '알 수 없음')}${renderUserRoleIcon(rev.author_role)}</a>` : `<span class="revision-author badge bg-light text-dark border">${escapeHtml(rev.author_name || '알 수 없음')}${renderUserRoleIcon(rev.author_role)}</span>`}
                ${isLatest ? '<span class="badge text-bg-warning" style="font-size: 0.7em; flex-shrink: 0;">현재 버전</span>' : ''}
                <span class="revision-summary">${renderRevisionSummary(rev.summary)}</span>
              </div>
              <div class="d-flex gap-2 ms-2" style="white-space: nowrap;">
                <button class="btn btn-rev-action btn-rev-view" data-slug="${escapeHtml(slug)}" data-id="${rev.id}" data-page-version="${rev.page_version ?? ''}" onclick="viewRevision(this.dataset.slug, +this.dataset.id, this.dataset.pageVersion)">
                  <i class="bi bi-file-text"></i> 보기
                </button>
                <button class="btn btn-rev-action btn-rev-diff" data-slug="${escapeHtml(slug)}" data-id="${rev.id}" onclick="showDiff(this.dataset.slug, +this.dataset.id)">
                  <i class="bi bi-file-diff"></i> 비교
                </button>
                <button class="btn btn-rev-action btn-rev-revert" data-slug="${escapeHtml(slug)}" data-id="${rev.id}" data-page-version="${rev.page_version ?? ''}" onclick="confirmRevert(this.dataset.slug, +this.dataset.id, this.dataset.pageVersion)" ${isPageDeleted ? 'disabled title="삭제된 문서는 되돌릴 수 없습니다. 먼저 복원하세요."' : ''}>
                  <i class="bi bi-arrow-counterclockwise"></i> 되돌리기
                </button>
              </div>
            </div>
          `;
        }).join('');

        listEl.innerHTML = itemsHtml || '<div class="text-center text-muted py-5"><i class="bi bi-inbox fs-1 d-block mb-2"></i>편집 이력이 없습니다.</div>';

        renderRevisionsPagination();

        document.getElementById('loading').classList.add('d-none');
        document.getElementById('revisionsPage').classList.remove('d-none');
        initRoleIconPopovers(listEl);

      } catch (err) {
        console.error(err);
        document.getElementById('loading').classList.add('d-none');
        Swal.fire('오류', '리비전 목록을 불러오는 데 실패했습니다.', 'error');
      }
    }

    // ── 페이지네이션 렌더링 ──
    function renderRevisionsPagination() {
      const nav = document.getElementById('revisionsPagination');
      const ul = document.getElementById('revisionsPaginationList');

      if (totalRevPages <= 1) {
        nav.classList.add('d-none');
        ul.innerHTML = '';
        return;
      }

      nav.classList.remove('d-none');

      const pages = new Set([1, totalRevPages]);
      for (let i = Math.max(2, currentRevPage - 2); i <= Math.min(totalRevPages - 1, currentRevPage + 2); i++) {
        pages.add(i);
      }
      const sortedPages = [...pages].sort((a, b) => a - b);

      let html = `<li class="page-item ${currentRevPage === 1 ? 'disabled' : ''}">
        <a class="page-link" href="#" ${currentRevPage === 1 ? 'tabindex="-1" aria-disabled="true"' : ''} onclick="event.preventDefault(); goToRevPage(${currentRevPage - 1})">이전</a>
      </li>`;

      let prev = 0;
      for (const p of sortedPages) {
        if (prev && p - prev > 1) {
          html += `<li class="page-item disabled"><span class="page-link">…</span></li>`;
        }
        html += `<li class="page-item ${p === currentRevPage ? 'active' : ''}">
          <a class="page-link" href="#" ${p === currentRevPage ? 'aria-current="page"' : ''} onclick="event.preventDefault(); goToRevPage(${p})">${p}</a>
        </li>`;
        prev = p;
      }

      html += `<li class="page-item ${currentRevPage === totalRevPages ? 'disabled' : ''}">
        <a class="page-link" href="#" ${currentRevPage === totalRevPages ? 'tabindex="-1" aria-disabled="true"' : ''} onclick="event.preventDefault(); goToRevPage(${currentRevPage + 1})">다음</a>
      </li>`;

      ul.innerHTML = html;
    }

    // ── 페이지 이동 ──
    function goToRevPage(page) {
      if (page < 1 || page > totalRevPages || page === currentRevPage) return;
      if (!currentSlug) return;
      showRevisions(currentSlug, page);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ── 리비전 보기 ──
    async function viewRevision(slug, revId, pageVersion) {
      try {
        const res = await fetch(`/api/w/${encodeURIComponent(slug)}/revisions/${revId}`);
        if (!res.ok) throw new Error('리비전 불러오기 실패');
        const rev = await res.json();

        currentRevisionRawContent = rev.content || '';
        currentRevisionSlug = slug;
        isRawView = false;

        const versionLabel = (pageVersion !== '' && pageVersion != null) ? `v${pageVersion}` : `#${revId}`;
        let revDate = '';
        if (rev.created_at) {
          const d = new Date(rev.created_at * 1000);
          revDate = `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
        }
        document.getElementById('revisionViewLabel').textContent = revDate
          ? `${revDate} ${versionLabel} 리비전 열람 중입니다.`
          : `${versionLabel} 리비전 열람 중입니다.`;
        document.getElementById('revisionViewTitle').textContent = document.getElementById('revPageTitle').textContent || slug;
        document.getElementById('revisionViewContent').innerHTML = '';

        // 익스텐션 데이터 문서는 렌더링 비활성화
        const decodedSlugForExt = decodeURIComponent(slug);
        const enabledExts = (appConfig && appConfig.enabledExtensions) || [];
        const extPrefix = enabledExts.find(ext => decodedSlugForExt.startsWith(ext + ':'));
        isExtensionData = !!extPrefix;

        const rawBtn = document.getElementById('rawViewBtn');
        if (rawBtn) {
          rawBtn.style.display = isExtensionData ? 'none' : '';
          rawBtn.innerHTML = '<i class="bi bi-code"></i><span class="btn-collapse-text"> Raw</span>';
          rawBtn.classList.remove('btn-secondary');
          rawBtn.classList.add('btn-outline-secondary');
        }

        if (extPrefix) {
          document.getElementById('revisionViewContent').innerHTML = `<div class="wiki-ext-raw-data">
            <div class="wiki-ext-raw-badge"><i class="bi bi-database"></i> ${escapeHtml(extPrefix)} 익스텐션 데이터</div>
            <pre class="wiki-ext-raw-pre">${escapeHtml(rev.content || '')}</pre>
          </div>`;
        } else {
          await renderWikiContent(rev.content || '', slug, 'revisionViewContent');
        }

        document.getElementById('revisionsPage').classList.add('d-none');
        document.getElementById('revisionViewPage').classList.remove('d-none');
        window.scrollTo({ top: 0, behavior: 'instant' });
      } catch (err) {
        Swal.fire('오류', err.message, 'error');
      }
    }

    function backToRevisions() {
      document.getElementById('revisionViewPage').classList.add('d-none');
      document.getElementById('revisionsPage').classList.remove('d-none');
      window.scrollTo({ top: 0, behavior: 'instant' });
    }

    // ── Raw 보기 토글 ──
    async function toggleRawView() {
      if (isExtensionData) return;
      isRawView = !isRawView;
      const contentEl = document.getElementById('revisionViewContent');
      const rawBtn = document.getElementById('rawViewBtn');
      if (isRawView) {
        contentEl.innerHTML = `<pre class="wiki-ext-raw-pre">${escapeHtml(currentRevisionRawContent)}</pre>`;
        rawBtn.innerHTML = '<i class="bi bi-eye"></i><span class="btn-collapse-text"> 렌더링</span>';
        rawBtn.classList.remove('btn-outline-secondary');
        rawBtn.classList.add('btn-secondary');
      } else {
        contentEl.innerHTML = '';
        await renderWikiContent(currentRevisionRawContent, currentRevisionSlug, 'revisionViewContent');
        rawBtn.innerHTML = '<i class="bi bi-code"></i><span class="btn-collapse-text"> Raw</span>';
        rawBtn.classList.remove('btn-secondary');
        rawBtn.classList.add('btn-outline-secondary');
      }
    }

    // ── 리비전 Diff 보기 ──
    // diff 보기 모드: 'rendered'(렌더링 비교, 기본) | 'raw'(텍스트 줄 단위 비교)
    function getDiffViewMode() {
      try {
        const v = localStorage.getItem('revisionDiffMode');
        return v === 'raw' ? 'raw' : 'rendered';
      } catch { return 'rendered'; }
    }
    function setDiffViewMode(mode) {
      try { localStorage.setItem('revisionDiffMode', mode); } catch { /* ignore */ }
    }

    async function showDiff(slug, revId) {
      try {
        const res = await fetch(`/api/w/${encodeURIComponent(slug)}/revisions/${revId}/diff`);
        if (!res.ok) throw new Error('Diff 불러오기 실패');
        const data = await res.json();

        const oldText = data.old_content || '';
        const newText = data.new_content || '';
        const oldLabel = data.old_revision_id
          ? (data.old_page_version != null ? `v${data.old_page_version}` : `#${data.old_revision_id}`)
          : '(없음)';
        const newLabel = data.new_page_version != null ? `v${data.new_page_version}` : `#${data.new_revision_id}`;

        // 익스텐션 데이터 슬러그(예: freq:foo) 는 본문이 마크다운이 아니라
        // 구조화된 데이터 payload 이므로 위키 렌더 결과는 의미 없는 출력이
        // 되어 실제 데이터 변경을 가린다. viewRevision 의 동일 검사를
        // 재사용하여 Raw 비교만 노출.
        //
        // 주의: 호출자(extractSlug / data-slug)가 이미 decode 한 슬러그를
        // 넘긴다. 여기서 또 decodeURIComponent 하면 제목에 리터럴 % 가 포함된
        // 경우 (예: "100% guide") URIError 로 실패하므로 그대로 사용.
        const enabledExts = (appConfig && appConfig.enabledExtensions) || [];
        const isExtensionDataDiff = enabledExts.some((ext) => slug.startsWith(ext + ':'));

        let mode = isExtensionDataDiff ? 'raw' : getDiffViewMode();
        let renderedCache = null; // 위키 렌더 결과는 비용이 크므로 모드 토글 간 캐시
        let renderToken = 0; // 비동기 렌더 도중 모드가 바뀐 경우 결과 폐기용
        let renderChain = Promise.resolve(); // 토글 빠른 클릭 시 buildRichDiffHtml 동시 실행 방지

        const toggleHtml = (m) => {
          // 익스텐션 데이터 슬러그는 렌더링 비교가 무의미하므로 토글을 숨김
          if (isExtensionDataDiff) return '';
          return `
          <div class="diff-mode-toggle btn-group btn-group-sm" role="group" aria-label="diff 모드">
            <button type="button" class="btn ${m === 'rendered' ? 'btn-primary' : 'btn-outline-secondary'}" data-diff-mode="rendered">
              <i class="bi bi-eye"></i> 렌더링 비교
            </button>
            <button type="button" class="btn ${m === 'raw' ? 'btn-primary' : 'btn-outline-secondary'}" data-diff-mode="raw">
              <i class="bi bi-code"></i> Raw 비교
            </button>
          </div>`;
        };

        const loadingHtml = '<div class="text-center text-muted py-4"><div class="spinner-border spinner-border-sm me-2"></div>렌더링 중...</div>';

        Swal.fire({
          title: `리비전 비교: ${oldLabel} → ${newLabel}`,
          html: `${toggleHtml(mode)}<div id="diffBodyContainer">${loadingHtml}</div>`,
          width: '1100px',
          showCloseButton: true,
          confirmButtonText: '닫기',
          didOpen: async (popup) => {
            const renderInto = (target) => {
              const token = ++renderToken;
              const body = popup.querySelector('#diffBodyContainer');
              if (!body) return;

              // Raw 비교는 전체가 동기 + 캐시된 데이터만 사용한다. 진행 중인
              // rich 빌드 대기열에 묶지 않고 즉시 표시해, 무거운 rendered 빌드
              // 중에도 사용자가 Raw 폴백으로 빠르게 전환할 수 있게 한다.
              // renderToken 증가 덕분에, 큐에서 깨어난 stale rendered 작업은
              // body 를 다시 덮어쓰지 않는다.
              if (target === 'raw') {
                body.innerHTML = `<div class="diff-container">${computeLineDiff(oldText, newText)}</div>`;
                return;
              }
              if (renderedCache !== null) {
                body.innerHTML = renderedCache;
                return;
              }

              // 캐시 미스인 rendered 빌드만 chain 에 직렬화 — buildRichDiffHtml
              // 의 staging 노드가 같은 modal 안에서 한 번에 하나만 존재하도록.
              body.innerHTML = loadingHtml;
              renderChain = renderChain.catch(() => {}).then(async () => {
                if (token !== renderToken) return; // 사용자가 그 사이 raw 로 전환
                const built = await buildRichDiffHtml(oldText, newText, slug);
                if (token !== renderToken) return; // 빌드 도중 또 바뀜
                renderedCache = `<div class="rich-diff-container wiki-content">${built}</div>`;
                const body2 = popup.querySelector('#diffBodyContainer');
                if (body2) body2.innerHTML = renderedCache;
              });
            };

            popup.querySelectorAll('.diff-mode-toggle [data-diff-mode]').forEach((btn) => {
              btn.addEventListener('click', () => {
                const next = btn.getAttribute('data-diff-mode');
                if (!next || next === mode) return;
                mode = next;
                setDiffViewMode(mode);
                popup.querySelectorAll('.diff-mode-toggle [data-diff-mode]').forEach((b) => {
                  const isActive = b.getAttribute('data-diff-mode') === mode;
                  b.classList.toggle('btn-primary', isActive);
                  b.classList.toggle('btn-outline-secondary', !isActive);
                });
                renderInto(mode);
              });
            });

            renderInto(mode);
          }
        });
      } catch (err) {
        Swal.fire('오류', err.message, 'error');
      }
    }

    // ── 라인 단위 LCS diff 연산 (raw/rendered 공통) ──
    // 변경된 줄과 동일한 줄을 시간순으로 나열한 ops 배열을 반환한다.
    function _lcsLineOps(oldText, newText) {
      const oldLines = oldText.split('\n');
      const newLines = newText.split('\n');
      const m = oldLines.length, n = newLines.length;
      const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          if (oldLines[i - 1] === newLines[j - 1]) {
            dp[i][j] = dp[i - 1][j - 1] + 1;
          } else {
            dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
          }
        }
      }
      const ops = [];
      let i = m, j = n;
      while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && oldLines[i - 1] === newLines[j - 1]) {
          ops.unshift({ type: 'same', text: oldLines[i - 1] });
          i--; j--;
        } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
          ops.unshift({ type: 'add', text: newLines[j - 1] });
          j--;
        } else {
          ops.unshift({ type: 'del', text: oldLines[i - 1] });
          i--;
        }
      }
      return ops;
    }

    // ── 렌더링(rich) diff: GitHub 의 마크다운 rich diff 와 유사하게,
    // OLD/NEW 본문을 각각 한 번씩만 위키 렌더 파이프라인(renderWikiContent)에
    // 통과시킨 뒤, 결과 DOM 의 최상위 블록(자식 요소)을 LCS 로 정렬해
    // 추가/삭제/유지 블록을 색상 라인으로 나열한다. 트랜스클루전·푸트노트·
    // 팔레트·색 토큰·타임스탬프 등 위키 자체 문법이 그대로 적용된다.
    //
    // 각 그룹마다 renderWikiContent 를 호출하지 않는 이유:
    //   1) renderWikiContent 는 컨테이너 ID 별로 setInterval(타이머 익스텐션)
    //      을 등록하므로, 일회성 ID 를 매번 새로 만들면 detached 노드를 가진
    //      orphan interval 이 누적된다. 호출 종료 시 같은 ID 로 빈 본문을 다시
    //      렌더해 _initTimers 가 직전 setInterval 을 clearInterval 하도록 한다.
    //   2) resolveTransclusions 는 호출마다 신규 캐시를 만들어 같은 틀을
    //      반복 fetch 한다. 호출 횟수를 그룹 수(N) 가 아닌 2 회로 줄인다.
    let _rdiffSeq = 0;

    function _normalizeBlockKey(el) {
      // 비교용 키: 순서/카운터에 따라 변하는 동적 속성을 정규화한다.
      // 정규화 대상:
      //   - heading 섹션 앵커: id="s-1.2", 별도 anchor span
      //   - footnote: render.ts 의 processFootnotes 가 호출별 uniqueId 를
      //     섞어 id="fn-${i}-${uniqueId}" / "fn-ref-${i}-${uniqueId}" 를
      //     생성하므로, OLD/NEW 가 같은 내용이라도 id 가 달라진다. 두 prefix
      //     를 모두 정규화.
      //   - TOC: id="toc-*"
      //   - 위키 :::tabs / :::accordion (render.ts 의 _nextWikiBsId): 모듈 전역
      //     카운터로 매 호출마다 wiki-tabs-N / wiki-acc-N 이 증가하므로 OLD/NEW
      //     렌더에서 ID 가 달라 같은 내용이 false-positive 변경으로 잡힌다.
      //     id / aria-controls / aria-labelledby / data-bs-target /
      //     data-bs-parent / href 의 매칭 값을 모두 제거해 비교에서 무시.
      const DYNAMIC_ID_RE = /^(s-[\d.]+|fn-|fnref-|toc-|wiki-tabs-|wiki-acc-)/;
      const stripCrossRef = (n, attr) => {
        const v = n.getAttribute(attr);
        if (!v) return;
        const id = v.replace(/^#/, '');
        if (DYNAMIC_ID_RE.test(id)) n.removeAttribute(attr);
      };

      const clone = el.cloneNode(true);
      clone.querySelectorAll('.wiki-section-anchor').forEach((n) => n.remove());

      // querySelectorAll 은 root 를 포함하지 않으므로 root + descendants 양쪽
      // 모두 순회해야 한다. (예: 최상위 블록이 <h2 id="s-1.2"> 인 경우)
      const all = [clone, ...clone.querySelectorAll('*')];
      for (const n of all) {
        const id = n.getAttribute && n.getAttribute('id');
        if (id && DYNAMIC_ID_RE.test(id)) n.removeAttribute('id');
      }
      clone.querySelectorAll('[aria-controls]').forEach((n) => stripCrossRef(n, 'aria-controls'));
      if (clone.hasAttribute && clone.hasAttribute('aria-controls')) stripCrossRef(clone, 'aria-controls');
      clone.querySelectorAll('[aria-labelledby]').forEach((n) => stripCrossRef(n, 'aria-labelledby'));
      if (clone.hasAttribute && clone.hasAttribute('aria-labelledby')) stripCrossRef(clone, 'aria-labelledby');
      clone.querySelectorAll('[data-bs-target]').forEach((n) => stripCrossRef(n, 'data-bs-target'));
      if (clone.hasAttribute && clone.hasAttribute('data-bs-target')) stripCrossRef(clone, 'data-bs-target');
      clone.querySelectorAll('[data-bs-parent]').forEach((n) => stripCrossRef(n, 'data-bs-parent'));
      if (clone.hasAttribute && clone.hasAttribute('data-bs-parent')) stripCrossRef(clone, 'data-bs-parent');
      // 푸트노트/탭/아코디언 anchor href 도 매칭 시 제거 (root 가 <a> 인 케이스 포함)
      clone.querySelectorAll('a[href^="#"]').forEach((n) => stripCrossRef(n, 'href'));
      if (clone.tagName === 'A' && (clone.getAttribute('href') || '').startsWith('#')) {
        stripCrossRef(clone, 'href');
      }

      return clone.outerHTML;
    }

    function _lcsBlockOps(oldKeys, newKeys, oldHtmls, newHtmls) {
      const m = oldKeys.length, n = newKeys.length;
      const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          if (oldKeys[i - 1] === newKeys[j - 1]) dp[i][j] = dp[i - 1][j - 1] + 1;
          else dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
        }
      }
      const ops = [];
      let i = m, j = n;
      while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && oldKeys[i - 1] === newKeys[j - 1]) {
          ops.unshift({ type: 'same', html: newHtmls[j - 1] });
          i--; j--;
        } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
          ops.unshift({ type: 'add', html: newHtmls[j - 1] });
          j--;
        } else {
          ops.unshift({ type: 'del', html: oldHtmls[i - 1] });
          i--;
        }
      }
      return ops;
    }

    async function buildRichDiffHtml(oldText, newText, slug) {
      if ((oldText || '') === (newText || '')) {
        return '<div class="diff-empty">변경된 내용이 없습니다.</div>';
      }

      const canRenderWiki = typeof window.renderWikiContent === 'function';
      const canSanitize = !!(window.DOMPurify && typeof window.DOMPurify.sanitize === 'function');

      // 호출별 unique ID — 모달 빠른 닫힘/재열림으로 두 buildRichDiffHtml 가
      // 겹쳐도 동일 id 의 div 가 DOM 에 공존하지 않도록 한다 (getElementById
      // 가 다른 호출의 staging 노드를 잘못 매칭하는 race 방지).
      const seq = ++_rdiffSeq;
      const oldId = `__rdiff_stage_old_${seq}__`;
      const newId = `__rdiff_stage_new_${seq}__`;

      const stage = document.createElement('div');
      stage.setAttribute('aria-hidden', 'true');
      stage.style.cssText = 'position:absolute;left:-99999px;top:0;width:0;height:0;overflow:hidden;';
      document.body.appendChild(stage);

      const oldDiv = document.createElement('div');
      oldDiv.id = oldId;
      oldDiv.className = 'wiki-content';
      const newDiv = document.createElement('div');
      newDiv.id = newId;
      newDiv.className = 'wiki-content';
      stage.appendChild(oldDiv);
      stage.appendChild(newDiv);

      try {
        if (canRenderWiki) {
          // 위키 렌더 파이프라인을 OLD/NEW 각 1회씩만 통과 — 트랜스클루전 캐시
          // 중복과 그룹별 setInterval 누적 문제를 회피.
          //
          // 두 호출을 직렬화하는 이유: render.ts 의 _wikiExtensionData 는 모듈
          // 전역으로, resolveTransclusions 가 호출 시점에 [] 로 리셋하고 진행
          // 중 push 한다. Promise.all 로 동시에 돌리면 두 호출의 ext 데이터가
          // 인터리브되어 placeholder-index 가 어긋나 익스텐션 출력이 깨질 수
          // 있다 (스냅샷은 resolveTransclusions 완료 직후에만 안전).
          if ((oldText || '').trim()) {
            try { await window.renderWikiContent(oldText || '', slug, oldId); }
            catch { /* noop */ }
          }
          if ((newText || '').trim()) {
            try { await window.renderWikiContent(newText || '', slug, newId); }
            catch { /* noop */ }
          }

          // 익스텐션 렌더는 _processExtensions 가 setTimeout 폴링으로 늦게
          // 완료될 수 있다. 양쪽 컨테이너에 미완료 .wiki-ext 가 있으면 잠깐
          // 대기 (cap 500ms) — 익스텐션이 없는 문서는 즉시 통과해 비용 없음.
          const SETTLE_CAP_MS = 500;
          const SETTLE_POLL_MS = 50;
          const pendingExt = () =>
            oldDiv.querySelectorAll('.wiki-ext:not([data-ext-rendered="1"])').length +
            newDiv.querySelectorAll('.wiki-ext:not([data-ext-rendered="1"])').length;
          const settleStart = Date.now();
          while (pendingExt() > 0 && Date.now() - settleStart < SETTLE_CAP_MS) {
            await new Promise((r) => setTimeout(r, SETTLE_POLL_MS));
          }
        } else if (canSanitize && window.marked && typeof window.marked.parse === 'function') {
          try { oldDiv.innerHTML = window.DOMPurify.sanitize(window.marked.parse(oldText || '')); }
          catch { oldDiv.innerHTML = `<pre>${escapeHtml(oldText || '')}</pre>`; }
          try { newDiv.innerHTML = window.DOMPurify.sanitize(window.marked.parse(newText || '')); }
          catch { newDiv.innerHTML = `<pre>${escapeHtml(newText || '')}</pre>`; }
        } else {
          // DOMPurify 미정의: raw marked 출력 주입 금지 → escape 한 평문 폴백
          oldDiv.innerHTML = `<pre>${escapeHtml(oldText || '')}</pre>`;
          newDiv.innerHTML = `<pre>${escapeHtml(newText || '')}</pre>`;
        }

        const oldEls = Array.from(oldDiv.children);
        const newEls = Array.from(newDiv.children);
        const oldHtmls = oldEls.map((el) => el.outerHTML);
        const newHtmls = newEls.map((el) => el.outerHTML);
        const oldKeys = oldEls.map((el) => _normalizeBlockKey(el));
        const newKeys = newEls.map((el) => _normalizeBlockKey(el));

        const ops = _lcsBlockOps(oldKeys, newKeys, oldHtmls, newHtmls);
        if (ops.length === 0 || !ops.some((o) => o.type !== 'same')) {
          return '<div class="diff-empty">변경된 내용이 없습니다.</div>';
        }

        const parts = [];
        for (const op of ops) {
          parts.push(`<div class="rich-diff-block rich-diff-${op.type}">${op.html}</div>`);
        }
        return parts.join('');
      } finally {
        // 타이머 정리: 동일 ID 로 빈 본문을 한 번 더 렌더하면 _initTimers 가
        // 직전 setInterval 을 clearInterval 한다 (render.ts 의 _initTimers 참고).
        // unique ID 라 다음 호출에서 자동 정리되지 않으므로 명시적으로 호출.
        if (canRenderWiki) {
          try { await window.renderWikiContent('', slug, oldId); } catch { /* noop */ }
          try { await window.renderWikiContent('', slug, newId); } catch { /* noop */ }
        }
        stage.remove();
      }
    }

    // ── Line-by-line Diff 알고리즘 (LCS 기반, 컨텍스트 축소) ──
    function computeLineDiff(oldText, newText) {
      const result = _lcsLineOps(oldText, newText);

      if (result.length === 0) {
        return '<div class="diff-empty">변경된 내용이 없습니다.</div>';
      }

      // 변경이 없으면 빈 diff
      const hasChange = result.some(r => r.type !== 'same');
      if (!hasChange) {
        return '<div class="diff-empty">변경된 내용이 없습니다.</div>';
      }

      // 변경된 줄 주변 CONTEXT_LINES만 표시, 나머지는 생략
      const CONTEXT = 3;
      const visible = new Set();
      result.forEach((r, idx) => {
        if (r.type !== 'same') {
          for (let k = Math.max(0, idx - CONTEXT); k <= Math.min(result.length - 1, idx + CONTEXT); k++) {
            visible.add(k);
          }
        }
      });

      let rows = '';
      let skipStart = -1;
      for (let idx = 0; idx < result.length; idx++) {
        if (visible.has(idx)) {
          if (skipStart !== -1) {
            const skipCount = idx - skipStart;
            rows += `<tr class="diff-skip"><td class="diff-prefix">⋯</td><td class="diff-line diff-skip-label">${skipCount}줄 생략됨</td></tr>`;
            skipStart = -1;
          }
          const r = result[idx];
          const cls = r.type === 'add' ? 'diff-add' : r.type === 'del' ? 'diff-del' : 'diff-same';
          const prefix = r.type === 'add' ? '+' : r.type === 'del' ? '-' : ' ';
          rows += `<tr class="${cls}"><td class="diff-prefix">${prefix}</td><td class="diff-line">${escapeHtml(r.text || '')}</td></tr>`;
        } else {
          if (skipStart === -1) skipStart = idx;
        }
      }
      if (skipStart !== -1) {
        const skipCount = result.length - skipStart;
        rows += `<tr class="diff-skip"><td class="diff-prefix">⋯</td><td class="diff-line diff-skip-label">${skipCount}줄 생략됨</td></tr>`;
      }

      return '<table class="diff-table">' + rows + '</table>';
    }

    // ── 되돌리기 확인 ──
    async function confirmRevert(slug, revId, pageVersion) {
      if (!currentUser) {
        Swal.fire('로그인 필요', '되돌리기를 하려면 로그인해주세요.', 'info');
        return;
      }

      const versionLabel = (pageVersion !== '' && pageVersion != null) ? `v${pageVersion}` : `#${revId}`;
      const result = await Swal.fire({
        title: '문서 되돌리기',
        text: `정말 리비전 ${versionLabel} 상태로 문서를 되돌리시겠습니까? 현재 내용은 새로운 리비전으로 저장됩니다.`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: '되돌리기',
        cancelButtonText: '취소'
      });

      if (result.isConfirmed) {
        try {
          const res = await fetch(`/api/w/${encodeURIComponent(slug)}/revert`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ revision_id: revId })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '되돌리기 실패');

          Swal.fire('성공', '문서가 되돌려졌습니다.', 'success').then(() => {
            window.location.href = `/w/${encodeURIComponent(slug)}`;
          });
        } catch (err) {
          Swal.fire('오류', err.message, 'error');
        }
      }
    }

  </script>
