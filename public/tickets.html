<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title class="app-wiki-name">티켓 문의 - CloudWiki</title>
  <link rel="icon" id="wiki-favicon" href="/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800;900&family=Inter:wght@400;500;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/render.css">
  <link rel="stylesheet" href="/css/mini-editor.css">
  <link rel="stylesheet" href="/css/image-editor.css">
  <!-- 테마 FOUC 방지: CSS 로드 후 즉시 테마 적용 -->
  <script>try{var t=localStorage.getItem('themeMode');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
  <!-- CodeMirror 6 Import Map (미니 에디터용) -->
  <script type="importmap">
  {
    "imports": {
      "@codemirror/state": "https://esm.sh/@codemirror/state@6.6.0",
      "@codemirror/view": "https://esm.sh/@codemirror/view@6.41.1",
      "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.10.3",
      "@codemirror/language": "https://esm.sh/@codemirror/language@6.12.3",
      "@codemirror/lang-markdown": "https://esm.sh/@codemirror/lang-markdown@6.5.0",
      "@codemirror/language-data": "https://esm.sh/@codemirror/language-data@6.5.2",
      "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.3"
    }
  }
  </script>
  <style>
    /* 모바일에서 햄버거 메뉴 숨김 */
    .navbar-toggler[data-bs-target="#mobileSidebar"] {
      display: none !important;
    }
    /* 댓글 본문 (.wiki-content) 의 마진/여백을 티켓 댓글 카드용으로 조이기 */
    .discussion-comment-body.wiki-content > :first-child { margin-top: 0; }
    .discussion-comment-body.wiki-content > :last-child { margin-bottom: 0; }
    .discussion-comment-body.wiki-content p { margin-bottom: 0.5rem; }
    .discussion-comment-body.wiki-content h1,
    .discussion-comment-body.wiki-content h2,
    .discussion-comment-body.wiki-content h3,
    .discussion-comment-body.wiki-content h4,
    .discussion-comment-body.wiki-content h5,
    .discussion-comment-body.wiki-content h6 {
      font-size: 1.05rem; margin-top: 0.75rem; margin-bottom: 0.4rem;
    }
  </style>
</head>

<body style="-webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;">

  <!-- ── 네비게이션 바 Placeholder ── -->
  <div id="app-header-placeholder"></div>

  <!-- ── 메인 레이아웃 ── -->
  <div class="wiki-layout">
    <div class="wiki-container">
      <!-- 로딩 -->
      <div id="loading" class="wiki-loading">
        <div class="spinner-border text-primary" role="status"></div>
        <span>불러오는 중...</span>
      </div>

      <!-- 티켓 목록 페이지 -->
      <div id="ticketListPage" class="d-none">
        <div class="wiki-article">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2><i class="bi bi-ticket-detailed"></i> 티켓 문의</h2>
            <div class="d-flex gap-2">
              <button class="btn btn-wiki btn-sm d-none" id="newTicketBtn" onclick="showNewTicketForm()">
                <i class="bi bi-plus-lg"></i> 새 문의
              </button>
            </div>
          </div>

          <!-- 필터 영역 -->
          <div class="d-flex flex-wrap gap-2 mb-3 align-items-center">
            <!-- 상태 필터 -->
            <div class="btn-group btn-group-sm" role="group">
              <button type="button" class="btn btn-outline-secondary active"
                onclick="filterTickets(this, 'status', '')">
                전체
              </button>
              <button type="button" class="btn btn-outline-success" onclick="filterTickets(this, 'status', 'open')">
                <i class="bi bi-circle-fill text-success" style="font-size:0.5em"></i> 열림
              </button>
              <button type="button" class="btn btn-outline-danger" onclick="filterTickets(this, 'status', 'closed')">
                <i class="bi bi-circle-fill text-danger" style="font-size:0.5em"></i> 닫힘
              </button>
            </div>

            <!-- 유형 필터 (관리자용) -->
            <select class="form-select form-select-sm d-none" id="typeFilter" style="width: auto; min-width: 120px;"
              onchange="applyTypeFilter()">
              <option value="">유형: 전체</option>
              <option value="general">일반</option>
              <option value="document">문서</option>
              <option value="discussion">토론</option>
              <option value="account">계정</option>
            </select>
          </div>

          <!-- 새 티켓 폼 -->
          <div id="newTicketForm" class="d-none mb-4">
            <div class="card">
              <div class="card-body">
                <h5 class="card-title">새 문의 작성</h5>
                <div class="mb-3">
                  <label class="form-label">문의 유형</label>
                  <select class="form-select" id="newTicketType">
                    <option value="general">일반</option>
                    <option value="document">문서</option>
                    <option value="discussion">토론</option>
                    <option value="account">계정</option>
                  </select>
                </div>
                <div class="mb-3">
                  <input type="text" class="form-control" id="newTicketTitle" placeholder="문의 제목">
                </div>
                <div class="mb-3">
                  <div id="newTicketContent"></div>
                  <!-- 미니 에디터(CM6) 로드 실패 시 fallback. 미니 에디터 마운트 성공 시 숨겨진다. -->
                  <textarea class="form-control" id="newTicketContentFallback" rows="4"
                    placeholder="문의 내용을 입력하세요"></textarea>
                </div>
                <div class="d-flex gap-2">
                  <button class="btn btn-wiki btn-sm" onclick="submitNewTicket()">작성</button>
                  <button class="btn btn-secondary btn-sm"
                    onclick="document.getElementById('newTicketForm').classList.add('d-none')">취소</button>
                </div>
              </div>
            </div>
          </div>

          <div id="ticketsList"></div>

          <!-- 페이지네이션 -->
          <div id="ticketPagination" class="d-none text-center py-3">
            <button class="btn btn-outline-secondary btn-sm" id="loadMoreBtn" onclick="loadMoreTickets()">
              <i class="mdi mdi-arrow-down"></i> 더 불러오기
            </button>
          </div>
        </div>
      </div>

      <!-- 티켓 상세 페이지 -->
      <div id="ticketDetailPage" class="d-none">
        <div class="wiki-article">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 id="ticketTitle"></h2>
            <div class="d-flex gap-2">
              <a href="/tickets" class="btn btn-wiki-outline btn-sm">
                <i class="bi bi-arrow-left"></i> 목록
              </a>
            </div>
          </div>
          <div class="d-flex align-items-center gap-2 mb-3" id="ticketMeta"></div>
          <div class="d-flex gap-2 mb-4" id="ticketActions"></div>

          <div id="commentsList"></div>

          <!-- 댓글 작성 폼 -->
          <div id="commentForm" class="mt-4">
            <div class="card">
              <div class="card-body">
                <h6 class="card-title">댓글 작성</h6>
                <div id="replyQuote" class="d-none mb-2"></div>
                <input type="hidden" id="replyParentId" value="">
                <div class="mb-2">
                  <div id="commentContent"></div>
                  <!-- 미니 에디터 로드 실패 시 fallback -->
                  <textarea class="form-control" id="commentContentFallback" rows="3"
                    placeholder="댓글을 입력하세요"></textarea>
                </div>
                <div class="d-flex gap-2">
                  <button class="btn btn-wiki btn-sm" onclick="submitComment()">작성</button>
                  <button class="btn btn-secondary btn-sm d-none" id="cancelReplyBtn" onclick="cancelReply()">답글
                    취소</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 오른쪽 사이드바 (PC 전용 오프캔버스 컨테이너) -->
    <aside class="wiki-sidebar d-none" id="wikiSidebar">
      <div id="app-sidebar-placeholder"></div>
    </aside>
  </div>

  <!-- ── 푸터 Placeholder ── -->
  <div id="app-footer-placeholder"></div>

  <!-- ── Scripts ── -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24"></script>
  <!-- 위키 문법 렌더링 (marked + DOMPurify + render.js) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@18.0.3/lib/marked.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.2/dist/purify.min.js"></script>
  <script type="module" src="/dist/common.js"></script>
  <script type="module" src="/dist/render.js"></script>
  <script type="module" src="/dist/edit-image.js"></script>
  <script type="module" src="/dist/discussion-edit.js"></script>
  <script>
    // ── 전역 상태 ──
    let currentTicketId = null;
    let currentStatusFilter = '';
    let currentTypeFilter = '';
    let currentPage = 1;
    let allTickets = [];

    // 미니 에디터 핸들 (본문/댓글 두 인스턴스)
    let newTicketEditor = null;
    let commentEditor = null;

    /** 미니 에디터 모듈 로드 대기 */
    async function waitForMiniEditor() {
      for (let i = 0; i < 60 && !window.createMiniEditor; i++) {
        await new Promise(r => setTimeout(r, 50));
      }
      return window.createMiniEditor;
    }

    /** 댓글 본문(=한 row)을 컨테이너에 위키 문법으로 렌더. 트랜스클루전/익스텐션/헤딩번호 비활성.
     *  render.js / 그 CDN 의존성이 로드되지 않은 환경에서는 plain-text(+개행)로 폴백해
     *  본문이 사라지지 않도록 한다. */
    async function renderCommentBody(content, containerId) {
      if (!window.renderWikiContent) {
        const el = document.getElementById(containerId);
        if (el) el.innerHTML = escapeHtml(content || '').replace(/\n/g, '<br>');
        return;
      }
      await window.renderWikiContent(content || '', null, containerId, {
        skipTransclusion: true,
        skipExtensions: true,
        skipHeadingNumbers: true,
      });
    }

    const typeLabels = {
      general: '일반',
      document: '문서',
      discussion: '토론',
      account: '계정'
    };

    const typeBadgeClasses = {
      general: 'bg-primary',
      document: 'bg-info',
      discussion: 'bg-warning text-dark',
      account: 'bg-dark'
    };

    // ── URL 파싱 ──
    function parseUrl() {
      const path = window.location.pathname;
      // /tickets/:id
      let m = path.match(/^\/tickets\/([0-9]+)$/);
      if (m) return { ticketId: Number(m[1]) };
      // /tickets
      if (path === '/tickets') return { ticketId: null };
      return null;
    }

    // ── 초기화 ──
    document.addEventListener('DOMContentLoaded', async () => {
      await loadConfig();
      await checkAuth();

      if (!currentUser) {
        document.getElementById('loading').classList.add('d-none');
        Swal.fire('로그인 필요', '티켓 문의를 이용하려면 로그인해주세요.', 'info').then(() => {
          window.location.href = '/';
        });
        return;
      }

      const parsed = parseUrl();
      if (!parsed) {
        document.getElementById('loading').classList.add('d-none');
        Swal.fire('오류', '잘못된 URL입니다.', 'error');
        return;
      }

      if (parsed.ticketId) {
        showTicketDetail(parsed.ticketId);
      } else {
        showTicketList();
      }
    });

    // ── 유틸리티 ──
    function getRelativeTime(unixTs) {
      const now = Math.floor(Date.now() / 1000);
      const diff = now - unixTs;
      if (diff < 60) return '방금 전';
      if (diff < 3600) return `${Math.floor(diff / 60)}분 전`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}시간 전`;
      if (diff < 604800) return `${Math.floor(diff / 86400)}일 전`;
      return new Date(unixTs * 1000).toLocaleDateString('ko-KR');
    }

    function hideAllPages() {
      document.getElementById('loading').classList.add('d-none');
      document.getElementById('ticketListPage').classList.add('d-none');
      document.getElementById('ticketDetailPage').classList.add('d-none');
    }

    function isAdmin() {
      return currentUser && ['admin', 'super_admin'].includes(currentUser.role);
    }

    function isManagerOrAbove() {
      return currentUser && ['discussion_manager', 'admin', 'super_admin'].includes(currentUser.role);
    }

    // ══════════════════════════════════════════
    // ── 티켓 목록 ──
    // ══════════════════════════════════════════
    async function showTicketList() {
      currentPage = 1;
      allTickets = [];

      // 새 문의 버튼 표시
      if (currentUser && currentUser.role !== 'banned') {
        document.getElementById('newTicketBtn').classList.remove('d-none');
      }

      // 관리자에게만 유형 필터 표시
      if (isManagerOrAbove()) {
        document.getElementById('typeFilter').classList.remove('d-none');
      }

      await loadTickets(false);

      hideAllPages();
      document.getElementById('newTicketForm').classList.add('d-none');
      document.getElementById('ticketListPage').classList.remove('d-none');
      document.title = `티켓 문의 - ${appConfig.wikiName}`;
    }

    async function loadTickets(append) {
      try {
        let url = `/api/tickets?page=${currentPage}`;
        if (currentStatusFilter) url += `&status=${currentStatusFilter}`;
        if (currentTypeFilter) url += `&type=${currentTypeFilter}`;

        const res = await fetch(url);
        if (!res.ok) throw new Error('티켓 목록 로딩 실패');
        const data = await res.json();

        if (append) {
          allTickets = allTickets.concat(data.tickets);
        } else {
          allTickets = data.tickets;
        }

        renderTicketList();

        // 페이지네이션
        const paginationEl = document.getElementById('ticketPagination');
        if (data.hasMore) {
          paginationEl.classList.remove('d-none');
        } else {
          paginationEl.classList.add('d-none');
        }

      } catch (err) {
        console.error(err);
        Swal.fire('오류', err.message, 'error');
      }
    }

    function renderTicketList() {
      const listEl = document.getElementById('ticketsList');
      if (!allTickets || allTickets.length === 0) {
        listEl.innerHTML = '<div class="text-muted text-center py-5">티켓이 없습니다.</div>';
        return;
      }

      listEl.innerHTML = allTickets.map(t => {
        const statusBadge = t.status === 'open'
          ? '<span class="badge bg-success">열림</span>'
          : '<span class="badge bg-secondary">닫힘</span>';
        const typeBadge = `<span class="badge ${typeBadgeClasses[t.type] || 'bg-primary'}">${typeLabels[t.type] || t.type}</span>`;
        const date = getRelativeTime(t.created_at);
        const deletedBadge = t.deleted_at ? '<span class="badge bg-danger">삭제됨</span>' : '';

        return `
          <a href="/tickets/${t.id}" class="discussion-item">
            <div class="d-flex justify-content-between align-items-start">
              <div class="discussion-item-main">
                <div class="discussion-item-title">
                  ${statusBadge} ${typeBadge} ${deletedBadge}
                  <span class="text-muted small">#${t.id}</span>
                  <span>${escapeHtml(t.title)}</span>
                </div>
                <div class="discussion-item-meta">
                  <span><i class="bi bi-person"></i> ${escapeHtml(t.user_name || '알 수 없음')}${renderUserRoleIcon(t.user_role)}</span>
                  <span><i class="bi bi-clock"></i> ${date}</span>
                  <span><i class="bi bi-chat"></i> ${t.comment_count || 0}개 댓글</span>
                </div>
              </div>
            </div>
          </a>
        `;
      }).join('');
      initRoleIconPopovers(listEl);
    }

    function filterTickets(btn, filterType, value) {
      if (filterType === 'status') {
        btn.closest('.btn-group').querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentStatusFilter = value;
      }
      currentPage = 1;
      allTickets = [];
      loadTickets(false);
    }

    function applyTypeFilter() {
      currentTypeFilter = document.getElementById('typeFilter').value;
      currentPage = 1;
      allTickets = [];
      loadTickets(false);
    }

    function loadMoreTickets() {
      currentPage++;
      loadTickets(true);
    }

    // ── 새 티켓 작성 ──
    async function showNewTicketForm() {
      if (!currentUser) {
        Swal.fire('로그인 필요', '문의를 작성하려면 로그인해주세요.', 'info');
        return;
      }
      document.getElementById('newTicketForm').classList.remove('d-none');
      document.getElementById('newTicketTitle').value = '';
      document.getElementById('newTicketType').value = 'general';
      // fallback textarea 도 빈 상태로
      document.getElementById('newTicketContentFallback').value = '';

      // 미니 에디터 lazy-init. 로드 실패 시 fallback textarea 가 보이는 상태로 둠.
      const create = await waitForMiniEditor();
      if (create) {
        const rootEl = document.getElementById('newTicketContent');
        const fallback = document.getElementById('newTicketContentFallback');
        if (!newTicketEditor) {
          try {
            // CM6 로드를 기다리는 동안 사용자가 fallback 에 입력했을 수 있으므로
            // 그 텍스트를 에디터로 옮긴 뒤 fallback 을 숨긴다 (데이터 손실 방지).
            const carryOver = fallback.value;
            newTicketEditor = await create(rootEl, {
              initialValue: carryOver,
              placeholder: '문의 내용을 입력하세요 (위키 문법 지원)',
            });
            fallback.classList.add('d-none');
            fallback.value = '';
          } catch (e) {
            console.error('mini editor init failed', e);
            // fallback textarea 가 그대로 보임 — 입력 차단되지 않음
          }
        } else {
          newTicketEditor.setValue('');
        }
      }
      document.getElementById('newTicketTitle').focus();
    }

    /** 미니 에디터 본문, 없으면 fallback textarea 값을 반환 */
    function getNewTicketContent() {
      if (newTicketEditor) return newTicketEditor.getValue();
      return document.getElementById('newTicketContentFallback').value;
    }

    async function submitNewTicket() {
      const title = document.getElementById('newTicketTitle').value.trim();
      const content = getNewTicketContent().trim();
      const type = document.getElementById('newTicketType').value;

      if (!title) { Swal.fire('알림', '문의 제목을 입력하세요.', 'warning'); return; }
      if (!content) { Swal.fire('알림', '문의 내용을 입력하세요.', 'warning'); return; }

      try {
        const res = await fetch('/api/tickets', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, content, type })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '티켓 생성 실패');

        Swal.fire('성공', '문의가 접수되었습니다.', 'success').then(() => {
          window.location.href = `/tickets/${data.id}`;
        });
      } catch (err) {
        Swal.fire('오류', err.message, 'error');
      }
    }

    // ══════════════════════════════════════════
    // ── 티켓 상세 ──
    // ══════════════════════════════════════════
    async function showTicketDetail(ticketId) {
      currentTicketId = ticketId;

      try {
        const res = await fetch(`/api/tickets/${ticketId}`);
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error || '티켓을 불러올 수 없습니다.');
        }
        const data = await res.json();
        const ticket = data.ticket;
        const comments = data.comments;

        // 제목
        document.getElementById('ticketTitle').innerHTML =
          `<i class="bi bi-ticket-detailed"></i> #${ticket.id} ${escapeHtml(ticket.title)}`;

        // 메타 정보
        const statusBadge = ticket.status === 'open'
          ? '<span class="badge bg-success">열림</span>'
          : '<span class="badge bg-secondary">닫힘</span>';
        const typeBadge = `<span class="badge ${typeBadgeClasses[ticket.type] || 'bg-primary'}">${typeLabels[ticket.type] || ticket.type}</span>`;
        const date = new Date(ticket.created_at * 1000).toLocaleString('ko-KR');
        const deletedBadge = ticket.deleted_at ? '<span class="badge bg-danger">삭제됨</span>' : '';

        document.getElementById('ticketMeta').innerHTML = `
          ${statusBadge} ${typeBadge} ${deletedBadge}
          <span class="text-muted small">작성자: ${escapeHtml(ticket.user_name || '알 수 없음')}${renderUserRoleIcon(ticket.user_role)}</span>
          <span class="text-muted small">${date}</span>
        `;
        initRoleIconPopovers(document.getElementById('ticketMeta'));

        // 액션 버튼들
        let actionsHtml = '';
        if (currentUser) {
          const isAuthor = ticket.user_id === currentUser.id;
          const userIsAdmin = isAdmin();
          const isSuperAdmin = currentUser.role === 'super_admin';

          if (isAuthor || userIsAdmin) {
            if (ticket.status === 'open') {
              actionsHtml += `<button class="btn btn-outline-danger btn-sm" onclick="changeTicketStatus(${ticketId}, 'closed')">
                <i class="bi bi-x-circle"></i> 문의 닫기</button>`;
            } else {
              actionsHtml += `<button class="btn btn-outline-success btn-sm" onclick="changeTicketStatus(${ticketId}, 'open')">
                <i class="bi bi-arrow-counterclockwise"></i> 문의 다시 열기</button>`;
            }
          }

          if (userIsAdmin && !ticket.deleted_at) {
            actionsHtml += `<button class="btn btn-outline-danger btn-sm" onclick="deleteTicket(${ticketId}, false)">
              <i class="bi bi-trash"></i> 삭제</button>`;
          }

          if (isSuperAdmin) {
            actionsHtml += `<button class="btn btn-danger btn-sm" onclick="deleteTicket(${ticketId}, true)">
              <i class="bi bi-trash-fill"></i> 완전 삭제</button>`;
          }
        }
        document.getElementById('ticketActions').innerHTML = actionsHtml;

        // 댓글 렌더링
        const commentsEl = document.getElementById('commentsList');
        commentsEl.innerHTML = comments.map(c => renderComment(c, ticket)).join('');
        initRoleIconPopovers(commentsEl);

        // 각 댓글 본문에 위키 문법 렌더링 (삭제된 댓글 제외)
        for (const c of comments) {
          if (!c.deleted_at) {
            renderCommentBody(c.content, `ticket-body-${c.id}`);
          }
        }

        // 댓글 폼 표시 여부
        const commentFormEl = document.getElementById('commentForm');
        if (ticket.status === 'closed' || ticket.deleted_at || !currentUser || currentUser.role === 'banned') {
          commentFormEl.classList.add('d-none');
        } else {
          commentFormEl.classList.remove('d-none');
          // 미니 에디터 lazy-init
          ensureCommentEditor();
        }
        cancelReply();

        hideAllPages();
        document.getElementById('ticketDetailPage').classList.remove('d-none');
        document.title = `#${ticket.id} ${ticket.title} - 티켓 - ${appConfig.wikiName}`;

        // 해당 티켓 관련 알림 일괄 삭제
        if (currentUser) {
          const notifLink = `/tickets/${ticketId}`;
          fetch('/api/notifications/by-link', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ link: notifLink })
          }).then(res => {
            if (res.ok) loadNotificationCount();
          }).catch(() => { });
        }

      } catch (err) {
        console.error(err);
        hideAllPages();
        Swal.fire('오류', err.message, 'error');
      }
    }

    function renderComment(c, ticket) {
      const isDeleted = !!c.deleted_at;
      const date = new Date(c.created_at * 1000).toLocaleString('ko-KR');

      // 역할 아이콘
      const authorRoleIcon = renderUserRoleIcon(c.author_role);

      let quoteHtml = '';
      if (c.parent_id && c.quoted_content) {
        quoteHtml = `
          <div class="discussion-quote">
            <div class="discussion-quote-author"><i class="bi bi-reply"></i> ${escapeHtml(c.quoted_author_name || '알 수 없음')}:</div>
            <div class="discussion-quote-text">${escapeHtml(c.quoted_content || '')}</div>
          </div>
        `;
      }

      // 본문은 위키 렌더링이 비동기이므로 빈 컨테이너만 박아두고 호출자가 별도 렌더.
      let contentHtml;
      if (isDeleted) {
        contentHtml = '<span class="text-muted fst-italic">삭제된 댓글입니다.</span>';
      } else {
        contentHtml = '';
      }

      let commentActions = '';
      if (!isDeleted && currentUser && currentUser.role !== 'banned' && ticket.status === 'open' && !ticket.deleted_at) {
        commentActions += `<button class="btn btn-sm btn-link text-muted" data-id="${c.id}" data-author="${escapeHtml(c.author_name || '알 수 없음')}" data-content="${escapeHtml((c.content || '').substring(0, 100))}" onclick="startReply(+this.dataset.id, this.dataset.author, this.dataset.content)">
          <i class="bi bi-reply"></i> 답글
        </button>`;
      }
      if (!isDeleted && currentUser) {
        const userIsAdmin = isAdmin();
        const isSuperAdmin = currentUser.role === 'super_admin';
        if (userIsAdmin) {
          commentActions += `<button class="btn btn-sm btn-link text-danger" onclick="deleteComment(${c.id}, false)">
            <i class="bi bi-trash"></i>
          </button>`;
        }
        if (isSuperAdmin) {
          commentActions += `<button class="btn btn-sm btn-link text-danger" onclick="deleteComment(${c.id}, true)">
            <i class="bi bi-trash-fill"></i>
          </button>`;
        }
      }

      return `
        <div class="discussion-comment ${isDeleted ? 'discussion-comment-deleted' : ''}" id="comment-${c.id}">
          <div class="discussion-comment-header">
            <span class="discussion-comment-author">
              ${c.author_picture ? `<img src="${c.author_picture}" class="discussion-comment-avatar" alt="" loading="lazy">` : ''}
              ${escapeHtml(c.author_name || '알 수 없음')}${authorRoleIcon}
            </span>
            <span class="discussion-comment-date text-muted small">${date}</span>
          </div>
          ${quoteHtml}
          <div class="discussion-comment-body wiki-content" id="ticket-body-${c.id}">${contentHtml}</div>
          <div class="discussion-comment-actions">${commentActions}</div>
        </div>
      `;
    }

    // ── 답글 ──
    function startReply(parentId, authorName, preview) {
      document.getElementById('replyParentId').value = parentId;
      const quoteEl = document.getElementById('replyQuote');
      quoteEl.innerHTML = `
        <div class="discussion-quote">
          <div class="discussion-quote-author"><i class="bi bi-reply"></i> ${escapeHtml(authorName)}에게 답글:</div>
          <div class="discussion-quote-text">${escapeHtml(preview)}${preview.length >= 100 ? '...' : ''}</div>
        </div>
      `;
      quoteEl.classList.remove('d-none');
      document.getElementById('cancelReplyBtn').classList.remove('d-none');
      if (commentEditor) {
        commentEditor.focus();
      } else {
        document.getElementById('commentContentFallback').focus();
      }
      document.getElementById('commentForm').scrollIntoView({ behavior: 'smooth' });
    }

    /** 댓글 본문: 미니 에디터가 마운트되었으면 그 값, 아니면 fallback textarea 값 */
    function getCommentContent() {
      if (commentEditor) return commentEditor.getValue();
      return document.getElementById('commentContentFallback').value;
    }
    function clearCommentContent() {
      if (commentEditor) commentEditor.setValue('');
      const fb = document.getElementById('commentContentFallback');
      if (fb) fb.value = '';
    }

    /** 댓글 폼 미니 에디터 lazy-init — 티켓 상세 진입 시 한 번.
     *  이미 초기화되어 있으면 본문만 비운다. 로드/마운트 실패 시 fallback textarea 사용. */
    async function ensureCommentEditor() {
      if (commentEditor) {
        commentEditor.setValue('');
        return;
      }
      const fb = document.getElementById('commentContentFallback');
      if (fb) fb.value = '';

      const create = await waitForMiniEditor();
      if (!create) return;
      const rootEl = document.getElementById('commentContent');
      if (!rootEl) return;
      try {
        // CM6 로드 중 사용자가 fallback 에 입력했을 수 있으므로 그 값을 에디터로 이관.
        const carryOver = fb ? fb.value : '';
        commentEditor = await create(rootEl, {
          initialValue: carryOver,
          placeholder: '댓글을 입력하세요 (위키 문법 지원)',
        });
        if (fb) { fb.classList.add('d-none'); fb.value = ''; }
      } catch (e) {
        console.error('mini editor init failed', e);
      }
    }

    function cancelReply() {
      document.getElementById('replyParentId').value = '';
      document.getElementById('replyQuote').classList.add('d-none');
      document.getElementById('cancelReplyBtn').classList.add('d-none');
    }

    async function submitComment() {
      const content = getCommentContent().trim();
      const parentId = document.getElementById('replyParentId').value;

      if (!content) { Swal.fire('알림', '댓글 내용을 입력하세요.', 'warning'); return; }

      try {
        const body = { content };
        if (parentId) body.parent_id = Number(parentId);

        const res = await fetch(`/api/tickets/${currentTicketId}/comments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '댓글 작성 실패');

        clearCommentContent();
        cancelReply();
        showTicketDetail(currentTicketId);
      } catch (err) {
        Swal.fire('오류', err.message, 'error');
      }
    }

    // ── 티켓 상태 변경 ──
    async function changeTicketStatus(ticketId, status) {
      const label = status === 'closed' ? '닫기' : '다시 열기';
      const result = await Swal.fire({
        title: `문의 ${label}`,
        text: `정말 이 문의를 ${label}하시겠습니까?`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: label,
        cancelButtonText: '취소'
      });

      if (!result.isConfirmed) return;

      try {
        const res = await fetch(`/api/tickets/${ticketId}/status`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '상태 변경 실패');

        showTicketDetail(ticketId);
      } catch (err) {
        Swal.fire('오류', err.message, 'error');
      }
    }

    // ── 티켓 삭제 ──
    async function deleteTicket(ticketId, hard) {
      const label = hard ? '완전 삭제 (복구 불가)' : '삭제';
      const result = await Swal.fire({
        title: `문의 ${label}`,
        text: hard ? '이 문의와 모든 댓글이 영구적으로 삭제됩니다.' : '이 문의를 삭제하시겠습니까?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        confirmButtonText: label,
        cancelButtonText: '취소'
      });

      if (!result.isConfirmed) return;

      try {
        const url = hard
          ? `/api/tickets/${ticketId}/hard`
          : `/api/tickets/${ticketId}`;
        const res = await fetch(url, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '삭제 실패');

        Swal.fire('삭제됨', '문의가 삭제되었습니다.', 'success').then(() => {
          window.location.href = '/tickets';
        });
      } catch (err) {
        Swal.fire('오류', err.message, 'error');
      }
    }

    // ── 댓글 삭제 ──
    async function deleteComment(commentId, hard) {
      const label = hard ? '완전 삭제' : '삭제';
      const result = await Swal.fire({
        title: `댓글 ${label}`,
        text: hard ? '이 댓글이 영구적으로 삭제됩니다.' : '이 댓글을 삭제하시겠습니까?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        confirmButtonText: label,
        cancelButtonText: '취소'
      });

      if (!result.isConfirmed) return;

      try {
        const url = hard
          ? `/api/tickets/comment/${commentId}/hard`
          : `/api/tickets/comment/${commentId}`;
        const res = await fetch(url, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '삭제 실패');

        showTicketDetail(currentTicketId);
      } catch (err) {
        Swal.fire('오류', err.message, 'error');
      }
    }
  </script>

  <!-- ── 이미지 편집 모달 (handleImageUpload 가 사용) ── -->
  <div class="modal fade" id="imageEditorModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h6 class="modal-title"><i class="bi bi-crop"></i> 이미지 편집</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
        </div>
        <div class="modal-body">
          <div class="img-editor-canvas-wrap" id="imgEditorCanvasWrap">
            <canvas id="imgEditorCanvas"></canvas>
            <div class="crop-overlay" id="cropOverlay" style="display:none;">
              <div class="crop-box" id="cropBox">
                <div class="crop-handle tl" data-handle="tl"></div>
                <div class="crop-handle tr" data-handle="tr"></div>
                <div class="crop-handle bl" data-handle="bl"></div>
                <div class="crop-handle br" data-handle="br"></div>
              </div>
            </div>
          </div>
          <div class="img-editor-toolbar">
            <button type="button" id="btnCropToggle" title="크롭 모드 전환"><i class="bi bi-crop"></i></button>
            <button type="button" id="btnCropApply" style="display:none;" title="크롭 적용"><i class="bi bi-check-lg"></i></button>
            <div class="separator"></div>
            <button type="button" id="btnRotateLeft" title="왼쪽 90도 회전"><i class="bi bi-arrow-counterclockwise"></i></button>
            <button type="button" id="btnRotateRight" title="오른쪽 90도 회전"><i class="bi bi-arrow-clockwise"></i></button>
            <div class="separator"></div>
            <button type="button" id="btnImgReset" title="원본 복원"><i class="bi bi-arrow-repeat"></i> 초기화</button>
          </div>
          <div class="img-editor-info" id="imgEditorInfo"></div>
        </div>
        <div class="modal-footer d-flex justify-content-between align-items-center w-100">
          <div class="dropdown">
            <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button"
              id="btnImgEditorSizeToggle" data-bs-toggle="dropdown" aria-expanded="false">
              <i class="mdi mdi-arrow-expand-all me-1"></i>크게(기본)
            </button>
            <ul class="dropdown-menu" id="imgEditorSizeDropdown" aria-labelledby="btnImgEditorSizeToggle">
              <li><a class="dropdown-item" href="#" data-size="icon"><i class="mdi mdi-square-medium-outline me-2"></i>아이콘</a></li>
              <li><a class="dropdown-item" href="#" data-size="small"><i class="mdi mdi-arrow-collapse me-2"></i>작게</a></li>
              <li><a class="dropdown-item" href="#" data-size="medium"><i class="mdi mdi-square-outline me-2"></i>중간</a></li>
              <li><a class="dropdown-item" href="#" data-size="full"><i class="mdi mdi-arrow-expand-all me-2"></i>크게(기본)</a></li>
            </ul>
          </div>
          <div>
            <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">취소</button>
            <button type="button" class="btn btn-primary btn-sm" id="btnImgEditorDone"><i class="bi bi-check-lg"></i> 편집 완료</button>
          </div>
        </div>
      </div>
    </div>
  </div>
