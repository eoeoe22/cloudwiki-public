<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CloudWiki">
  <meta property="og:title" content="CloudWiki">
  <meta property="og:description" content="CloudWiki">
  <meta property="og:site_name" content="CloudWiki">
  <meta property="og:type" content="website">
  <title class="app-wiki-name">CloudWiki</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- 부트스트랩 아이콘 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- 머테리얼 디자인 아이콘 -->
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
  <!-- SweetAlert2 (알림 다이얼로그 라이브러리) -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <!-- 구글 폰트: Inter, Outfit, Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800;900&family=Inter:wght@400;500;700;800&display=swap"
    rel="stylesheet">
  <!-- 커스텀 스타일 -->
  <link rel="stylesheet" href="/style.css">
</head>

<body style="-webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;">

  <!-- SPA 네비게이션 프로그레스 바 -->
  <div id="spaProgressBar" class="spa-progress-bar d-none">
    <div class="spa-progress-bar-inner"></div>
  </div>

  <!-- ── 네비게이션 바 Placeholder ── -->
  <div id="app-header-placeholder"></div>

  <!-- ── 메인 레이아웃 ── -->
  <div class="wiki-layout">
    <!-- 메인 콘텐츠 -->
    <div class="wiki-container">
      <!-- 초기 로딩 (페이지 새로고침/최초 방문) -->
      <div id="loading" class="wiki-loading">
        <div class="spinner-border text-primary" role="status"></div>
        <span>불러오는 중...</span>
      </div>

      <!-- 홈(환영 페이지) -->
      <div id="homePage" class="d-none">
        <div class="wiki-welcome">
          <h1><span class="app-wiki-name">CloudWiki</span></h1>
          <button class="btn btn-wiki" onclick="goNewPage()">
            <i class="bi bi-pencil-square"></i> 첫 문서 만들기
          </button>
        </div>
        <div class="recent-pages-section" id="recentPages"></div>
      </div>

      <!-- 문서 보기 페이지 -->
      <div id="articlePage" class="d-none">
        <!-- 토론 진행 중 배너 -->
        <div id="discussionBanner"
          class="d-none alert alert-warning py-2 px-3 mb-3 d-flex align-items-center justify-content-between">
          <span><i class="bi bi-chat-dots-fill me-2"></i>현재 이 문서에 대한 토론이 진행중입니다.</span>
          <a id="discussionBannerLink" href="#" class="btn btn-sm btn-warning ms-3">
            <i class="bi bi-arrow-right-circle"></i> 토론 보기
          </a>
        </div>

        <div class="wiki-article">
          <h1 class="wiki-article-title" id="articleTitle"></h1>
          <div id="redirectMessage"></div>
          <div class="wiki-article-meta" id="articleMeta"></div>

          <!-- 문서 도구 -->
          <div class="d-flex justify-content-end mb-2 gap-2">
            <div class="btn-group" id="articleMainActions">
              <!-- 자바스크립트로 채워짐: 편집, 이력, 토론, 역링크 -->
            </div>
            <div class="dropdown">
              <button class="btn btn-secondary dropdown-toggle no-caret" type="button" id="shareDropdown"
                data-bs-toggle="dropdown" data-bs-display="static" data-bs-flip="false" aria-expanded="false" title="공유하기">
                <i class="bi bi-share"></i>
              </button>
              <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="shareDropdown">
                <li><button class="dropdown-item" onclick="shareNative()">
                    <i class="bi bi-share"></i> 공유하기
                  </button></li>
                <li>
                  <hr class="dropdown-divider">
                </li>
                <li><button class="dropdown-item" onclick="shareCopyLink()">
                    <i class="bi bi-link"></i> 링크 복사하기
                  </button></li>
                <li id="shareItemCopyText"><button class="dropdown-item" onclick="shareCopyText()">
                    <i class="bi bi-copy"></i> 문서 텍스트 복사
                  </button></li>
                <li id="shareItemCopyMarkdown"><button class="dropdown-item" onclick="shareCopyMarkdown()">
                    <i class="bi bi-markdown"></i> 문서 복사 (마크다운)
                  </button></li>
                <li id="shareItemPrint"><button class="dropdown-item" onclick="sharePrint()">
                    <i class="bi bi-printer"></i> 인쇄하기
                  </button></li>
              </ul>
            </div>
            <div class="dropdown">
              <button class="btn btn-secondary dropdown-toggle no-caret" type="button" id="docToolsDropdown"
                data-bs-toggle="dropdown" data-bs-display="static" data-bs-flip="false" aria-expanded="false" title="문서 도구">
                <i class="bi bi-three-dots-vertical"></i>
              </button>
              <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="docToolsDropdown" id="articleMoreActions">
                <!-- 자바스크립트로 채워짐 -->
              </ul>
            </div>
          </div>

          <!-- 목차 아코디언 -->
          <div class="accordion mb-4" id="wikiAccordion">
            <!-- 목차 -->
            <div class="accordion-item">
              <h2 class="accordion-header" id="headingTOC">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                  data-bs-target="#collapseTOC" aria-expanded="false" aria-controls="collapseTOC">
                  <i class="bi bi-list-columns-reverse me-2"></i> 목차
                </button>
              </h2>
              <div id="collapseTOC" class="accordion-collapse collapse" aria-labelledby="headingTOC"
                data-bs-parent="#wikiAccordion">
                <div class="accordion-body">
                  <div id="tocContainer" class="d-none">
                    <nav id="tocNav"></nav>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- 상위 문서 (하위 문서인 경우) -->
          <div id="parentDocsNav" class="d-none parent-docs-nav mb-0"></div>
          <hr id="parentDocsNavDivider" class="d-none mt-2 mb-3">

          <!-- 본문 -->
          <div class="wiki-content" id="articleContent"></div>

          <!-- 백링크 -->
          <div class="backlinks-section d-none" id="backlinksSection">
            <h5><i class="bi bi-link-45deg"></i> 이 문서를 참조하는 문서</h5>
            <div class="list-group" id="backlinksList"></div>
          </div>
        </div>
      </div>

      <!-- 문서 없음 -->
      <div id="notFoundPage" class="d-none">
        <div class="wiki-not-found">
          <h2><span class="mdi mdi-file-document-alert"></span> 문서가 없습니다</h2>
          <p id="notFoundSlug"></p>
          <button class="btn btn-wiki" id="createPageBtn">
            <i class="bi bi-plus-lg"></i> 이 문서 만들기
          </button>
        </div>
      </div>

      <!-- 삭제된 문서 -->
      <div id="deletedPage" class="d-none">
        <div class="wiki-not-found">
          <h2><span class="mdi mdi-delete-empty text-danger"></span> 삭제된 문서입니다</h2>
          <p id="deletedSlug"></p>
        </div>
      </div>

      <!-- 카테고리 문서 목록 -->
      <div id="categoryPage" class="d-none">
        <div class="wiki-article">
          <h2><i class="bi bi-folder2-open"></i> 카테고리: <span id="catPageTitle"></span></h2>
          <div class="list-group mt-4" id="categoryDocsList"></div>
        </div>
      </div>

    </div> <!-- wiki-container end -->

    <!-- 오른쪽 사이드바 (PC 전용 오프캔버스 컨테이너 및 최근 변경) -->
    <aside class="wiki-sidebar" id="wikiSidebar">
      <!-- 사이드바 네비게이션 (모바일 오프캔버스 렌더링 영역 공유) -->
      <div id="app-sidebar-placeholder"></div>

      <!-- 실시간 트렌딩 -->
      <div class="mb-4">

        <div class="sidebar-section">
          <h6 class="sidebar-title d-flex justify-content-between align-items-center mb-2">
            <span><i class="bi bi-graph-up-arrow text-danger"></i> 실시간 트렌딩</span>
            <a href="#" class="small text-muted text-decoration-none trending-expand-btn" style="font-size: 0.8rem;">펼치기
              <i class="bi bi-chevron-down"></i></a>
          </h6>
          <div class="position-relative overflow-hidden trending-ticker-wrapper" style="height: 38px;">
            <div id="trendingListPc" class="trending-container trending-ticker-list">
              <div class="placeholder-glow px-2 py-2">
                <span class="placeholder w-100 d-block" style="height: 1.5rem; border-radius: 4px;"></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 최근 변경 -->
      <div class="mb-4">
        <div class="sidebar-section">
          <h6 class="sidebar-title"><i class="bi bi-clock-history"></i> 최근 변경</h6>
          <div id="recentChangesListPc" class="recent-changes-list recent-changes-container">
            <div class="placeholder-glow">
              <span class="placeholder w-100 d-block mb-2" style="height: 2.5rem; border-radius: 6px;"></span>
              <span class="placeholder w-100 d-block mb-2" style="height: 2.5rem; border-radius: 6px;"></span>
              <span class="placeholder w-100 d-block" style="height: 2.5rem; border-radius: 6px;"></span>
            </div>
          </div>
        </div>
      </div>

    </aside>
  </div> <!-- wiki-layout end -->

  <!-- ── 푸터 Placeholder ── -->
  <div id="app-footer-placeholder"></div>

  <!-- ── Scripts ── -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

  <script src="/js/common.js"></script>
  <script src="/js/render.js"></script>
  <script>
    // ── SSR 데이터 로드 ──
    let ssrData = null;
    (function () {
      const el = document.getElementById('ssr-data');
      if (el) {
        try { ssrData = JSON.parse(el.textContent); } catch (e) { }
      }
    })();

    // ── 전역 상태 ──
    let currentSlug = null;
    let currentPage = null;

    // ── 초기화 ──
    document.addEventListener('DOMContentLoaded', async () => {
      await Promise.all([loadConfig(), checkAuth()]);

      // URL 파라미터 기반 안내/에러 메시지 표시
      const urlParams = new URLSearchParams(window.location.search);
      const errorParam = urlParams.get('error');
      const infoParam = urlParams.get('info');
      if (errorParam || infoParam) {
        const messages = {
          'deleted_account': { icon: 'error', title: '접근 불가', text: '탈퇴한 계정입니다.' },
          'signup_pending': { icon: 'info', title: '가입 대기 중', text: '가입 신청이 대기 중입니다. 관리자 승인을 기다려주세요.' },
          'signup_blocked': { icon: 'error', title: '가입 차단', text: '가입이 차단된 계정입니다. 관리자에게 문의하세요.' },
          'email_domain_not_allowed': { icon: 'error', title: '가입 불가', text: '해당 이메일 도메인은 가입이 허용되지 않습니다.' },
          'signup_submitted': { icon: 'success', title: '가입 신청 완료', text: '가입 신청이 접수되었습니다. 관리자 승인 후 이용 가능합니다.' },
        };
        const key = errorParam || infoParam;
        const msg = messages[key];
        if (msg) {
          Swal.fire(msg);
          // URL에서 파라미터 제거
          window.history.replaceState({}, '', '/');
        }
      }

      route();
      _initialLoadDone = true;
      loadTrending();
      loadRecentChanges();

      // 브라우저 뒤로/앞으로 버튼 처리
      window.addEventListener('popstate', () => {
        const currentPath = window.location.pathname;
        const currentSearch = window.location.search;
        // 경로/쿼리가 그대로고 해시만 바뀐 경우(같은 페이지 섹션 이동) → 재페치/재렌더 없이 스크롤만
        if (currentPath === _lastPath && currentSearch === _lastSearch) {
          if (window.location.hash) {
            scrollToHash();
          } else {
            window.scrollTo({ top: 0, behavior: 'instant' });
          }
          return;
        }
        _lastPath = currentPath;
        _lastSearch = currentSearch;
        if (!window.location.hash) {
          window.scrollTo({ top: 0, behavior: 'instant' });
        }
        route();
      });

      // 스크롤 FAB 표시/숨김
      const scrollFabGroup = document.getElementById('scrollFabGroup');
      window.addEventListener('scroll', () => {
        if (window.scrollY > 200) {
          scrollFabGroup.classList.add('visible');
        } else {
          scrollFabGroup.classList.remove('visible');
        }
      }, { passive: true });
    });

    // ── 라우팅 ──
    function route() {
      const path = window.location.pathname;
      if (!_initialLoadDone) hideAllPages();

      if (path === '/' || path === '') {
        showHome();
      } else if (path.match(/^\/w\/([^/]+)\/discussions/)) {
        // 토론 페이지 → 별도 HTML로 이동
        window.location.href = path;
        return;
      } else if (path.match(/^\/w\/([^/]+)\/revisions$/)) {
        // 리비전 페이지 → 별도 HTML로 이동
        window.location.href = path;
        return;
      } else if (path.match(/^\/w\/([^/]+)$/)) {
        const slug = decodeURIComponent(path.match(/^\/w\/([^/]+)$/)[1]);
        showArticle(slug);
      } else if (path === '/search') {
        window.location.href = '/search.html' + window.location.search;
      }
    }

    let _initialLoadDone = false;
    // popstate에서 해시만 바뀐 경우(같은 페이지 섹션 이동)를 감지하기 위한 직전 경로/쿼리
    let _lastPath = window.location.pathname;
    let _lastSearch = window.location.search;

    function hideAllPages() {
      document.getElementById('loading').classList.add('d-none');
      document.getElementById('spaProgressBar').classList.add('d-none');
      document.getElementById('homePage').classList.add('d-none');
      document.getElementById('articlePage').classList.add('d-none');
      document.getElementById('notFoundPage').classList.add('d-none');
      document.getElementById('deletedPage').classList.add('d-none');
      document.getElementById('categoryPage').classList.add('d-none');
    }

    function showLoading() {
      if (_initialLoadDone) {
        // SPA 네비게이션: 기존 문서 유지 + 프로그레스 바
        document.getElementById('spaProgressBar').classList.remove('d-none');
      } else {
        // 최초 로드: 스피너
        hideAllPages();
        document.getElementById('loading').classList.remove('d-none');
      }
    }

    // ── 홈(환영 페이지 대신 /w/[WIKI_NAME] 으로 이동) ──
    async function showHome() {
      const wikiName = typeof appConfig !== 'undefined' && appConfig.wikiName ? appConfig.wikiName : 'CloudWiki';
      navigateTo(`/w/${encodeURIComponent(wikiName)}`);
    }

    // ── 문서 보기 ──
    async function scrollToBacklinks() {
      const section = document.getElementById('backlinksSection');
      const list = document.getElementById('backlinksList');

      if (!section.classList.contains('d-none')) {
        section.scrollIntoView({ behavior: 'smooth' });
        return;
      }

      const loaded = await loadBacklinks(currentSlug);
      if (loaded) {
        section.scrollIntoView({ behavior: 'smooth' });
      } else {
        Swal.fire({
          icon: 'info',
          title: '역링크',
          text: '이 문서를 참조하는 역링크가 없습니다.',
          timer: 2000,
          showConfirmButton: false
        });
      }
    }

    async function showSubdocs(slug) {
      // 하위 문서인 경우 최상위 문서를 기준으로 탐색
      const topSlug = slug.includes('/') ? slug.split('/')[0] : slug;

      try {
        const res = await fetch(`/api/w/${encodeURIComponent(topSlug)}/subdocs`);
        const data = await res.json();
        const subdocs = data.subdocs || [];

        if (subdocs.length === 0) {
          Swal.fire('하위 문서', '하위 문서가 없습니다.', 'info');
          return;
        }

        // 트리 구조 빌드
        const tree = {};
        for (const doc of subdocs) {
          // slug에서 최상위 문서 prefix 제거
          const relative = doc.slug.substring(topSlug.length + 1); // "스마트폰/갤럭시S"
          const parts = relative.split('/');
          let node = tree;
          for (const part of parts) {
            if (!node[part]) node[part] = { _children: {}, _doc: null };
            node = node[part]._children;
          }
          // 마지막 노드에 문서 정보 저장
          let target = tree;
          for (let i = 0; i < parts.length; i++) {
            if (i === parts.length - 1) {
              target[parts[i]]._doc = doc;
            } else {
              target = target[parts[i]]._children;
            }
          }
        }

        function renderTree(nodes, parentPrefix) {
          const entries = Object.keys(nodes).sort();
          let html = '';
          entries.forEach((key, idx) => {
            const node = nodes[key];
            const isLast = idx === entries.length - 1;
            const hasChildren = Object.keys(node._children).length > 0;
            const connector = isLast ? '└── ' : '├── ';
            const childPrefix = parentPrefix + (isLast ? '    ' : '│   ');

            if (node._doc) {
              html += `<div style="font-family:monospace;white-space:pre;line-height:1.6;">${parentPrefix}${connector}` +
                `<a href="/w/${encodeURIComponent(node._doc.slug)}" onclick="Swal.close();navigateTo(this.href);return false;" class="text-decoration-none">${escapeHtml(key)}</a></div>`;
            } else {
              html += `<div style="font-family:monospace;white-space:pre;line-height:1.6;">${parentPrefix}${connector}${escapeHtml(key)}</div>`;
            }

            if (hasChildren) {
              html += renderTree(node._children, childPrefix);
            }
          });
          return html;
        }

        // 루트 문서 포함
        let treeHtml = `<div style="font-family:monospace;white-space:pre;line-height:1.6;"><a href="/w/${encodeURIComponent(topSlug)}" onclick="Swal.close();navigateTo(this.href);return false;" class="text-decoration-none fw-bold">${escapeHtml(decodeURIComponent(topSlug))}</a></div>`;
        treeHtml += renderTree(tree, '');

        Swal.fire({
          title: '하위 문서',
          html: `<div class="text-start">${treeHtml}</div>`,
          width: 600,
          confirmButtonText: '닫기',
          customClass: { htmlContainer: 'text-start' }
        });
      } catch (err) {
        console.error(err);
        Swal.fire('오류', '하위 문서를 불러오는 데 실패했습니다.', 'error');
      }
    }

    async function showArticle(slug) {
      showLoading();
      currentSlug = slug;

      // 목차 섹션 및 FAB 초기화 (이전 익스텐션 문서에서 숨겨진 경우 복원)
      document.getElementById('wikiAccordion').classList.remove('d-none');
      const _tocFabBtn = document.getElementById('tocFabBtn');
      if (_tocFabBtn) _tocFabBtn.classList.remove('d-none');

      // 공유하기 드롭다운 초기화 (이전 익스텐션 문서에서 숨겨진 경우 복원)
      ['shareItemCopyText', 'shareItemCopyMarkdown', 'shareItemPrint'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove('d-none');
      });

      try {
        let page;

        // SSR 데이터가 있고, 현재 slug와 일치하면 API 호출 없이 사용
        if (ssrData && ssrData._ssrSlug === slug) {
          if (ssrData._ssrForbidden) {
            hideAllPages();
            Swal.fire('접근 불가', '이 문서는 비공개 상태입니다.', 'error');
            return;
          }
          if (ssrData._ssrNotFound) {
            if (ssrData._ssrDeleted) {
              hideAllPages();
              document.getElementById('deletedPage').classList.remove('d-none');
              document.getElementById('deletedSlug').textContent = `"${decodeURIComponent(slug)}" 문서는 삭제되었습니다.`;
              document.title = `삭제된 문서 - ${appConfig.wikiName}`;

              // 삭제된 문서 화면이 보이도록 렌더링 강제 업데이트
              if (typeof window.__sidebarLayoutUpdate === 'function') window.__sidebarLayoutUpdate();
              return;
            }

            // 카테고리 문서 체크
            const decodedSlug = decodeURIComponent(slug);
            if (decodedSlug.startsWith('카테고리:')) {
              await showCategoryArticle(slug, decodedSlug);
              return;
            }

            hideAllPages();
            document.getElementById('notFoundPage').classList.remove('d-none');
            document.getElementById('notFoundSlug').textContent =
              `"${decodeURIComponent(slug)}" 문서가 아직 존재하지 않습니다.`;
            document.getElementById('createPageBtn').onclick = () => {
              window.location.href = `/edit?slug=${encodeURIComponent(slug)}`;
            };
            document.title = `문서 없음 - ${appConfig.wikiName}`;
            return;
          }
          page = ssrData;
          // SSR 데이터는 한 번만 사용 (이후 클라이언트 네비게이션 시에는 API 호출)
          ssrData = null;
        } else {
          // 클라이언트 사이드 네비게이션 — API로 문서 로드
          const search = window.location.search;
          const res = await fetch(`/api/w/${encodeURIComponent(slug)}${search}`);

          if (res.status === 410) {
            hideAllPages();
            document.getElementById('deletedPage').classList.remove('d-none');
            document.getElementById('deletedSlug').textContent = `"${decodeURIComponent(slug)}" 문서는 삭제되었습니다.`;
            document.title = `삭제된 문서 - ${appConfig.wikiName}`;

            // 삭제된 문서 화면이 보이도록 렌더링 강제 업데이트
            if (typeof window.__sidebarLayoutUpdate === 'function') window.__sidebarLayoutUpdate();
            return;
          }

          if (res.status === 404) {
            const decodedSlug = decodeURIComponent(slug);
            if (decodedSlug.startsWith('카테고리:')) {
              await showCategoryArticle(slug, decodedSlug);
              return;
            }

            hideAllPages();
            document.getElementById('notFoundPage').classList.remove('d-none');
            document.getElementById('notFoundSlug').textContent =
              `"${decodeURIComponent(slug)}" 문서가 아직 존재하지 않습니다.`;
            document.getElementById('createPageBtn').onclick = () => {
              window.location.href = `/edit?slug=${encodeURIComponent(slug)}`;
            };
            document.title = `문서 없음 - ${appConfig.wikiName}`;
            return;
          }

          if (res.status === 403) {
            hideAllPages();
            Swal.fire('접근 불가', '이 문서는 비공개 상태입니다.', 'error');
            return;
          }

          if (!res.ok) throw new Error('문서 로딩 실패');
          page = await res.json();
        }

        currentPage = page;

        document.title = `${page.title} - ${appConfig.wikiName}`;

        // 제목
        document.getElementById('articleTitle').textContent = page.title;

        // 리다이렉트 안내
        const redirectMsgEl = document.getElementById('redirectMessage');
        redirectMsgEl.innerHTML = '';
        if (page.redirected_from) {
          redirectMsgEl.innerHTML = `
            <div class="alert alert-info py-1 px-2 mb-2 d-inline-block small">
            <i class="bi bi-arrow-return-right"></i>
            "${escapeHtml(page.redirected_from)}" 문서에서 넘어옴
            (<a href="/w/${encodeURIComponent(page.redirected_from)}?redirect=no" class="alert-link" onclick="navigateTo(this.getAttribute('href')); return false;">편집</a>)
            </div>
          `;
        }

        // 메타 정보
        const updatedDate = new Date(page.updated_at * 1000).toLocaleString('ko-KR');
        const authorName = page.author?.name || '알 수 없음';

        let badgesHtml = '';
        if (page.category) {
          const cats = page.category.split(',').map(c => c.trim()).filter(c => c);
          cats.forEach(cat => {
            badgesHtml += `<a href="#" data-cat="${escapeHtml(cat)}" onclick="showCategory(this.dataset.cat); return false;" class="badge bg-secondary text-decoration-none ms-2"><i class="bi bi-folder"></i> ${escapeHtml(cat)}</a>`;
          });
        }
        if (page.is_locked) {
          badgesHtml += `<span class="badge bg-danger ms-2"><i class="bi bi-lock-fill"></i> 관리자 전용</span>`;
        }
        if (page.deleted_at) {
          badgesHtml += `<span class="badge bg-danger ms-2"><i class="bi bi-trash"></i> 삭제됨</span>`;
        }

        document.getElementById('articleMeta').innerHTML = `
      <span class="meta-item">마지막 수정 : ${updatedDate}</span>
      <span class="meta-item">v${page.version}</span>
      <span class="meta-item" id="pageViewCount" style="display:none;"><i class="bi bi-eye"></i> <span id="pageViewNum">0</span></span>
      ${badgesHtml}
    `;

        // 조회수 비동기 로드
        fetch('/api/analytics/page-views/' + encodeURIComponent(page.slug))
          .then(r => r.json())
          .then(data => {
            if (data.total > 0) {
              document.getElementById('pageViewNum').textContent = Number(data.total).toLocaleString();
              document.getElementById('pageViewCount').style.display = '';
            }
          })
          .catch(() => { });

        // redirect를 통해 문서를 조회한 경우, 액션 버튼에 실제 문서의 slug를 사용
        const actionSlug = page.slug || slug;

        // 액션 버튼
        const _hasColon = actionSlug.includes(':');
        
        // 편집 권한 확인
        const isAdmin = currentUser && (currentUser.role === 'admin' || currentUser.role === 'super_admin');
        const isLocked = page.is_locked === 1;
        const canEdit = currentUser && (isAdmin || !isLocked);

        // 메인 액션 (편집, 이력, 토론, 역링크)
        const mainActionsHtml = `
          <a href="/edit.html?slug=${encodeURIComponent(actionSlug)}"
             class="btn btn-outline-secondary ${canEdit ? '' : 'disabled'}"
             ${canEdit ? '' : 'tabindex="-1" aria-disabled="true"'}
             title="${canEdit ? '이 문서 편집' : '이 문서는 관리자만 편집할 수 있습니다'}"
             aria-label="${canEdit ? '편집' : '편집 (잠김)'}">
            <i class="bi bi-pencil" aria-hidden="true"></i><span class="d-none d-sm-inline"> 편집</span>
          </a>
          <a href="/w/${encodeURIComponent(actionSlug)}/revisions" class="btn btn-outline-secondary" aria-label="이력">
            <i class="bi bi-clock-history" aria-hidden="true"></i><span class="d-none d-sm-inline"> 이력</span>
          </a>
          <a href="/w/${encodeURIComponent(actionSlug)}/discussions" class="btn btn-outline-secondary" aria-label="토론">
            <i class="bi bi-chat-dots" aria-hidden="true"></i><span class="d-none d-sm-inline"> 토론</span>
          </a>
          <button class="btn btn-outline-secondary" onclick="scrollToBacklinks(); return false;" aria-label="역링크">
            <i class="bi bi-link-45deg" aria-hidden="true"></i><span class="d-none d-sm-inline"> 역링크</span>
          </button>
        `;
        document.getElementById('articleMainActions').innerHTML = mainActionsHtml;

        // 더보기 액션
        let moreActionsHtml = `
          <li><button class="dropdown-item${_hasColon ? ' disabled' : ''}" ${_hasColon ? 'disabled' : `data-slug="${escapeHtml(actionSlug)}" onclick="showSubdocs(this.dataset.slug); return false;"`}>
            <i class="bi bi-diagram-3"></i> 하위 문서 보기
          </button></li>
        `;

        if (currentUser) {
          moreActionsHtml += `
          <li>
            <button class="dropdown-item" id="watchToggleBtn" data-slug="${escapeHtml(actionSlug)}" onclick="toggleWatch(this.dataset.slug); return false;">
              <i class="bi bi-eye"></i> <span id="watchToggleText">주시하기</span>
            </button>
          </li>
          `;

          if (canEdit) {
            if (page.deleted_at && isAdmin) {
              moreActionsHtml += `
              <li><hr class="dropdown-divider"></li>
              <li><button class="dropdown-item text-success" data-slug="${escapeHtml(actionSlug)}" onclick="restorePage(this.dataset.slug); return false;">
                <i class="bi bi-arrow-counterclockwise"></i> 문서 복원
              </button></li>
              <li><button class="dropdown-item text-danger" data-slug="${escapeHtml(actionSlug)}" onclick="confirmHardDelete(this.dataset.slug); return false;">
                <i class="bi bi-trash-fill"></i> 영구 삭제 (최고 관리자)
              </button></li>
              `;
            } else if (!page.deleted_at) {
              moreActionsHtml += `
              <li><button class="dropdown-item" data-slug="${escapeHtml(actionSlug)}" onclick="promptMove(this.dataset.slug); return false;">
                <i class="bi bi-arrows-move"></i> 문서 주소 변경
              </button></li>
              `;
              if (isAdmin) {
                moreActionsHtml += `
              <li><hr class="dropdown-divider"></li>
              <li><button class="dropdown-item text-danger" data-slug="${escapeHtml(actionSlug)}" onclick="confirmDelete(this.dataset.slug); return false;">
                <i class="bi bi-trash"></i> 삭제
              </button></li>
                `;
              }
            }
          }
        }
        document.getElementById('articleMoreActions').innerHTML = moreActionsHtml;

        // 주시 상태 확인 (로그인 시)
        if (currentUser && document.getElementById('watchToggleBtn')) {
          loadWatchStatus(actionSlug);
        }

        // Markdown → HTML 렌더링 (common.js의 renderWikiContent 모듈 사용)
        // 익스텐션 데이터 문서(freq: 등)는 마크다운 렌더링 비활성화 — 익스텐션 렌더러로 표시
        const decodedSlugForExt = decodeURIComponent(slug);
        const enabledExts = (appConfig && appConfig.enabledExtensions) || [];
        const extPrefix = enabledExts.find(ext => decodedSlugForExt.startsWith(ext + ':'));
        if (extPrefix) {
          // 목차 섹션 전체 숨기기 (아코디언, 플로팅 FAB)
          document.getElementById('wikiAccordion').classList.add('d-none');
          const tocFabBtn = document.getElementById('tocFabBtn');
          if (tocFabBtn) tocFabBtn.classList.add('d-none');

          // 공유하기 드롭다운에서 텍스트/마크다운 복사 및 인쇄 버튼 숨기기
          ['shareItemCopyText', 'shareItemCopyMarkdown', 'shareItemPrint'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.classList.add('d-none');
          });

          const contentEl = document.getElementById('articleContent');
          const rawId = `ext-raw-collapse-${Date.now()}`;
          contentEl.innerHTML = `
            <div class="wiki-ext-doc-view">
              <div class="wiki-ext-doc-rendered" id="ext-doc-rendered"></div>
              <div class="wiki-ext-doc-raw-toggle mt-3">
                <button class="btn btn-sm btn-outline-secondary wiki-ext-raw-toggle-btn" type="button"
                  data-bs-toggle="collapse" data-bs-target="#${rawId}" aria-expanded="false" aria-controls="${rawId}">
                  <i class="bi bi-database"></i> Raw 데이터 보기
                </button>
              </div>
              <div class="collapse mt-2" id="${rawId}">
                <div class="wiki-ext-raw-data">
                  <div class="wiki-ext-raw-badge"><i class="bi bi-database"></i> ${escapeHtml(extPrefix)} raw 데이터</div>
                  <pre class="wiki-ext-raw-pre" id="ext-raw-pre"></pre>
                </div>
              </div>
            </div>`;

          // raw 데이터는 버튼 클릭 시에만 삽입 (지연 로드)
          const rawToggleBtn = contentEl.querySelector('.wiki-ext-raw-toggle-btn');
          const rawPreEl = contentEl.querySelector('#ext-raw-pre');
          let rawLoaded = false;
          rawToggleBtn.addEventListener('click', () => {
            if (!rawLoaded) {
              rawPreEl.textContent = page.content || '';
              rawLoaded = true;
            }
          });

          // 익스텐션 렌더러 호출 (비동기 로드 대기 포함)
          const renderedEl = document.getElementById('ext-doc-rendered');
          const extData = { content: page.content || '', slug: decodedSlugForExt };
          function _tryRenderExtDoc(retries) {
            if (!renderedEl || !renderedEl.isConnected) {
              return;
            }
            const renderer = window._extensionRenderers && window._extensionRenderers[extPrefix];
            if (renderer) {
              renderer(renderedEl, extData);
            } else if (retries > 0 && renderedEl.isConnected) {
              setTimeout(() => _tryRenderExtDoc(retries - 1), 200);
            } else if (renderedEl.isConnected) {
              renderedEl.innerHTML = `<div class="alert alert-warning"><i class="bi bi-exclamation-triangle"></i> ${escapeHtml(extPrefix)} 렌더러를 찾을 수 없습니다.</div>`;
            }
          }
          _tryRenderExtDoc(15);
        } else {
          await renderWikiContent(page.content || '', slug, 'articleContent', {
            showCategory: true,
            tocContainerId: 'tocContainer',
            tocNavId: 'tocNav',
            collapsibleSections: true
          });
        }

        // 틀(Template) 문서인 경우 자동으로 역링크 로드
        // 템플릿: 접두사는 역링크 추적이 불가능하므로 섹션 노출 안 함
        const decodedSlug = decodeURIComponent(slug);
        const trackableTemplatePrefixes = ['틀:', 'template:'];
        const isTemplate = trackableTemplatePrefixes.some(p => decodedSlug.toLowerCase().startsWith(p.toLowerCase()));
        if (isTemplate) {
          document.querySelector('#backlinksSection h5').innerHTML = '<i class="bi bi-link-45deg"></i> 이 틀을 사용하는 문서';
          await loadBacklinks(slug);
        } else {
          document.querySelector('#backlinksSection h5').innerHTML = '<i class="bi bi-link-45deg"></i> 이 문서를 참조하는 문서';
          document.getElementById('backlinksSection').classList.add('d-none');
          document.getElementById('backlinksList').innerHTML = '';
        }

        // 토론 배너: 열린 토론이 있으면 표시
        const bannerEl = document.getElementById('discussionBanner');
        const bannerLinkEl = document.getElementById('discussionBannerLink');
        bannerEl.classList.add('d-none');
        try {
          const discRes = await fetch(`/api/discussions/${page.id}?status=open`);
          if (discRes.ok) {
            const discData = await discRes.json();
            if (discData.discussions && discData.discussions.length > 0) {
              bannerLinkEl.href = `/w/${encodeURIComponent(actionSlug)}/discussions`;
              bannerEl.classList.remove('d-none');
            }
          }
        } catch (e) {
          // 배너 로딩 실패는 조용히 무시
        }

        // 상위 문서 네비게이션 (하위 문서인 경우)
        const parentDocsEl = document.getElementById('parentDocsNav');
        if (actionSlug.includes('/')) {
          const parts = actionSlug.split('/');
          const parentLinks = [];
          for (let i = 0; i < parts.length - 1; i++) {
            const parentSlug = parts.slice(0, i + 1).join('/');
            parentLinks.push(`<a href="/w/${encodeURIComponent(parentSlug)}" class="text-decoration-none wiki-spa-link">${escapeHtml(parts[i])}</a>`);
          }
          parentDocsEl.innerHTML = `<span class="text-muted me-1">상위 문서:</span>${parentLinks.join(' <span class="text-muted mx-1">/</span> ')}`;
          parentDocsEl.querySelectorAll('.wiki-spa-link').forEach(link => {
            link.addEventListener('click', function (event) {
              event.preventDefault();
              navigateTo(this.getAttribute('href'));
            });
          });
          parentDocsEl.classList.remove('d-none');
          document.getElementById('parentDocsNavDivider').classList.remove('d-none');
        } else {
          parentDocsEl.classList.add('d-none');
          parentDocsEl.innerHTML = '';
          document.getElementById('parentDocsNavDivider').classList.add('d-none');
        }

        hideAllPages();
        document.getElementById('articlePage').classList.remove('d-none');
        if (typeof window.__sidebarLayoutUpdate === 'function') window.__sidebarLayoutUpdate();

        // 페이지가 d-none을 벗어난 다음 프레임에 해시 스크롤 수행 (초기 진입 시 hideAllPages
        // 이후 articlePage가 노출되기 전이라 scrollIntoView가 no-op이 되는 문제 방지)
        if (window.location.hash) {
          requestAnimationFrame(() => scrollToHash());
        }

      } catch (err) {
        console.error(err);
        Swal.fire('오류', '문서를 불러오는 데 실패했습니다.', 'error');
        hideAllPages();
      }
    }

    // ── 카테고리 문서 (문서가 없는 경우) ──
    async function showCategoryArticle(slug, decodedSlug) {
      const categoryName = decodedSlug.replace(/^카테고리:/, '');
      const listHtml = await fetchCategoryList(categoryName);

      document.title = `${decodedSlug} - ${appConfig.wikiName}`;
      document.getElementById('articleTitle').textContent = decodedSlug;
      document.getElementById('articleMeta').innerHTML = '<span class="text-muted">아직 작성되지 않은 카테고리 문서입니다.</span>';

      const actions = `
        <button class="btn btn-outline-secondary" onclick="window.location.href='/edit.html?slug=${encodeURIComponent(slug).replace(/'/g, "%27")}'">
          <i class="bi bi-pencil-square"></i> 카테고리 설명 생성
        </button>
      `;
      document.getElementById('articleMainActions').innerHTML = actions;
      document.getElementById('articleMoreActions').innerHTML = '';
      document.getElementById('articleContent').innerHTML = listHtml;
      document.getElementById('tocContainer').classList.add('d-none');
      document.getElementById('backlinksSection').classList.add('d-none');
      document.getElementById('parentDocsNav').classList.add('d-none');
      document.getElementById('parentDocsNavDivider').classList.add('d-none');

      hideAllPages();
      document.getElementById('articlePage').classList.remove('d-none');
      if (typeof window.__sidebarLayoutUpdate === 'function') window.__sidebarLayoutUpdate();
    }

    // ── 백링크 로드 ──
    async function loadBacklinks(slug) {
      const section = document.getElementById('backlinksSection');
      const list = document.getElementById('backlinksList');

      try {
        const res = await fetch(`/api/w/${encodeURIComponent(slug)}/backlinks`);
        if (!res.ok) {
          section.classList.add('d-none');
          return false;
        }

        const data = await res.json();

        if (data.backlinks && data.backlinks.length > 0) {
          list.innerHTML = data.backlinks.map(bl => {
            const date = bl.updated_at ? new Date(bl.updated_at * 1000).toLocaleString('ko-KR') : '';
            const lockIcon = bl.is_locked ? ' <i class="bi bi-lock-fill text-danger" title="관리자 전용"></i>' : '';
            return `
              <a href="/w/${encodeURIComponent(bl.slug)}" onclick="navigateTo(this.href); return false;" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                  <div>
                      <span class="fw-bold">${escapeHtml(bl.title || bl.slug)}</span>
                      ${lockIcon}
                  </div>
                  <small class="text-muted">${date}</small>
              </a>
            `;
          }).join('');
          section.classList.remove('d-none');
          return true;
        } else {
          list.innerHTML = '<div class="text-muted text-center py-3">이 문서를 참조하는 문서가 없습니다.</div>';
          section.classList.add('d-none');
          return false;
        }
      } catch (e) {
        section.classList.add('d-none');
        return false;
      }
    }

    // ── 카테고리 보기 (문서로 이동) ──
    function showCategory(category) {
      navigateTo(`/w/카테고리:${category}`);
    }

    // ── 카테고리 목록 렌더링 ──
    async function fetchCategoryList(category) {
      try {
        const res = await fetch(`/api/w/category/${encodeURIComponent(category)}`);
        if (!res.ok) return '';

        const data = await res.json();
        if (data.pages.length === 0) {
          return '<div class="alert alert-light border text-center my-4">이 카테고리에 속한 문서가 없습니다.</div>';
        }

        // 트리 구조 빌드
        const tree = {};
        for (const page of data.pages) {
          const parts = page.slug.split('/');
          let node = tree;
          for (const part of parts) {
            if (!node[part]) node[part] = { _children: {}, _doc: null };
            node = node[part]._children;
          }
          let target = tree;
          for (let i = 0; i < parts.length; i++) {
            if (i === parts.length - 1) {
              target[parts[i]]._doc = page;
            } else {
              target = target[parts[i]]._children;
            }
          }
        }

        function renderTree(nodes, parentPrefix) {
          const entries = Object.keys(nodes).sort();
          let html = '';
          entries.forEach((key, idx) => {
            const node = nodes[key];
            const isLast = idx === entries.length - 1;
            const hasChildren = Object.keys(node._children).length > 0;
            const connector = isLast ? '└── ' : '├── ';
            const childPrefix = parentPrefix + (isLast ? '    ' : '│   ');

            if (node._doc) {
              html += `<div class="wiki-tree-line">${parentPrefix}${connector}` +
                `<a href="/w/${encodeURIComponent(node._doc.slug)}" onclick="navigateTo(this.href);return false;" class="text-decoration-none">${escapeHtml(key)}</a></div>`;
            } else {
              html += `<div class="wiki-tree-line">${parentPrefix}${connector}${escapeHtml(key)}</div>`;
            }

            if (hasChildren) {
              html += renderTree(node._children, childPrefix);
            }
          });
          return html;
        }

        const treeHtml = renderTree(tree, '');

        return `
            <div class="category-list mt-5">
                <h4><i class="bi bi-folder2-open"></i> "${escapeHtml(category)}" 카테고리에 속한 문서</h4>
                <div class="mt-3">${treeHtml}</div>
            </div>
        `;
      } catch (e) {
        console.error(e);
        return '<div class="alert alert-danger">카테고리 목록을 불러오는 데 실패했습니다.</div>';
      }
    }

    // ── 문서 이동/이름 변경 ──
    async function promptMove(slug) {
      // 1) 역링크 조회 (있으면 경고 다이얼로그 표시)
      let backlinks = [];
      try {
        const r = await fetch(`/api/w/${encodeURIComponent(slug)}/backlinks`);
        if (r.ok) backlinks = (await r.json()).backlinks || [];
      } catch (_) { /* 조회 실패 시 경고 없이 진행 (기존 동작 유지) */ }

      if (backlinks.length > 0) {
        // 반환된 모든 역링크(API는 최대 100개)를 스크롤 가능한 리스트로 표시
        const listHtml = backlinks.map(b =>
          `<li><a href="/w/${encodeURIComponent(b.slug)}" target="_blank" rel="noopener">${escapeHtml(b.title || b.slug)}</a></li>`
        ).join('');
        const ok = await Swal.fire({
          title: '연결된 문서 경고',
          html: `<p class="text-start">이 문서로 연결된 <b>${backlinks.length}개</b>의 문서가 있습니다.<br>이동 후 해당 링크들은 깨지게 됩니다. 직접 수정해야 합니다.</p>
                 <ul class="text-start" style="max-height:240px;overflow:auto">${listHtml}</ul>`,
          icon: 'warning',
          showCancelButton: true,
          confirmButtonText: '계속 진행',
          cancelButtonText: '취소'
        });
        if (!ok.isConfirmed) return;
      }

      const { value: newSlug } = await Swal.fire({
        title: '문서 이동/이름 변경',
        input: 'text',
        inputLabel: '새로운 문서 이름',
        inputValue: slug,
        showCancelButton: true,
        confirmButtonText: '이동',
        cancelButtonText: '취소',
        inputValidator: (value) => {
          const trimmed = value ? value.trim() : '';
          if (!trimmed) return '새 이름을 입력해주세요.';
          if (trimmed === slug) return '현재 이름과 동일합니다.';
          const currentNs = slug.includes(':') ? slug.split(':')[0] : '';
          const newNs = trimmed.includes(':') ? trimmed.split(':')[0] : '';
          if (slug.includes(':') && currentNs !== newNs) return '네임스페이스가 있는 문서는 다른 네임스페이스로 이동할 수 없습니다.';
        }
      });

      const trimmedSlug = newSlug ? newSlug.trim() : '';
      if (trimmedSlug) {
        try {
          const res = await fetch(`/api/w/${encodeURIComponent(slug)}/move`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ new_slug: trimmedSlug })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '이동 실패');

          Swal.fire('성공', '문서가 이동되었습니다.', 'success').then(() => {
            navigateTo(`/w/${encodeURIComponent(trimmedSlug)}`);
          });
        } catch (err) {
          Swal.fire('오류', err.message, 'error');
        }
      }
    }

    // ── 문서 삭제 ──
    async function confirmDelete(slug) {
      const isAdmin = currentUser && (currentUser.role === 'admin' || currentUser.role === 'super_admin');
      const isSuperAdmin = currentUser && currentUser.role === 'super_admin';

      const { value: formValues } = await Swal.fire({
        title: '문서 삭제',
        html: `
          <p>정말 "${escapeHtml(slug)}" 문서를 삭제하시겠습니까?</p>
          ${isSuperAdmin ? `
            <div class="form-check text-start d-inline-block">
              <input class="form-check-input" type="checkbox" id="hardDeleteCheck">
              <label class="form-check-label text-danger fw-bold" for="hardDeleteCheck">
                영구 삭제 (복구 불가)
              </label>
            </div>
          ` : ''}
        `,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        confirmButtonText: '삭제',
        cancelButtonText: '취소',
        preConfirm: () => {
          return {
            hard: isSuperAdmin ? document.getElementById('hardDeleteCheck').checked : false
          };
        }
      });

      if (formValues) {
        try {
          const query = formValues.hard ? '?hard=true' : '';
          const res = await fetch(`/api/w/${encodeURIComponent(slug)}${query}`, {
            method: 'DELETE'
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '삭제 실패');

          Swal.fire('삭제됨', data.message, 'success').then(() => {
            window.location.href = '/';
          });
        } catch (err) {
          Swal.fire('오류', err.message, 'error');
        }
      }
    }

    // ── 문서 영구 삭제 (최고 관리자) ──
    async function confirmHardDelete(slug) {
      const isSuperAdmin = currentUser && currentUser.role === 'super_admin';
      if (!isSuperAdmin) {
        Swal.fire('권한 없음', '영구 삭제는 최고 관리자만 가능합니다.', 'error');
        return;
      }

      const { isConfirmed } = await Swal.fire({
        title: '문서 영구 삭제',
        html: `<p>정말 "${escapeHtml(slug)}" 문서를 <b>영구 삭제</b>하시겠습니까?</p><p class="text-danger small">이 작업은 복구할 수 없습니다.</p>`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        confirmButtonText: '영구 삭제',
        cancelButtonText: '취소'
      });

      if (isConfirmed) {
        try {
          const res = await fetch(`/api/w/${encodeURIComponent(slug)}?hard=true`, {
            method: 'DELETE'
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '삭제 실패');

          Swal.fire('영구 삭제됨', data.message, 'success').then(() => {
            window.location.href = '/';
          });
        } catch (err) {
          Swal.fire('오류', err.message, 'error');
        }
      }
    }

    // ── 문서 복원 (관리자) ──
    async function restorePage(slug) {
      const isAdmin = currentUser && (currentUser.role === 'admin' || currentUser.role === 'super_admin');
      if (!isAdmin) {
        Swal.fire('권한 없음', '복구는 관리자만 가능합니다.', 'error');
        return;
      }

      const { isConfirmed } = await Swal.fire({
        title: '문서 복원',
        text: `"${escapeHtml(slug)}" 문서를 복원하시겠습니까?`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: '복원',
        cancelButtonText: '취소'
      });

      if (isConfirmed) {
        try {
          const res = await fetch(`/api/w/${encodeURIComponent(slug)}/restore`, {
            method: 'POST'
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '복원 실패');

          Swal.fire('복원됨', data.message, 'success').then(() => {
            window.location.href = `/w/${encodeURIComponent(slug)}`;
          });
        } catch (err) {
          Swal.fire('오류', err.message, 'error');
        }
      }
    }

    // ── 공유하기 기능 ──
    async function shareNative() {
      const cleanUrl = window.location.origin + window.location.pathname;
      const wikiName = typeof appConfig !== 'undefined' && appConfig.wikiName ? appConfig.wikiName : 'CloudWiki';
      const pageTitle = currentPage && currentPage.title ? currentPage.title : document.title;
      try {
        await navigator.share({
          title: `${wikiName} - ${pageTitle}`,
          text: `${wikiName} - ${pageTitle}`,
          url: cleanUrl
        });
      } catch (err) {
        if (err.name !== 'AbortError') {
          console.error('공유 실패:', err);
        }
      }
    }

    async function shareCopyLink() {
      const cleanUrl = window.location.origin + window.location.pathname;
      try {
        await navigator.clipboard.writeText(cleanUrl);
        Swal.fire({ icon: 'success', title: '복사 완료', text: '문서 링크가 클립보드에 복사되었습니다.', timer: 1500, showConfirmButton: false });
      } catch (err) {
        console.error('복사 실패:', err);
        Swal.fire('오류', '클립보드 복사에 실패했습니다.', 'error');
      }
    }

    async function shareCopyText() {
      const content = document.getElementById('articleContent');
      if (!content) return;
      try {
        const pageTitle = currentPage && currentPage.title ? currentPage.title : '';
        const textWithTitle = pageTitle ? pageTitle + '\n' + content.innerText : content.innerText;
        await navigator.clipboard.writeText(textWithTitle);
        Swal.fire({ icon: 'success', title: '복사 완료', text: '문서 내용이 클립보드에 복사되었습니다.', timer: 1500, showConfirmButton: false });
      } catch (err) {
        console.error('복사 실패:', err);
        Swal.fire('오류', '클립보드 복사에 실패했습니다.', 'error');
      }
    }

    async function shareCopyMarkdown() {
      if (!currentPage || !currentPage.content) {
        Swal.fire('오류', '문서 내용을 가져올 수 없습니다.', 'error');
        return;
      }
      try {
        const resolvedContent = await resolveTransclusionsForMarkdown(
          currentPage.content,
          currentPage.slug || currentSlug
        );
        const pageTitle = currentPage.title ? currentPage.title : '';
        const markdownWithTitle = pageTitle ? pageTitle + '\n\n' + resolvedContent : resolvedContent;
        await navigator.clipboard.writeText(markdownWithTitle);
        Swal.fire({ icon: 'success', title: '복사 완료', text: '마크다운 원문이 클립보드에 복사되었습니다.', timer: 1500, showConfirmButton: false });
      } catch (err) {
        console.error('복사 실패:', err);
        Swal.fire('오류', '클립보드 복사에 실패했습니다.', 'error');
      }
    }

    function sharePrint() {
      window.print();
    }

    // ── 네비게이션 ──
    function navigateTo(url) {
      // SPA는 위키 문서(/w/slug)와 루트(/)만 처리; 나머지는 풀 내비게이션
      const u = new URL(url, window.location.origin);
      const path = u.pathname;
      if (!path.match(/^\/w\/[^/]+$/) && path !== '/' && path !== '') {
        window.location.href = url;
        return;
      }
      history.pushState(null, '', url);
      _lastPath = u.pathname;
      _lastSearch = u.search;
      // 해시가 있으면 렌더 완료 후 showArticle 내부에서 scrollToHash() 처리
      if (!u.hash) {
        window.scrollTo({ top: 0, behavior: 'instant' });
      }
      route();
    }

    // 현재 URL의 해시에 해당하는 요소로 스크롤 (없으면 no-op)
    function scrollToHash() {
      const hash = window.location.hash;
      if (!hash || hash.length < 2) return;
      let id;
      try {
        id = decodeURIComponent(hash.slice(1));
      } catch (_) {
        id = hash.slice(1);
      }
      const el = id ? document.getElementById(id) : null;
      if (el) {
        el.scrollIntoView({ behavior: 'instant', block: 'start' });
      }
    }



    function goNewPage() {
      if (!currentUser) {
        Swal.fire({
          icon: 'info',
          title: '로그인 필요',
          text: '문서를 만들려면 먼저 로그인해주세요.',
          confirmButtonText: '로그인',
        }).then(result => {
          if (result.isConfirmed) window.location.href = '/login';
        });
        return;
      }

      Swal.fire({
        title: '새 문서 만들기',
        input: 'text',
        inputLabel: '문서 이름 (URL 경로)',
        inputPlaceholder: '예: my-first-page',
        showCancelButton: true,
        confirmButtonText: '만들기',
        cancelButtonText: '취소',
        inputValidator: (value) => {
          if (!value) return '문서 이름을 입력해주세요.';
          if (!/^[a-zA-Z0-9가-힣\-_ :]+$/.test(value)) return '영문, 한글, 숫자, -, _, 공백, 콜론(:) 만 사용 가능합니다.';
        }
      }).then(result => {
        if (result.isConfirmed) {
          window.location.href = `/edit.html?slug=${encodeURIComponent(result.value)}`;
        }
      });
    }

    // ── 유틸리티 ──

    function formatDate(ts) {
      return new Date(ts * 1000).toLocaleString('ko-KR');
    }

    // ── 최근 변경 내역 로드 ──
    // loadRecentChanges, getRelativeTime → common.js로 이동

    // ── 문서 주시 ──
    async function loadWatchStatus(slug) {
      try {
        const res = await fetch(`/api/w/${encodeURIComponent(slug)}/watch`);
        if (!res.ok) return;
        const data = await res.json();
        updateWatchUI(data.watching);
      } catch (e) { /* 무시 */ }
    }

    function updateWatchUI(watching) {
      const btn = document.getElementById('watchToggleBtn');
      const text = document.getElementById('watchToggleText');
      if (!btn || !text) return;
      const icon = btn.querySelector('i');
      if (watching) {
        text.textContent = '주시 해제';
        if (icon) { icon.className = 'bi bi-eye-fill'; }
      } else {
        text.textContent = '주시하기';
        if (icon) { icon.className = 'bi bi-eye'; }
      }
    }

    async function toggleWatch(slug) {
      try {
        const res = await fetch(`/api/w/${encodeURIComponent(slug)}/watch`, { method: 'POST' });
        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.error || '주시 설정 실패');
        }
        const data = await res.json();
        updateWatchUI(data.watching);
        const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1500 });
        Toast.fire({ icon: 'success', title: data.watching ? '문서를 주시합니다.' : '주시를 해제했습니다.' });
      } catch (err) {
        Swal.fire('오류', err.message, 'error');
      }
    }
  </script>

  <!-- 플로팅 목차 패널 -->
  <div class="toc-floating-panel" id="tocFloatingPanel">
    <div class="toc-floating-header">
      <span><i class="mdi mdi-format-list-bulleted-square me-1"></i> 목차</span>
      <button class="toc-floating-close" onclick="toggleFloatingToc()" title="닫기">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <nav class="toc-floating-body" id="tocFloatingNav"></nav>
  </div>

  <!-- 스크롤 FAB (뷰포트 고정, body 직전) -->
  <div class="scroll-fab-group" id="scrollFabGroup">
    <button class="scroll-fab" id="tocFabBtn" onclick="toggleFloatingToc()" title="목차">
      <i class="mdi mdi-format-list-bulleted-square"></i>
    </button>
    <button class="scroll-fab" id="scrollToTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="맨 위로">
      <i class="bi bi-chevron-up"></i>
    </button>
    <button class="scroll-fab" id="scrollToBottomBtn"
      onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})" title="맨 아래로">
      <i class="bi bi-chevron-down"></i>
    </button>
  </div>

  <script>
    function toggleFloatingToc() {
      const panel = document.getElementById('tocFloatingPanel');
      const tocSource = document.getElementById('tocNav');
      const floatingNav = document.getElementById('tocFloatingNav');
      const isVisible = panel.classList.contains('visible');

      if (!isVisible) {
        // 목차 내용이 없으면 표시하지 않음
        if (!tocSource || !tocSource.innerHTML.trim()) return;
        // 기존 tocNav 내용을 복제하여 표시
        floatingNav.innerHTML = tocSource.innerHTML;
        // 클릭 시 해당 위치로 이동 후 패널 닫기
        floatingNav.querySelectorAll('a').forEach(a => {
          a.addEventListener('click', () => {
            panel.classList.remove('visible');
          });
        });
      }

      panel.classList.toggle('visible');
    }

    // 문서 페이지가 아닐 때 TOC FAB 숨기기
    const _origHideAllPages = typeof hideAllPages === 'function' ? hideAllPages : null;
    document.addEventListener('DOMContentLoaded', () => {
      const observer = new MutationObserver(() => {
        const tocBtn = document.getElementById('tocFabBtn');
        const tocSource = document.getElementById('tocNav');
        const articlePage = document.getElementById('articlePage');
        if (tocBtn) {
          const hasToc = tocSource && tocSource.innerHTML.trim();
          const isArticle = articlePage && !articlePage.classList.contains('d-none');
          tocBtn.style.display = (hasToc && isArticle) ? '' : 'none';
        }
      });
      observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['class'] });
    });
  </script>
