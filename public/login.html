<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title class="app-wiki-name">CloudWiki - 로그인</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--wiki-bg);
      margin: 0;
      position: relative;
      overflow: hidden;
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 3rem 2rem;
      background: var(--wiki-glass-bg);
      backdrop-filter: var(--wiki-glass-blur);
      -webkit-backdrop-filter: var(--wiki-glass-blur);
      border: 1px solid var(--wiki-glass-border);
      border-radius: 24px;
      box-shadow: var(--wiki-shadow-lg);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 30px -5px rgba(0, 0, 0, 0.1), 0 10px 15px -6px rgba(0, 0, 0, 0.1);
    }

    .logo-img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 1.5rem;
      border-radius: 16px;
      box-shadow: var(--wiki-shadow-md);
      background: white;
      padding: 8px;
    }

    .welcome-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--wiki-text);
      margin-bottom: 0.5rem;
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
    }

    .message-text {
      font-size: 0.95rem;
      color: var(--wiki-text-muted);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--wiki-text);
      background: var(--wiki-card-bg);
      border: 1px solid var(--wiki-border);
      border-radius: 12px;
      transition: all 0.2s ease;
      text-decoration: none;
      box-shadow: var(--wiki-shadow-sm);
    }

    .btn-google:hover {
      background: var(--wiki-bg);
      border-color: var(--wiki-primary);
      transform: translateY(-2px);
      box-shadow: var(--wiki-shadow);
      color: var(--wiki-primary);
    }

    .google-icon {
      width: 24px;
      height: 24px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="wiki-logo-container" id="logoContainer">
      <!-- Logo injected by SSR -->
    </div>
    <h1 class="welcome-text"><span class="app-wiki-name">CloudWiki</span>에 오신 것을 환영합니다</h1>
    <p class="message-text" id="closedMessage">비공개 위키입니다. 로그인 후 이용해주세요.</p>

    <a href="/auth/google" class="btn-google">
      <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.16 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      로그인 / 회원가입
    </a>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const ssrDataEl = document.getElementById("ssr-data");
      if (ssrDataEl) {
        try {
          const data = JSON.parse(ssrDataEl.textContent);
          if (data.closedWikiMessage) {
            document.getElementById("closedMessage").textContent = data.closedWikiMessage;
          }
        } catch (e) {
          console.error("Failed to parse SSR data", e);
        }
      }
    });
  </script>
</body>
</html>
