<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title class="app-wiki-name">CloudWiki - 로그인</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800;900&family=Inter:wght@400;500;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--wiki-bg);
      margin: 0;
      position: relative;
      overflow: hidden;
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 3rem 2rem;
      background: var(--wiki-glass-bg);
      backdrop-filter: var(--wiki-glass-blur);
      -webkit-backdrop-filter: var(--wiki-glass-blur);
      border: 1px solid var(--wiki-glass-border);
      border-radius: 24px;
      box-shadow: var(--wiki-shadow-lg);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 30px -5px rgba(0, 0, 0, 0.1), 0 10px 15px -6px rgba(0, 0, 0, 0.1);
    }

    .logo-img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 1.5rem;
      border-radius: 16px;
      box-shadow: var(--wiki-shadow-md);
      background: white;
      padding: 8px;
    }

    .welcome-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--wiki-text);
      margin-bottom: 0.5rem;
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
    }

    .message-text {
      font-size: 0.95rem;
      color: var(--wiki-text-muted);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .btn-oauth {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--wiki-text);
      background: var(--wiki-card-bg);
      border: 1px solid var(--wiki-border);
      border-radius: 12px;
      transition: all 0.2s ease;
      text-decoration: none;
      box-shadow: var(--wiki-shadow-sm);
      margin-bottom: 10px;
    }

    .btn-oauth:last-child {
      margin-bottom: 0;
    }

    .btn-oauth:hover {
      background: var(--wiki-bg);
      border-color: var(--wiki-primary);
      transform: translateY(-2px);
      box-shadow: var(--wiki-shadow);
      color: var(--wiki-primary);
    }

    .oauth-icon {
      width: 24px;
      height: 24px;
    }
  </style>
</head>

<body style="-webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;">
  <div class="login-container">
    <div class="wiki-logo-container" id="logoContainer">
      <!-- Logo injected by SSR -->
    </div>
    <h1 class="welcome-text"><span class="app-wiki-name">CloudWiki</span>에 오신 것을 환영합니다</h1>
    <p class="message-text" id="loginMessage">비공개 위키입니다. 로그인 후 이용해주세요.</p>

    <div id="auth-providers-container">
      <!-- JS로 공급자 버튼 동적 주입 -->
    </div>

    <div class="mt-3 d-flex justify-content-center gap-3">
      <button type="button" id="btnTerms" class="btn btn-sm btn-link text-muted p-0"
        style="font-size:0.85rem;">이용약관</button>
      <button type="button" id="btnPrivacy" class="btn btn-sm btn-link text-muted p-0" style="font-size:0.85rem;">개인정보
        처리방침</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24"></script>
  <script type="module" src="/dist/login.js"></script>
</body>

</html>
