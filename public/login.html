<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title class="app-wiki-name">CloudWiki - 로그인</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800;900&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--wiki-bg);
      margin: 0;
      position: relative;
      overflow: hidden;
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 3rem 2rem;
      background: var(--wiki-glass-bg);
      backdrop-filter: var(--wiki-glass-blur);
      -webkit-backdrop-filter: var(--wiki-glass-blur);
      border: 1px solid var(--wiki-glass-border);
      border-radius: 24px;
      box-shadow: var(--wiki-shadow-lg);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 30px -5px rgba(0, 0, 0, 0.1), 0 10px 15px -6px rgba(0, 0, 0, 0.1);
    }

    .logo-img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 1.5rem;
      border-radius: 16px;
      box-shadow: var(--wiki-shadow-md);
      background: white;
      padding: 8px;
    }

    .welcome-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--wiki-text);
      margin-bottom: 0.5rem;
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
    }

    .message-text {
      font-size: 0.95rem;
      color: var(--wiki-text-muted);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .btn-oauth {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 600;
      color: var(--wiki-text);
      background: var(--wiki-card-bg);
      border: 1px solid var(--wiki-border);
      border-radius: 12px;
      transition: all 0.2s ease;
      text-decoration: none;
      box-shadow: var(--wiki-shadow-sm);
      margin-bottom: 10px;
    }

    .btn-oauth:last-child {
      margin-bottom: 0;
    }

    .btn-oauth:hover {
      background: var(--wiki-bg);
      border-color: var(--wiki-primary);
      transform: translateY(-2px);
      box-shadow: var(--wiki-shadow);
      color: var(--wiki-primary);
    }

    .oauth-icon {
      width: 24px;
      height: 24px;
    }
  </style>
</head>
<body style="-webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;">
  <div class="login-container">
    <div class="wiki-logo-container" id="logoContainer">
      <!-- Logo injected by SSR -->
    </div>
    <h1 class="welcome-text"><span class="app-wiki-name">CloudWiki</span>에 오신 것을 환영합니다</h1>
    <p class="message-text" id="loginMessage">비공개 위키입니다. 로그인 후 이용해주세요.</p>

    <div id="auth-providers-container">
      <!-- JS로 공급자 버튼 동적 주입 -->
    </div>

    <div class="mt-3 d-flex justify-content-center gap-3">
      <button type="button" id="btnTerms" class="btn btn-sm btn-link text-muted p-0" style="font-size:0.85rem;">이용약관</button>
      <button type="button" id="btnPrivacy" class="btn btn-sm btn-link text-muted p-0" style="font-size:0.85rem;">개인정보 처리방침</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    const providerConfig = {
      google: {
        label: 'Google로 로그인',
        icon: '<svg class="oauth-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.16 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>',
      },
      discord: {
        label: 'Discord로 로그인',
        icon: '<svg class="oauth-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.947 2.418-2.157 2.418z"/></svg>',
      },
    };

    async function renderProviders() {
      try {
        const res = await fetch('/api/auth/providers');
        const { providers } = await res.json();
        const container = document.getElementById('auth-providers-container');

        for (const p of providers) {
          const cfg = providerConfig[p.name];
          if (!cfg) continue;
          const a = document.createElement('a');
          const label = p.label || cfg.label;
          a.href = '/auth/' + p.name;
          a.className = 'btn-oauth';
          a.innerHTML = cfg.icon + '<span>' + label + '</span>';
          container.appendChild(a);
        }
      } catch (e) {
        console.error('Failed to load auth providers', e);
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      renderProviders();

      let ssrData = {};
      const ssrDataEl = document.getElementById("ssr-data");
      if (ssrDataEl) {
        try {
          ssrData = JSON.parse(ssrDataEl.textContent);
          if (ssrData.loginMessage) {
            document.getElementById("loginMessage").textContent = ssrData.loginMessage;
          }
        } catch (e) {
          console.error("Failed to parse SSR data", e);
        }
      }

      document.getElementById("btnTerms").addEventListener("click", () => {
        Swal.fire({
          title: "이용약관",
          text: ssrData.termsOfService || "이용약관 내용이 없습니다.",
          width: "80%",
          customClass: { popup: "text-start" },
          confirmButtonText: "닫기",
        });
      });

      document.getElementById("btnPrivacy").addEventListener("click", () => {
        Swal.fire({
          title: "개인정보 처리방침",
          text: ssrData.privacyPolicy || "개인정보 처리방침 내용이 없습니다.",
          width: "80%",
          customClass: { popup: "text-start" },
          confirmButtonText: "닫기",
        });
      });
    });
  </script>
</body>
</html>
