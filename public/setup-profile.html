<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="app-wiki-name">프로필 설정 - CloudWiki</title>
    <link rel="icon" id="wiki-favicon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        body {
            background-color: var(--wiki-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .setup-container {
            width: 100%;
            max-width: 480px;
            background: var(--wiki-card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 3rem 2rem;
            text-align: center;
            border: 1px solid var(--wiki-border);
        }

        .setup-icon {
            font-size: 4rem;
            color: var(--wiki-primary);
            margin-bottom: 1rem;
        }

        .setup-title {
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--wiki-text);
        }

        .setup-subtitle {
            color: var(--wiki-text-muted);
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .name-input {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            border: 2px solid var(--wiki-border);
            border-radius: 12px;
            transition: all 0.3s ease;
            background: var(--wiki-toc-bg);
            color: var(--wiki-text);
        }

        .name-input:focus {
            outline: none;
            border-color: var(--wiki-primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            background: var(--wiki-primary);
            color: #ffffff;
            border: none;
            transition: all 0.2s ease;
        }

        .submit-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .warning-text {
            font-size: 0.9rem;
            margin-top: 0.5rem;
            color: var(--wiki-text-muted);
        }
    </style>
</head>

<body>

    <div class="setup-container">
        <i class="mdi mdi-account-cog-outline setup-icon"></i>
        <h2 class="setup-title">환영합니다!</h2>
        <p class="setup-subtitle">CloudWiki에서 사용할 표시명을 설정해주세요.</p>

        <div class="form-group">
            <input type="text" id="nameInput" class="name-input" placeholder="새 표시 이름" autocomplete="off">
            <div id="statusMessage" class="warning-text"></div>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="saveProfile()">시작하기</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([loadConfig(), checkAuth()]);

            if (!currentUser) {
                window.location.href = '/auth/google';
                return;
            }

            // 구글에서 받아온 기본 이름 세팅
            document.getElementById('nameInput').value = currentUser.name;

            // 표시명 설정 상태(메시지) 확인
            try {
                const res = await fetch('/api/me/namechange-status');
                if (res.ok) {
                    const data = await res.json();
                    if (data.message) {
                        const statusEl = document.getElementById('statusMessage');
                        
                        // 변경 불가라는 말이 있으면 경고색으로
                        if (data.message.includes('불가능')) {
                            statusEl.innerHTML = '<i class="mdi mdi-alert-circle"></i> <span class="text-danger fw-bold">' + escapeHtml(data.message) + '</span>';
                        } else {
                            statusEl.innerHTML = '<i class="mdi mdi-information-outline"></i> ' + escapeHtml(data.message);
                        }
                    }
                }
            } catch (e) {
                console.error(e);
            }
        });

        async function saveProfile() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) {
                Swal.fire('오류', '이름을 입력해주세요.', 'warning');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 처리 중...';

            try {
                const res = await fetch('/api/me/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '저장에 실패했습니다.');

                Swal.fire({
                    icon: 'success',
                    title: '설정 완료!',
                    text: 'CloudWiki에 오신 것을 환영합니다.',
                    showConfirmButton: false,
                    timer: 1500
                }).then(() => {
                    window.location.href = '/';
                });
            } catch (err) {
                btn.disabled = false;
                btn.textContent = '시작하기';
                Swal.fire('오류', err.message, 'error');
            }
        }
    </script>
</body>

</html>
