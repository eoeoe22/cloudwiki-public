<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="app-wiki-name">관리자 콘솔 - 이미지 관리 - CloudWiki</title>
    <link rel="icon" id="wiki-favicon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .media-item {
            border: 1px solid var(--wiki-border);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--wiki-card-bg, #fff);
        }

        .media-item img,
        .media-item video {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .media-item-info {
            flex: 1;
            min-width: 0;
        }

        .media-item-info .filename {
            font-weight: 600;
            word-break: break-all;
        }

        .media-item-info .meta {
            font-size: 0.85em;
            color: var(--wiki-text-muted, #888);
        }
    </style>
</head>

<body>

    <!-- ── 네비게이션 바 Placeholder ── -->
    <div id="app-header-placeholder"></div>

    <div class="wiki-layout justify-content-center">
        <div class="wiki-container">
            <div class="admin-container">
                <div class="mb-4">
                    <a href="/admin" class="btn btn-outline-secondary btn-sm"><i class="mdi mdi-arrow-left"></i> 관리자 콘솔로 돌아가기</a>
                </div>

                <h2 class="mb-4"><i class="mdi mdi-image-multiple"></i> 이미지 관리</h2>
                <p class="text-muted mb-3">업로드된 이미지를 검색하고 관리할 수 있습니다.</p>

                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header py-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">이미지 목록</h5>
                            <div class="d-flex gap-2">
                                <input type="text" id="mediaSearchInput" class="form-control form-control-sm"
                                    placeholder="파일명 검색..." style="width: 250px;">
                                <button class="btn btn-sm btn-primary" onclick="searchMedia()">검색</button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="mediaList">
                            <div class="text-center text-muted py-3">불러오는 중...</div>
                        </div>
                        <div id="mediaLoadMoreContainer" class="text-center mt-3" style="display: none;">
                            <button class="btn btn-wiki-outline" onclick="loadMoreMedia()">
                                <i class="mdi mdi-arrow-down"></i> 더 로드하기
                            </button>
                        </div>
                        <div id="mediaTotalInfo" class="text-muted small text-center mt-2"></div>
                    </div>
                </div>

            </div>

            <aside class="wiki-sidebar" id="wikiSidebar">
                <div id="app-sidebar-placeholder"></div>
            </aside>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

        <script src="/js/common.js"></script>
        <script>

            document.addEventListener('DOMContentLoaded', async () => {
                await loadConfig();
                try {
                    const res = await fetch('/api/me');
                    if (!res.ok) throw new Error();
                    currentUser = await res.json();

                    if (currentUser.role !== 'admin' && currentUser.role !== 'super_admin') {
                        Swal.fire('접근 제한', '관리자만 접근할 수 있습니다.', 'error').then(() => {
                            window.location.href = '/';
                        });
                        return;
                    }

                    document.querySelectorAll('#userAvatar').forEach(el => el.src = currentUser.picture || '');
                    document.querySelectorAll('#userName').forEach(el => el.textContent = currentUser.name);

                    loadMedia();
                } catch (e) {
                    window.location.href = '/auth/google';
                }
            });

            // ── 이미지(미디어) 관리 ──
            var mediaOffset = 0;
            var mediaSearch = '';
            var mediaTotal = 0;
            var mediaItems = [];

            async function loadMedia(reset = true) {
                try {
                    if (reset) {
                        mediaOffset = 0;
                        mediaItems = [];
                    }

                    const params = new URLSearchParams({
                        limit: 10,
                        offset: mediaOffset
                    });
                    if (mediaSearch) params.append('search', mediaSearch);

                    const res = await fetch(`/api/admin/media?${params.toString()}`);
                    if (!res.ok) throw new Error('이미지 목록 로딩 실패');
                    const data = await res.json();

                    mediaTotal = data.total;
                    mediaItems = mediaItems.concat(data.media);
                    mediaOffset = mediaItems.length;

                    renderMedia();
                } catch (err) {
                    document.getElementById('mediaList').innerHTML =
                        '<div class="text-center text-danger py-3">이미지 목록을 불러올 수 없습니다.</div>';
                }
            }

            function searchMedia() {
                mediaSearch = document.getElementById('mediaSearchInput').value.trim();
                loadMedia(true);
            }

            document.getElementById('mediaSearchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchMedia();
            });

            function loadMoreMedia() {
                loadMedia(false);
            }

            function renderMedia() {
                const listEl = document.getElementById('mediaList');
                const loadMoreContainer = document.getElementById('mediaLoadMoreContainer');
                const totalInfo = document.getElementById('mediaTotalInfo');

                if (!mediaItems || mediaItems.length === 0) {
                    listEl.innerHTML = '<div class="text-center text-muted py-3">이미지가 없습니다.</div>';
                    loadMoreContainer.style.display = 'none';
                    totalInfo.textContent = '';
                    return;
                }

                listEl.innerHTML = mediaItems.map(m => {
                    const isVideo = m.mime_type && m.mime_type.startsWith('video/');
                    const publicUrl = m.r2_key ? `/media/${m.r2_key}` : '';
                    const preview = isVideo
                        ? `<video src="${publicUrl}" muted></video>`
                        : `<img src="${publicUrl}" alt="${escapeHtml(m.filename)}" loading="lazy">`;

                    const sizeStr = m.size < 1024 ? `${m.size} B`
                        : m.size < 1024 * 1024 ? `${(m.size / 1024).toFixed(1)} KB`
                            : `${(m.size / (1024 * 1024)).toFixed(1)} MB`;

                    const uploadDate = m.created_at
                        ? new Date(m.created_at * 1000).toLocaleString('ko-KR')
                        : '알 수 없음';

                    const uploaderName = m.uploader_name ? escapeHtml(m.uploader_name) : '알 수 없음';

                    return `
                    <div class="media-item" id="media-item-${m.id}">
                        ${preview}
                        <div class="media-item-info">
                            <div class="filename">${escapeHtml(m.filename)}</div>
                            <div class="meta">${sizeStr} · ${uploadDate} · 업로더: ${uploaderName}</div>
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-outline-info" data-id="${m.id}" data-filename="${escapeHtml(m.filename)}" onclick="trackBacklinks(+this.dataset.id, this.dataset.filename)"
                                title="역링크 추적">
                                <i class="mdi mdi-link-variant"></i> 역링크 추적
                            </button>
                            <button class="btn btn-sm btn-outline-danger" data-id="${m.id}" data-filename="${escapeHtml(m.filename)}" onclick="deleteMedia(+this.dataset.id, this.dataset.filename)"
                                title="삭제">
                                <i class="mdi mdi-delete"></i> 삭제
                            </button>
                        </div>
                    </div>
                `;
                }).join('');

                // 더 로드하기 버튼 표시/숨김
                if (mediaItems.length < mediaTotal) {
                    loadMoreContainer.style.display = 'block';
                } else {
                    loadMoreContainer.style.display = 'none';
                }

                totalInfo.textContent = `${mediaItems.length} / ${mediaTotal}개 표시 중`;
            }

            async function deleteMedia(id, filename) {
                const result = await Swal.fire({
                    title: '이미지 삭제',
                    text: `"${filename}" 이미지를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonText: '삭제',
                    cancelButtonText: '취소',
                    confirmButtonColor: '#d33'
                });

                if (result.isConfirmed) {
                    try {
                        const res = await fetch(`/api/admin/media/${id}`, { method: 'DELETE' });
                        const data = await res.json();
                        if (!res.ok) throw new Error(data.error || '삭제 실패');

                        // 삭제된 항목을 로컬 배열에서 제거
                        mediaItems = mediaItems.filter(m => m.id !== id);
                        mediaTotal--;
                        renderMedia();

                        Swal.fire({ icon: 'success', title: '삭제됨', showConfirmButton: false, timer: 1000 });
                    } catch (err) {
                        Swal.fire('오류', err.message, 'error');
                    }
                }
            }

            async function trackBacklinks(id, filename) {
                try {
                    Swal.fire({
                        title: '역링크 추적 중...',
                        text: '잠시만 기다려주세요.',
                        allowOutsideClick: false,
                        didOpen: () => {
                            Swal.showLoading();
                        }
                    });

                    const res = await fetch(`/api/admin/media/${id}/backlinks`);
                    if (!res.ok) {
                        const data = await res.json();
                        throw new Error(data.error || '역링크 추적 실패');
                    }
                    const data = await res.json();

                    let htmlContent = '';
                    if (data.backlinks && data.backlinks.length > 0) {
                        htmlContent = '<ul class="list-group text-start mt-3" style="max-height: 300px; overflow-y: auto;">';
                        data.backlinks.forEach(page => {
                            htmlContent += `
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    <a href="/wiki/${encodeURIComponent(page.slug)}" target="_blank" class="text-decoration-none">
                                        ${escapeHtml(page.title)}
                                    </a>
                                    <span class="badge bg-secondary rounded-pill">문서</span>
                                </li>`;
                        });
                        htmlContent += '</ul>';
                    } else {
                        htmlContent = '<div class="alert alert-info mt-3 mb-0">이 이미지를 사용 중인 문서가 없습니다.</div>';
                    }

                    Swal.fire({
                        title: '역링크 추적 결과',
                        html: `<strong>${escapeHtml(filename)}</strong> 사용 문서 목록<br>` + htmlContent,
                        width: '600px',
                        confirmButtonText: '닫기'
                    });

                } catch (err) {
                    Swal.fire('오류', err.message, 'error');
                }
            }

        </script>
</body>

</html>
