<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="app-wiki-name">검색 결과 - CloudWiki</title>
    <link rel="icon" id="wiki-favicon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <!-- ── 네비게이션 바 Placeholder ── -->
    <div id="app-header-placeholder"></div>

    <div class="wiki-layout">
        <div class="wiki-container">
            <div class="wiki-article">

                <div class="d-flex justify-content-between align-items-center mb-1">
                    <h2 class="mb-0" id="searchTitle">
                        <i class="mdi mdi-magnify"></i> 검색 결과
                    </h2>
                    <button type="button" class="btn btn-wiki-outline btn-sm" onclick="history.back()">
                        <i class="bi bi-arrow-left"></i> 뒤로
                    </button>
                </div>
                <p class="text-muted mb-4" id="searchQuery"></p>

                <!-- 로딩 -->
                <div id="loading" class="wiki-loading">
                    <div class="spinner-border text-primary" role="status"></div>
                    <span>검색 중...</span>
                </div>

                <!-- 결과 없음 -->
                <div id="noResults" class="d-none text-center py-5">
                    <h4 class="text-muted">검색 결과가 없습니다</h4>
                    <p class="text-muted">다른 키워드로 검색해 보세요.</p>
                </div>

                <!-- 결과 목록 -->
                <div id="resultsList"></div>
            </div>
        </div>

        <!-- 오른쪽 사이드바 (PC 전용 오프캔버스 컨테이너) -->
        <aside class="wiki-sidebar" id="wikiSidebar">
            <div id="app-sidebar-placeholder"></div>
        </aside>
    </div>

    <!-- ── 푸터 Placeholder ── -->
    <div id="app-footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/common.js"></script>
    <script>

        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([loadConfig(), checkAuth()]);
            const params = new URLSearchParams(window.location.search);
            const q = params.get('q') || '';
            const mode = params.get('mode') || 'content';

            const searchInput = document.getElementById('searchInput');
            if (searchInput) searchInput.value = q;
            document.getElementById('searchQuery').textContent = q ? `"${q}" 검색 결과` : '';

            if (q) {
                performSearch(q, mode);
            } else {
                document.getElementById('loading').classList.add('d-none');
            }
        });

        async function performSearch(q, mode) {
            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&mode=${encodeURIComponent(mode)}`);
                const data = await res.json();

                // 정확한 제목 일치 시 바로 문서로 이동
                if (data.redirect) {
                    window.location.href = data.redirect;
                    return;
                }

                document.getElementById('loading').classList.add('d-none');

                const exactMatch = (data.results || []).find(r => r.title.toLowerCase() === q.toLowerCase());

                const listEl = document.getElementById('resultsList');
                let newDocumentButtonHtml = '';
                if (!exactMatch && q.trim() !== '') {
                    newDocumentButtonHtml = `
                    <div class="mb-4">
                        <div class="alert alert-light border d-flex justify-content-between align-items-center">
                            <span><strong>"${escapeHtml(q)}"</strong> 문서가 아직 존재하지 않습니다.</span>
                            <button class="btn btn-wiki" onclick="window.location.href='/edit.html?slug=${encodeURIComponent(q).replace(/'/g, "%27")}'">
                                <i class="bi bi-pencil-square"></i> 새 문서 만들기
                            </button>
                        </div>
                    </div>`;
                }

                if (!data.results || data.results.length === 0) {
                    document.getElementById('noResults').classList.remove('d-none');
                    listEl.innerHTML = newDocumentButtonHtml;
                    return;
                }

                if (data.mode === 'category') {
                    // 카테고리 검색 결과: 스니펫 없이 제목 목록
                    listEl.innerHTML = newDocumentButtonHtml + data.results.map(r => `
                        <div class="search-result-item mb-3 pb-2 border-bottom">
                            <h4 class="mb-0 fs-5">
                                <a class="text-decoration-none text-primary fw-semibold" href="/wiki/${encodeURIComponent(r.slug)}">${escapeHtml(r.title)}</a>
                                ${r.isDeleted ? '<span class="badge bg-danger ms-2">삭제됨</span>' : ''}
                            </h4>
                        </div>
                    `).join('');
                } else {
                    // 제목+내용 검색 결과
                    listEl.innerHTML = newDocumentButtonHtml + data.results.map(r => {
                        return `
                            <div class="search-result-item mb-4 pb-3 border-bottom">
                                <h4 class="mb-2 fs-5">
                                    <a class="text-decoration-none text-primary fw-semibold" href="/wiki/${encodeURIComponent(r.slug)}">${escapeHtml(r.title)}</a>
                                    ${r.isDeleted ? '<span class="badge bg-danger ms-2">삭제됨</span>' : ''}
                                </h4>
                                <p class="snippet text-body mb-0" style="line-height: 1.6;">${r.snippet || ''}</p>
                            </div>
                        `;
                    }).join('');
                }

                document.getElementById('searchTitle').innerHTML =
                    `<i class="mdi mdi-magnify"></i> 검색 결과 (${data.results.length}건)`;

            } catch (err) {
                document.getElementById('loading').classList.add('d-none');
                document.getElementById('noResults').classList.remove('d-none');
                console.error('검색 실패', err);
                // Assuming Swal is defined elsewhere, if not, this will cause an error.
                // If Swal is not available, this line should be removed or commented out.
                // Swal.fire('오류', '검색 중 오류가 발생했습니다.', 'error');
            }
        }

    </script>

</body>

</html>
