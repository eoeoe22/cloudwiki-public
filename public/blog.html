<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CloudWiki">
  <meta property="og:title" content="CloudWiki">
  <meta property="og:description" content="CloudWiki">
  <meta property="og:site_name" content="CloudWiki">
  <meta property="og:type" content="website">
  <title class="app-wiki-name">블로그 - CloudWiki</title>
  <link rel="icon" class="app-wiki-favicon" href="/favicon.ico">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script>try{var t=localStorage.getItem('themeMode');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
  <link rel="stylesheet" href="/render.css">
</head>

<body style="-webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;">

  <!-- ── 네비게이션 바 Placeholder ── -->
  <div id="app-header-placeholder"></div>

  <!-- ── 메인 레이아웃 ── -->
  <div class="wiki-layout">
    <div class="wiki-container">

      <!-- 로딩 -->
      <div id="blogLoading" class="wiki-loading">
        <div class="spinner-border text-primary" role="status"></div>
        <span>불러오는 중...</span>
      </div>

      <!-- 블로그 목록 -->
      <div id="blogList" class="d-none">
        <div class="wiki-article">
          <div class="d-flex align-items-center justify-content-between mb-4">
            <h1 class="wiki-article-title mb-0">블로그</h1>
            <div id="blogAdminActions" class="d-none">
              <a href="/blog-edit" class="btn btn-wiki btn-sm">
                <i class="bi bi-pencil-square me-1"></i>새 포스트
              </a>
            </div>
          </div>
          <div id="blogPostsList"></div>
          <div id="blogPagination" class="mt-4 d-flex justify-content-center gap-2"></div>
        </div>
      </div>

      <!-- 블로그 포스트 열람 -->
      <div id="blogPost" class="d-none">
        <div class="wiki-article">
          <h1 class="wiki-article-title mb-0" id="blogPostTitle"></h1>
          <div class="wiki-article-meta mb-3">
            <span id="blogPostDate" class="text-muted small"></span>
          </div>

          <!-- 관리자 액션 + 공유하기 드롭다운 -->
          <div class="d-flex justify-content-end mb-2 gap-2 flex-wrap">
            <div id="blogPostAdminActions" class="d-none d-flex gap-2" role="group" aria-label="관리자 액션">
              <button id="blogPostAnnounceBtn" class="btn btn-wiki d-none" onclick="announceBlogPost()">
                <i class="bi bi-megaphone me-1"></i>공지 발행
              </button>
              <button id="blogPostUnannounceBtn" class="btn btn-wiki d-none" onclick="unannounceBlogPost()">
                <i class="bi bi-megaphone-fill me-1"></i>공지 취소
              </button>
              <a id="blogPostEditBtn" href="#" class="btn btn-wiki">
                <i class="bi bi-pencil me-1"></i>수정
              </a>
              <button class="btn btn-wiki btn-wiki-danger" onclick="deleteBlogPost()">
                <i class="bi bi-trash me-1"></i>삭제
              </button>
            </div>
            <div class="dropdown">
              <button class="btn btn-secondary dropdown-toggle no-caret" type="button" id="shareDropdown"
                data-bs-toggle="dropdown" data-bs-display="static" data-bs-flip="false" aria-expanded="false"
                title="공유하기">
                <i class="bi bi-share"></i>
              </button>
              <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="shareDropdown">
                <li><button class="dropdown-item" onclick="shareNative()">
                    <i class="bi bi-share"></i> 공유하기
                  </button></li>
                <li>
                  <hr class="dropdown-divider">
                </li>
                <li><button class="dropdown-item" onclick="shareCopyLink()">
                    <i class="bi bi-link"></i> 링크 복사하기
                  </button></li>
                <li><button class="dropdown-item" onclick="shareCopyText()">
                    <i class="bi bi-copy"></i> 문서 텍스트 복사
                  </button></li>
                <li><button class="dropdown-item" onclick="shareCopyMarkdown()">
                    <i class="bi bi-markdown"></i> 문서 복사 (마크다운)
                  </button></li>
                <li><button class="dropdown-item" onclick="sharePrint()">
                    <i class="bi bi-printer"></i> 인쇄하기
                  </button></li>
                <li>
                  <hr class="dropdown-divider">
                </li>
                <li><button class="dropdown-item" onclick="shareAskClaude()">
                    <i class="bi bi-claude"></i> Claude에게 질문하기
                  </button></li>
                <li><button class="dropdown-item" onclick="shareAskChatGPT()">
                    <i class="bi bi-openai"></i> ChatGPT에게 질문하기
                  </button></li>
              </ul>
            </div>
          </div>

          <div id="blogPostContent" class="wiki-content"></div>
          <div class="mt-4">
            <a href="/blog" class="btn btn-secondary btn-sm">
              <i class="bi bi-arrow-left me-1"></i>목록으로
            </a>
          </div>
        </div>
      </div>

      <!-- 에러 -->
      <div id="blogError" class="d-none">
        <div class="wiki-article">
          <h1 class="wiki-article-title">포스트를 찾을 수 없습니다</h1>
          <p class="text-muted">존재하지 않거나 삭제된 포스트입니다.</p>
          <a href="/blog" class="btn btn-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>목록으로
          </a>
        </div>
      </div>

    </div>
    <!-- 오른쪽 사이드바 (PC 전용 오프캔버스 컨테이너 및 최근 변경) -->
    <aside class="wiki-sidebar" id="wikiSidebar">
      <!-- 사이드바 네비게이션 (모바일 오프캔버스 렌더링 영역 공유) -->
      <div id="app-sidebar-placeholder"></div>

      <!-- 실시간 트렌딩 -->
      <div class="mb-4">
        <div class="sidebar-section">
          <h6 class="sidebar-title d-flex justify-content-between align-items-center mb-2">
            <span><i class="bi bi-graph-up-arrow text-danger"></i> 실시간 트렌딩</span>
            <a href="#" class="small text-muted text-decoration-none trending-expand-btn" style="font-size: 0.8rem;">펼치기
              <i class="bi bi-chevron-down"></i></a>
          </h6>
          <div class="position-relative overflow-hidden trending-ticker-wrapper" style="height: 38px;">
            <div id="trendingListPc" class="trending-container trending-ticker-list">
              <div class="placeholder-glow px-2 py-2">
                <span class="placeholder w-100 d-block" style="height: 1.5rem; border-radius: 4px;"></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 최근 변경 -->
      <div class="mb-4">
        <div class="sidebar-section">
          <h6 class="sidebar-title"><i class="bi bi-clock-history"></i> 최근 변경</h6>
          <div id="recentChangesListPc" class="recent-changes-list recent-changes-container">
            <div class="placeholder-glow">
              <span class="placeholder w-100 d-block mb-2" style="height: 2.5rem; border-radius: 6px;"></span>
              <span class="placeholder w-100 d-block mb-2" style="height: 2.5rem; border-radius: 6px;"></span>
              <span class="placeholder w-100 d-block" style="height: 2.5rem; border-radius: 6px;"></span>
            </div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <!-- ── 푸터 Placeholder ── -->
  <div id="app-footer-placeholder"></div>

  <!-- 아이콘 피커 모달 (공지 발행 시 아이콘 선택) -->
  <div class="modal fade" id="iconPickerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">
            <i id="iconPickerTypeIcon" class="mdi mdi-material-design me-2"></i>
            <span id="iconPickerTitle">아이콘 선택</span>
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="d-flex gap-2 mb-2">
            <button type="button" id="iconPickerTabMdi" class="btn btn-sm btn-outline-primary active">MDI</button>
            <button type="button" id="iconPickerTabBi" class="btn btn-sm btn-outline-primary">Bootstrap</button>
            <button type="button" id="iconPickerNoneBtn" class="btn btn-sm btn-outline-secondary ms-auto">
              <i class="bi bi-x me-1"></i>아이콘 없음
            </button>
          </div>
          <input type="text" id="iconSearchInput" class="form-control mb-3" placeholder="아이콘 이름 검색...">
          <div id="iconLoadingSpinner" class="text-center py-4" style="display:none;">
            <span class="spinner-border text-primary" role="status"></span>
            <p class="mt-2 text-muted small">아이콘 목록 로딩 중...</p>
          </div>
          <div id="iconPickerGrid" class="icon-grid-modal"></div>
          <div id="iconPickerEmpty" class="text-center text-muted py-3" style="display:none;">
            <i class="mdi mdi-magnify-close" style="font-size:2rem;"></i>
            <p class="mt-1">검색 결과가 없습니다.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@18.0.3/lib/marked.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.2/dist/purify.min.js"></script>
  <script type="module" src="/dist/common.js"></script>
  <script type="module" src="/dist/render.js"></script>
  <script type="module" src="/dist/icon-picker.js"></script>
  <script>
    const BLOG_LIST_LIMIT = 20;
    let blogCurrentOffset = 0;
    let blogTotalCount = 0;
    let currentBlogPostId = null;
    let currentBlogPost = null;

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatDate(unixTs) {
      const d = new Date(unixTs * 1000);
      return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function showView(id) {
      ['blogLoading', 'blogList', 'blogPost', 'blogError'].forEach(v => {
        document.getElementById(v).classList.add('d-none');
      });
      document.getElementById(id).classList.remove('d-none');
    }

    // ── 블로그 목록 로드 ──
    async function loadBlogList(offset) {
      showView('blogLoading');
      blogCurrentOffset = offset || 0;
      try {
        const res = await fetch(`/api/blog?limit=${BLOG_LIST_LIMIT}&offset=${blogCurrentOffset}`);
        if (!res.ok) throw new Error('목록 로드 실패');
        const data = await res.json();
        blogTotalCount = data.total || 0;

        const listEl = document.getElementById('blogPostsList');
        if (!data.posts || data.posts.length === 0) {
          listEl.innerHTML = '<p class="text-muted">포스트가 없습니다.</p>';
        } else {
          listEl.innerHTML = data.posts.map(post => `
            <div class="border-bottom pb-3 mb-3 d-flex gap-3 align-items-start ${post.deleted_at ? 'opacity-50' : ''}">
              <div class="flex-grow-1 min-w-0">
                <a href="/blog/${escHtml(post.id)}" class="text-decoration-none">
                  <h5 class="mb-1">${escHtml(post.title)}${post.deleted_at ? ' <span class="badge bg-danger small">삭제됨</span>' : ''}</h5>
                </a>
                <small class="text-muted">${formatDate(post.created_at)}</small>
              </div>
              ${post.thumbnail ? `<a href="/blog/${escHtml(post.id)}" class="flex-shrink-0">
                <img src="${escHtml(post.thumbnail)}" alt="" loading="lazy"
                  style="width:120px;height:80px;object-fit:cover;border-radius:6px;display:block;">
              </a>` : ''}
            </div>
          `).join('');
        }

        // 페이지네이션
        const pagEl = document.getElementById('blogPagination');
        pagEl.innerHTML = '';
        if (blogCurrentOffset > 0) {
          const prevBtn = document.createElement('button');
          prevBtn.className = 'btn btn-secondary btn-sm';
          prevBtn.innerHTML = '<i class="bi bi-chevron-left"></i> 이전';
          prevBtn.onclick = () => loadBlogList(blogCurrentOffset - BLOG_LIST_LIMIT);
          pagEl.appendChild(prevBtn);
        }
        if (blogCurrentOffset + BLOG_LIST_LIMIT < blogTotalCount) {
          const nextBtn = document.createElement('button');
          nextBtn.className = 'btn btn-secondary btn-sm';
          nextBtn.innerHTML = '다음 <i class="bi bi-chevron-right"></i>';
          nextBtn.onclick = () => loadBlogList(blogCurrentOffset + BLOG_LIST_LIMIT);
          pagEl.appendChild(nextBtn);
        }

        showView('blogList');
        document.title = '블로그 - ' + (window.appConfig?.wikiName || 'CloudWiki');
      } catch (e) {
        Swal.fire('오류', e.message, 'error');
        showView('blogList');
      }
    }

    // ── 블로그 포스트 열람 ──
    async function loadBlogPost(id) {
      showView('blogLoading');
      currentBlogPostId = id;
      try {
        const res = await fetch(`/api/blog/${id}`);
        if (!res.ok) { showView('blogError'); return; }
        const post = await res.json();
        currentBlogPost = post;

        document.getElementById('blogPostTitle').textContent = post.title;
        document.getElementById('blogPostDate').textContent = formatDate(post.created_at);
        document.getElementById('blogPostEditBtn').href = `/blog-edit?id=${post.id}`;
        document.title = escHtml(post.title) + ' - ' + (window.appConfig?.wikiName || 'CloudWiki');

        // 현재 공지 발행 여부 동기화
        syncAnnounceButtons(post.id);

        // 위키 문법 렌더링
        await renderWikiContent(post.content || '', post.title, 'blogPostContent', { palettes: post.used_palettes || null });

        showView('blogPost');
      } catch (e) {
        showView('blogError');
      }
    }

    // ── 공지 발행/취소 ──
    function syncAnnounceButtons(postId) {
      const list = Array.isArray(window.appConfig?.announcements) ? window.appConfig.announcements : [];
      const isCurrent = list.some(a => Number(a.postId) === Number(postId));
      const a = document.getElementById('blogPostAnnounceBtn');
      const u = document.getElementById('blogPostUnannounceBtn');
      if (!a || !u) return;
      a.classList.toggle('d-none', isCurrent);
      u.classList.toggle('d-none', !isCurrent);
    }

    // 공지 발행 다이얼로그 — 제목 + 아이콘 선택 지원
    let announceIconClass = null;

    async function announceBlogPost() {
      if (!currentBlogPostId) return;
      const defaultTitle = document.getElementById('blogPostTitle')?.textContent?.trim() || '';
      announceIconClass = null;

      const renderIconLabel = (cls) => {
        if (!cls) return '<i class="mdi mdi-bullhorn"></i> 기본';
        return `<i class="${cls}"></i> ${cls.replace(/^(mdi mdi-|bi bi-)/, '')}`;
      };

      const result = await Swal.fire({
        title: '공지로 발행',
        html: `
          <div class="text-start">
            <label class="form-label small mb-1">배너 제목</label>
            <input id="announceTitleInput" type="text" class="form-control mb-3" maxlength="200" value="${escHtml(defaultTitle)}">
            <label class="form-label small mb-1">아이콘</label>
            <div class="d-flex gap-2 align-items-center">
              <button type="button" id="announceIconBtn" class="btn btn-outline-secondary btn-sm flex-grow-1">
                <span id="announceIconLabel">${renderIconLabel(null)}</span>
              </button>
              <button type="button" id="announceIconClearBtn" class="btn btn-outline-secondary btn-sm" title="기본 아이콘으로 초기화">
                <i class="bi bi-x"></i>
              </button>
            </div>
          </div>
        `,
        showCancelButton: true,
        confirmButtonText: '발행',
        cancelButtonText: '취소',
        didOpen: () => {
          const iconBtn = document.getElementById('announceIconBtn');
          const iconLabel = document.getElementById('announceIconLabel');
          const iconClearBtn = document.getElementById('announceIconClearBtn');
          if (iconBtn) iconBtn.addEventListener('click', async () => {
            if (typeof window.pickWikiIcon !== 'function') return;
            const picked = await window.pickWikiIcon();
            announceIconClass = picked;
            if (iconLabel) iconLabel.innerHTML = renderIconLabel(picked);
          });
          if (iconClearBtn) iconClearBtn.addEventListener('click', () => {
            announceIconClass = null;
            if (iconLabel) iconLabel.innerHTML = renderIconLabel(null);
          });
        },
        preConfirm: () => {
          const titleEl = document.getElementById('announceTitleInput');
          const t = (titleEl?.value || '').trim();
          if (!t) { Swal.showValidationMessage('제목을 입력하세요.'); return false; }
          if (t.length > 200) { Swal.showValidationMessage('200자 이하로 입력하세요.'); return false; }
          return { title: t, icon: announceIconClass };
        },
      });
      if (!result.isConfirmed) return;

      const { title, icon } = result.value || {};
      try {
        const res = await fetch(`/api/blog/${currentBlogPostId}/announce`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, icon: icon || null }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || '발행 실패');
        }
        Swal.fire({ icon: 'success', title: '공지로 발행됨', timer: 1000, showConfirmButton: false });
        await loadConfig();
        syncAnnounceButtons(currentBlogPostId);
      } catch (e) {
        Swal.fire('오류', e.message, 'error');
      }
    }

    async function unannounceBlogPost() {
      try {
        const res = await fetch('/api/blog/announcement/cancel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ postId: currentBlogPostId }),
        });
        if (!res.ok) throw new Error('취소 실패');
        Swal.fire({ icon: 'success', title: '공지 취소됨', timer: 1000, showConfirmButton: false });
        await loadConfig();
        syncAnnounceButtons(currentBlogPostId);
      } catch (e) {
        Swal.fire('오류', e.message, 'error');
      }
    }

    // ── 블로그 포스트 삭제 ──
    async function deleteBlogPost() {
      if (!currentBlogPostId) return;
      const result = await Swal.fire({
        title: '포스트를 삭제하시겠습니까?',
        text: '삭제된 포스트는 관리자만 볼 수 있습니다.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: '삭제',
        cancelButtonText: '취소',
        confirmButtonColor: '#d33',
      });
      if (!result.isConfirmed) return;

      try {
        const res = await fetch(`/api/blog/${currentBlogPostId}`, { method: 'DELETE' });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || '삭제 실패');
        }
        await Swal.fire({ icon: 'success', title: '삭제되었습니다.', timer: 1500, showConfirmButton: false });
        window.location.href = '/blog';
      } catch (e) {
        Swal.fire('오류', e.message, 'error');
      }
    }

    // ── 공유하기 기능 ──
    function getShareTitle() {
      return currentBlogPost && currentBlogPost.title ? currentBlogPost.title : document.title;
    }

    async function shareNative() {
      const cleanUrl = window.location.origin + window.location.pathname;
      const wikiName = typeof appConfig !== 'undefined' && appConfig.wikiName ? appConfig.wikiName : 'CloudWiki';
      const postTitle = getShareTitle();
      try {
        await navigator.share({
          title: `${wikiName} - ${postTitle}`,
          text: `${wikiName} - ${postTitle}`,
          url: cleanUrl
        });
      } catch (err) {
        if (err.name !== 'AbortError') {
          console.error('공유 실패:', err);
        }
      }
    }

    async function shareCopyLink() {
      const cleanUrl = window.location.origin + window.location.pathname;
      try {
        await navigator.clipboard.writeText(cleanUrl);
        Swal.fire({ icon: 'success', title: '복사 완료', text: '포스트 링크가 클립보드에 복사되었습니다.', timer: 1500, showConfirmButton: false });
      } catch (err) {
        console.error('복사 실패:', err);
        Swal.fire('오류', '클립보드 복사에 실패했습니다.', 'error');
      }
    }

    async function shareCopyText() {
      const content = document.getElementById('blogPostContent');
      if (!content) return;
      try {
        const postTitle = getShareTitle();
        const textWithTitle = postTitle ? postTitle + '\n' + content.innerText : content.innerText;
        await navigator.clipboard.writeText(textWithTitle);
        Swal.fire({ icon: 'success', title: '복사 완료', text: '포스트 내용이 클립보드에 복사되었습니다.', timer: 1500, showConfirmButton: false });
      } catch (err) {
        console.error('복사 실패:', err);
        Swal.fire('오류', '클립보드 복사에 실패했습니다.', 'error');
      }
    }

    async function shareCopyMarkdown() {
      if (!currentBlogPost || typeof currentBlogPost.content !== 'string') {
        Swal.fire('오류', '포스트 내용을 가져올 수 없습니다.', 'error');
        return;
      }
      try {
        let resolvedContent = currentBlogPost.content;
        if (typeof window.resolveTransclusionsForMarkdown === 'function') {
          resolvedContent = await window.resolveTransclusionsForMarkdown(
            currentBlogPost.content,
            currentBlogPost.title || ''
          );
        }
        const postTitle = getShareTitle();
        const markdownWithTitle = postTitle ? postTitle + '\n\n' + resolvedContent : resolvedContent;
        await navigator.clipboard.writeText(markdownWithTitle);
        Swal.fire({ icon: 'success', title: '복사 완료', text: '마크다운 원문이 클립보드에 복사되었습니다.', timer: 1500, showConfirmButton: false });
      } catch (err) {
        console.error('복사 실패:', err);
        Swal.fire('오류', '클립보드 복사에 실패했습니다.', 'error');
      }
    }

    function sharePrint() {
      window.print();
    }

    function shareAskClaude() {
      const cleanUrl = window.location.origin + window.location.pathname;
      const prompt = '다음 블로그 페이지를 읽고 내용에 대한 질문에 답해줘: ' + cleanUrl;
      window.open('https://claude.ai/new?q=' + encodeURIComponent(prompt), '_blank');
    }

    function shareAskChatGPT() {
      const cleanUrl = window.location.origin + window.location.pathname;
      const prompt = '다음 블로그 페이지를 읽고 내용에 대한 질문에 답해줘: ' + cleanUrl;
      window.open('https://chatgpt.com/?q=' + encodeURIComponent(prompt), '_blank');
    }

    // ── 초기화 ──
    document.addEventListener('DOMContentLoaded', async () => {
      await loadConfig();

      // 사이드바: 실시간 트렌딩 / 최근 변경
      if (typeof loadTrending === 'function') loadTrending();
      if (typeof loadRecentChanges === 'function') loadRecentChanges();

      // 관리자 UI 표시
      const user = currentUser;
      if (user && (user.role === 'admin' || user.role === 'super_admin')) {
        document.getElementById('blogAdminActions').classList.remove('d-none');
        document.getElementById('blogPostAdminActions').classList.remove('d-none');
      }

      // URL 기반 라우팅
      const match = window.location.pathname.match(/^\/blog\/(\d+)$/);
      if (match) {
        await loadBlogPost(match[1]);
      } else {
        await loadBlogList(0);
      }
    });
  </script>
</body>
</html>
