<!-- ── 사이트 전역 공지 배너 (다중) ── -->
<!-- src/client/common.ts 가 appConfig.announcements 배열을 읽어 자식 노드를 동적 생성한다. -->
<div id="announcement-banners" class="announcement-banners d-none"></div>

<!-- ── 네비게이션 바 ── -->
<nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid flex-wrap align-items-center">
        <!-- 상단 줄: 브랜딩 + 기능 버튼들 -->
        <a class="navbar-brand me-auto" href="/">
            <span class="wiki-logo-container">
                <i class="mdi mdi-book-open-page-variant brand-icon"></i>
            </span>
            <span class="app-wiki-name">CloudWiki</span>
        </a>

        <!-- 유저 버튼 & 알림 패널 통합 -->
        <div class="dropdown ms-2 d-none position-relative" id="navUser">
            <a href="#" class="d-flex align-items-center text-decoration-none position-relative" data-bs-toggle="dropdown" aria-expanded="false">
               <img id="userAvatar" class="user-avatar m-0" src="" alt="">
               <span class="notification-badge d-none" id="notificationBadge"></span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow-sm position-absolute">
                <li><h6 class="dropdown-header text-truncate" id="userName"></h6></li>
                <li><a class="dropdown-item d-flex align-items-center" href="#" onclick="document.querySelector('#navUser > a').click(); toggleNotificationPanel(); event.stopPropagation(); return false;"><i class="mdi mdi-inbox me-2"></i><span class="me-auto">알림</span><span class="notification-menu-badge d-none" id="notificationMenuBadge"></span></a></li>
                <li><a class="dropdown-item" href="/mypage"><i class="mdi mdi-account-circle me-2"></i> 마이페이지</a></li>
                <li id="navAdminConsole" class="d-none"><a class="dropdown-item" href="/admin"><i class="mdi mdi-shield-account me-2"></i> 관리자 콘솔</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="/auth/logout"><i class="mdi mdi-logout me-2 text-danger"></i> 로그아웃</a></li>
            </ul>

            <!-- 알림 드롭다운 패널 -->
            <div class="notification-panel d-none" id="notificationPanel">
                <div class="notification-panel-header">
                    <strong><i class="mdi mdi-inbox"></i> 알림</strong>
                    <button class="btn btn-sm btn-link text-danger p-0 ms-auto" id="notifDeleteAllBtn" onclick="deleteAllNotifications()" title="전체 삭제" style="font-size:0.8rem;">
                        <i class="mdi mdi-delete-sweep-outline"></i> 전체 삭제
                    </button>
                </div>
                <div class="notification-panel-body" id="notificationPanelBody">
                    <div class="text-center text-muted py-4">불러오는 중...</div>
                </div>
                <div class="notification-panel-footer d-none" id="notificationPanelFooter">
                    <div class="push-toggle-status d-flex align-items-center justify-content-between mb-2" id="pushToggleStatus">
                        <span class="push-toggle-status-label">
                            <i class="mdi mdi-bell-outline me-1"></i>브라우저 푸시 알림
                        </span>
                        <span class="push-status-pill push-status-off" id="pushStatusPill">
                            <i class="mdi mdi-circle-medium" id="pushStatusDot"></i>
                            <span id="pushStatusText">꺼짐</span>
                        </span>
                    </div>
                    <button id="pushToggleBtn" class="btn btn-sm btn-outline-secondary w-100" type="button" title="브라우저 푸시 알림">
                        <i class="mdi mdi-bell-off-outline"></i> <span id="pushToggleLabel">푸시 알림 받기</span>
                    </button>
                </div>
            </div>
            <!-- js 호환성을 위한 안보이는 래퍼 유지 -->
            <div id="notificationBtnWrapper" class="d-none"></div>
        </div>
        <!-- 테마 토글 버튼 (클릭 시 자동 → 라이트 → 다크 순환) -->
        <button class="btn border-0 px-1 ms-2 theme-toggle-btn" type="button" id="navThemeToggle" onclick="cycleTheme()" title="테마 변경" aria-label="테마 변경">
            <i class="mdi mdi-theme-light-dark text-body" id="navThemeIcon"></i>
        </button>
        <a class="btn border-0 px-1 ms-2" id="navLogin" href="/login" title="로그인"><i class="mdi mdi-login text-body"></i></a>

        <!-- 햄버거 버튼 (사이드바 토글) -->
        <button class="navbar-toggler border-0 px-1 ms-2" type="button" data-bs-toggle="offcanvas"
            data-bs-target="#mobileSidebar" aria-controls="mobileSidebar">
            <i class="mdi mdi-menu fs-2 text-body"></i>
        </button>

        <!-- 하단 줄: 검색창 (항상 full-width로 다음 줄에 표시) -->
        <form class="nav-search-form d-flex" onsubmit="doSearch(event)">
            <button class="btn border-0 px-1 me-1" type="button" title="랜덤 문서" onclick="goRandomPage()"><i class="bi bi-shuffle text-body"></i></button>
            <div class="input-group">
                <input type="text" id="searchInput" class="form-control" placeholder="문서 검색..." autocomplete="off">
                <button class="btn search-mode-btn" type="submit" aria-label="검색">
                    <i class="mdi mdi-magnify"></i>
                </button>
            </div>
            <!-- 연관검색어 드롭다운 -->
            <ul class="search-suggestions" id="searchSuggestions"></ul>
        </form>

        <script>
        (function() {
            let debounceTimer = null;
            const input = document.getElementById('searchInput');
            const sugBox = document.getElementById('searchSuggestions');
            let activeIdx = -1;

            input.addEventListener('input', function() {
                clearTimeout(debounceTimer);
                const rawQ = this.value.trim();
                // map: 프리픽스가 붙으면 일반 문서 LIKE 검색을 그대로 돌리되, 결과를 map: 가상 문서로 매핑한다.
                const isMapMode = rawQ.toLowerCase().startsWith('map:');
                const q = isMapMode ? rawQ.slice(4).trim() : rawQ;
                if (q.length < 2) {
                    sugBox.classList.remove('show');
                    sugBox.innerHTML = '';
                    return;
                }
                debounceTimer = setTimeout(() => fetchSuggestions(q, isMapMode), 250);
            });

            async function fetchSuggestions(q, isMapMode) {
                try {
                    // map: 모드는 카테고리를 클라이언트에서 거르지 않고 서버에서 아예 제외시켜
                    // 7개 한도가 카테고리에 잠식돼 페이지 결과가 비는 상황을 막는다.
                    const url = '/api/search/suggest?q=' + encodeURIComponent(q)
                        + (isMapMode ? '&exclude_categories=1' : '');
                    const res = await fetch(url);
                    if (!res.ok) return;
                    const data = await res.json();
                    const items = data.suggestions || [];
                    renderSuggestions(items, isMapMode);
                } catch(e) { /* ignore */ }
            }

            function renderSuggestions(items, isMapMode) {
                activeIdx = -1;
                if (!items.length) {
                    sugBox.classList.remove('show');
                    sugBox.innerHTML = '';
                    return;
                }
                // item.title 이 있으면 표시 이름은 그것을, 호출 식별자(data-slug, /w/) 는 항상 slug.
                // map: 모드에서는 호출 식별자도 map:<slug> 로 감싸 가상 문서 라우트로 이동시킨다.
                sugBox.innerHTML = items.map((item, i) => {
                    const baseSlug = item.slug;
                    const baseDisplayName = item.title || baseSlug;
                    const slugTarget = isMapMode ? 'map:' + baseSlug : baseSlug;
                    const displayName = isMapMode ? 'map:' + baseDisplayName : baseDisplayName;
                    const slugSubLabel = item.title
                        ? ' <small class="text-muted">' + escapeHtml(slugTarget) + '</small>'
                        : '';
                    return '<li class="search-suggestion-item" data-slug="' + escapeHtml(slugTarget) + '">'
                        + '<i class="mdi mdi-file-document-outline"></i> '
                        + escapeHtml(displayName) + slugSubLabel + '</li>';
                }).join('');
                sugBox.classList.add('show');

                sugBox.querySelectorAll('.search-suggestion-item').forEach(el => {
                    el.addEventListener('mousedown', function(e) {
                        e.preventDefault();
                        const slug = this.dataset.slug;
                        if (typeof navigateTo === 'function') {
                            navigateTo('/w/' + encodeURIComponent(slug));
                        } else {
                            window.location.href = '/w/' + encodeURIComponent(slug);
                        }
                        sugBox.classList.remove('show');
                        sugBox.innerHTML = '';
                        input.value = '';
                        input.blur();
                    });
                });
            }

            // 키보드 탐색
            input.addEventListener('keydown', function(e) {
                const items = sugBox.querySelectorAll('.search-suggestion-item');
                if (!items.length || !sugBox.classList.contains('show')) return;
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    activeIdx = Math.min(activeIdx + 1, items.length - 1);
                    updateActive(items);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    activeIdx = Math.max(activeIdx - 1, -1);
                    updateActive(items);
                } else if (e.key === 'Enter' && activeIdx >= 0) {
                    e.preventDefault();
                    items[activeIdx].dispatchEvent(new Event('mousedown'));
                } else if (e.key === 'Escape') {
                    sugBox.classList.remove('show');
                }
            });

            function updateActive(items) {
                items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
            }

            input.addEventListener('blur', function() {
                setTimeout(() => { sugBox.classList.remove('show'); }, 150);
            });

            input.addEventListener('focus', function() {
                if (sugBox.innerHTML && this.value.trim().length >= 2) {
                    sugBox.classList.add('show');
                }
            });
        })();
        </script>
    </div>
</nav>
