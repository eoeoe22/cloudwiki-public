                            if (!templates || templates.length === 0) {
                                listContainer.innerHTML = '<div class="p-3 text-center text-muted">검색 결과가 없습니다.</div>';
                                return;
                            }

                            templates.forEach(t => {
                                // 템플릿: 틀: template: 등의 접두사를 제외한 제목 표시
                                const displayTitle = t.title.replace(/^(틀|template|템플릿):/i, '');
                                const btn = document.createElement('button');
                                btn.className = 'list-group-item list-group-item-action';
                                btn.textContent = displayTitle;
                                btn.onclick = async () => {
                                    Swal.close();
                                    await applyTemplate(t.slug);
                                };
                                listContainer.appendChild(btn);
                            });
                        };

                        const fetchTemplates = async (query = '') => {
                            listContainer.innerHTML = '<div class="p-3 text-center"><span class="spinner-border spinner-border-sm text-primary" role="status"></span> 불러오는 중...</div>';
                            try {
                                const res = await fetch(`/api/wiki/templates${query ? `?q=${encodeURIComponent(query)}` : ''}`);
                                if (!res.ok) throw new Error('템플릿 목록을 불러올 수 없습니다.');
                                const data = await res.json();
                                renderTemplates(data.templates);
                            } catch (err) {
                                listContainer.innerHTML = `<div class="p-3 text-center text-danger">${err.message}</div>`;
                            }
                        };

                        // Initial fetch (10 latest templates)
                        await fetchTemplates();

                        // Search events
                        searchBtn.onclick = () => fetchTemplates(searchInput.value.trim());
                        searchInput.onkeypress = (e) => {
                            if (e.key === 'Enter') {
                                e.preventDefault();
                                fetchTemplates(searchInput.value.trim());
                            }
                        };
                    }
                });

                async function applyTemplate(selectedSlug) {
                    try {
                        const tRes = await fetch(`/api/wiki/${encodeURIComponent(selectedSlug)}`);
                        if (!tRes.ok) throw new Error('템플릿 내용을 불러올 수 없습니다.');
                        const tPage = await tRes.json();

                        if (editor.getMarkdown().trim()) {
                            const confirm = await Swal.fire({
                                title: '내용 덮어쓰기',
                                text: '현재 작성 중인 내용이 사라집니다. 계속하시겠습니까?',
                                icon: 'warning',
                                showCancelButton: true,
                                confirmButtonText: '예, 덮어씁니다',
                                cancelButtonText: '아니오'
                            });
                            if (!confirm.isConfirmed) return;
                        }

                        editor.setMarkdown(tPage.content);
                        Swal.fire('완료', '템플릿을 불러왔습니다.', 'success');
                    } catch (err) {
                        Swal.fire('오류', err.message, 'error');
                    }
                }
            } catch (err) {
                Swal.fire('오류', err.message, 'error');

        // ── 저장 ──
        async function savePage() {
            const title = document.getElementById('titleInput').value.trim();
            const category = document.getElementById('categoryInput').value.trim();
            const redirect_to = document.getElementById('redirectInput').value.trim();
            const is_locked = document.getElementById('isLockedCheck').checked ? 1 : 0;
            const content = editor.getMarkdown();
            const summary = document.getElementById('summaryInput').value.trim();

            if (!title) {
                Swal.fire('오류', '제목을 입력해주세요.', 'warning');
                return;
            }

            if (appConfig.turnstileSiteKey && !turnstileToken) {
                Swal.fire('오류', 'Turnstile 검증을 완료해주세요.', 'warning');
                return;
            }

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 저장 중...';

            let isSuccess = false;

            try {
                const body = {
                    title,
                    content,
                    category: category || undefined,
                    redirect_to: redirect_to || undefined,
                    is_locked,
                    summary: summary || undefined,
                    turnstileToken,
                };

                if (pageVersion !== null) {
                    body.expected_version = pageVersion;
                }

                const res = await fetch(`/api/wiki/${encodeURIComponent(slug)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                if (res.status === 409) {
                    const data = await res.json();

                    // 버전 충돌 (Optimistic Locking Failure)
                    showConflictModal(data);

                    saveBtn.innerHTML = '<i class="mdi mdi-check"></i> 저장';
                    return;
                }

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || '저장 실패');
                }

                if (AUTO_SAVE_KEY) localStorage.removeItem(AUTO_SAVE_KEY);

                isSuccess = true;
                Swal.fire({
                    icon: 'success',
                    title: '저장 완료!',
                    text: '문서가 성공적으로 저장되었습니다.',
                    timer: 1500,
                    showConfirmButton: false,
                }).then(() => {
                    window.location.href = `/wiki/${encodeURIComponent(slug)}`;
                });

            } catch (err) {
                Swal.fire('오류', err.message, 'error');
            } finally {
                if (!isSuccess) {
                    saveBtn.innerHTML = '<i class="mdi mdi-check"></i> 저장';
                    if (turnstileWidgetId !== null) {
                        refreshTurnstile();
                    } else {
                        saveBtn.disabled = false;
                    }
                }
            }
        }

        // ── 충돌 해결 UI ──
        function showConflictModal(data) {
            pageVersion = data.current_version;
            const serverContent = data.content || '';
            const localContent = editor.getMarkdown();

            // ── 최신본: raw div에 텍스트 세팅 ──
            document.getElementById('conflict-server-raw').textContent = serverContent;
            // 뷰 상태 초기화 (raw로 리셋)
            document.getElementById('conflict-server-raw').style.display = 'block';
            document.getElementById('conflict-server-preview').style.display = 'none';
            document.getElementById('serverViewToggle').innerHTML = '<i class="mdi mdi-eye"></i> 프리뷰 보기';
            serverViewMode = 'raw';
            // viewer가 이미 있으면 내용만 갱신
            if (serverViewer) {
                serverViewer.setMarkdown(serverContent);
            }

            // ── 내 수정본: conflict-ui가 block된 후 에디터 초기화 ──
            document.getElementById('conflict-ui').style.display = 'block';
            document.getElementById('main-editor-container').style.display = 'none';
            window.scrollTo(0, 0);

            if (!conflictEditor) {
                const isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                conflictEditor = new toastui.Editor({
                    el: document.querySelector('#conflict-local-editor'),
                    height: '500px',
                    initialEditType: 'markdown',
                    previewStyle: 'tab',          // 충돌 UI는 공간 절약을 위해 tab
                    initialValue: localContent,
                    language: 'ko-KR',
                    theme: isDarkMode ? 'dark' : 'light',
                    usageStatistics: false,
                    hideModeSwitch: true,
                    toolbarItems: [               // 최소한의 툴바만
                        ['heading', 'bold', 'italic', 'strike'],
                        ['ul', 'ol', 'task'],
                        ['table', 'link'],
                        ['code', 'codeblock'],
                    ],
                });
            } else {
                conflictEditor.setMarkdown(localContent);
            }

            // ── Diff 렌더링 (요약/전체 보기를 위해 데이터 보관 후 렌더링 호출) ──
            cachedDiffData = Diff.diffLines(serverContent, localContent);

            // 토글 버튼 상태 초기화
            diffViewMode = 'summary';
            document.getElementById('diffViewToggle').innerHTML = '<i class="mdi mdi-filter-variant"></i> 전체 보기';

            renderDiffView();
        }

        function toggleDiffView() {
            diffViewMode = (diffViewMode === 'summary') ? 'all' : 'summary';
            const btn = document.getElementById('diffViewToggle');
            if (diffViewMode === 'all') {
                btn.innerHTML = '<i class="mdi mdi-filter"></i> 요약 보기';
            } else {
                btn.innerHTML = '<i class="mdi mdi-filter-variant"></i> 전체 보기';
            }
            renderDiffView();
        }

        function renderDiffView() {
            if (!cachedDiffData) return;
            let diffHtml = '';

            if (diffViewMode === 'all') {
                cachedDiffData.forEach(part => {
                    const cls = part.added ? 'diff-added' : part.removed ? 'diff-removed' : '';
                    diffHtml += `<span class="${cls}">${escapeHtml(part.value)}</span>`;
                });
            } else {
                const contextLines = 2; // 보여줄 위/아래 줄 수

                cachedDiffData.forEach((part, i) => {
                    if (part.added || part.removed) {
                        const cls = part.added ? 'diff-added' : 'diff-removed';
                        diffHtml += `<span class="${cls}">${escapeHtml(part.value)}</span>`;
                    } else {
                        // 변경되지 않은 텍스트
                        let lines = part.value.split('\n');
                        let hasTrailingNewline = false;
                        if (lines[lines.length - 1] === '') {
                            lines.pop(); // 맨 끝 빈 요소 제거
                            hasTrailingNewline = true;
                        }

                        let showTop = (i !== 0); // 이전 요소가 수정사항이면 앞부분 노출
                        let showBottom = (i !== cachedDiffData.length - 1); // 다음 요소가 수정사항이면 뒷부분 노출

                        if (!showTop && !showBottom) {
                            // 수정사항 전혀 없을 때
                            diffHtml += `<span>${escapeHtml(part.value)}</span>`;
                        } else if (lines.length <= contextLines * 2 + 1) {
                            // 줄 수가 적으면 모두 표시
                            diffHtml += `<span>${escapeHtml(part.value)}</span>`;
                        } else {
                            let topTxt = '';
                            let bottomTxt = '';
                            if (showTop) {
                                topTxt = lines.slice(0, contextLines).join('\n') + '\n';
                            }
                            if (showBottom) {
                                bottomTxt = lines.slice(-contextLines).join('\n') + (hasTrailingNewline ? '\n' : '');
                            }

                            if (showTop) diffHtml += `<span>${escapeHtml(topTxt)}</span>`;
                            diffHtml += `<span style="color: grey; font-style: italic; background: #e9ecef; border-radius: 4px; padding: 0 4px;">... (생략됨) ...</span>\n`;
                            if (showBottom) diffHtml += `<span>${escapeHtml(bottomTxt)}</span>`;
                        }
                    }
                });
            }
            document.getElementById('conflict-diff-view').innerHTML = diffHtml;
        }

        function toggleServerView() {
            const raw = document.getElementById('conflict-server-raw');
            const preview = document.getElementById('conflict-server-preview');
            const btn = document.getElementById('serverViewToggle');

            if (serverViewMode === 'raw') {

                raw.style.display = 'block';
                preview.style.display = 'none';

        }

        function resolveConflict() {
            // textarea 대신 conflictEditor에서 값 읽기
            const finalContent = conflictEditor ? conflictEditor.getMarkdown() : '';

            // Hide Conflict UI

        function cancelConflict() {
            Swal.fire({
                title: '충돌 해결 취소',

        // ── 미디어 업로드 처리 (Toast UI Hook) ──
        async function handleImageUpload(blob, callback) {
            if (!blob) return;

            if (blob.size > 15 * 1024 * 1024) {
                Swal.fire('오류', '파일 크기는 15MB 이하만 허용됩니다.', 'warning');
                return;
            }

            // 사용자에게 파일명 입력 요청
            const originalName = blob.name || 'image';
            const nameWithoutExt = originalName.replace(/\.[^.]+$/, '');
            const { value: customFilename, isConfirmed } = await Swal.fire({
                title: '이미지 파일명 입력',
                input: 'text',
                inputLabel: '파일명 (확장자 제외)',
                inputValue: nameWithoutExt,
                inputPlaceholder: '파일명을 입력하세요',
                showCancelButton: true,
                confirmButtonText: '업로드',
                cancelButtonText: '취소',
                inputValidator: (value) => {
                    if (!value || !value.trim()) {
                        return '파일명을 입력해주세요.';
                    }
                }
            });

            if (!isConfirmed || !customFilename) return;

            const formData = new FormData();
            formData.append('file', blob);
            formData.append('filename', customFilename.trim());

            try {
                const res = await fetch('/api/media', {
                    method: 'POST',
                    body: formData,
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || '업로드 실패');
                }

                const data = await res.json();

                // callback(url, altText)
                callback(data.url, data.filename);

            } catch (err) {
                console.error(err);
                Swal.fire('오류', err.message, 'error');
            }
        }

        // ── 취소 ──
        function cancelEdit() {
            if (editor && editor.getMarkdown().trim()) {
                // Check if content changed?
                // Toast UI doesn't track dirty state easily.
                // Just ask if there is content.
                Swal.fire({
                    title: '편집을 취소하시겠습니까?',
                    text: '저장하지 않은 변경사항이 사라집니다.',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: '나가기',
                    cancelButtonText: '계속 편집',
                }).then(result => {
                    if (result.isConfirmed) {
                        window.location.href = slug ? `/wiki/${encodeURIComponent(slug)}` : '/';
                    }
                });
            } else {
                window.location.href = slug ? `/wiki/${encodeURIComponent(slug)}` : '/';
            }
        }

        // ── 동시편집 감지 ──
        let heartbeatInterval = null;
        let editorCheckInterval = null;

        function startEditingHeartbeat() {
            if (!slug) return;

            // 즉시 첫 하트비트 전송
            sendHeartbeat();

            // 30초마다 하트비트 전송
            heartbeatInterval = setInterval(sendHeartbeat, 30000);

            // 30초마다 편집자 목록 확인
            editorCheckInterval = setInterval(checkConcurrentEditors, 30000);
        }

        async function sendHeartbeat() {
            if (!slug) return;
            try {
                await fetch(`/api/wiki/${encodeURIComponent(slug)}/editing`, {
                    method: 'POST',
                });
            } catch (e) {
                // 하트비트 실패는 무시
            }
        }

        async function checkConcurrentEditors() {
            if (!slug) return;
            try {
                const res = await fetch(`/api/wiki/${encodeURIComponent(slug)}/editors`);
                if (!res.ok) return;
                const data = await res.json();

                const banner = document.getElementById('concurrent-edit-banner');
                const textEl = document.getElementById('concurrent-edit-text');
                if (!banner || !textEl) return;

                if (data.editors && data.editors.length > 0) {
                    const editorNames = data.editors.map(e => {
                        const avatar = e.picture
                            ? `<img src="${escapeHtml(e.picture)}" class="editor-avatar" alt="" loading="lazy">`
                            : '';
                        return `${avatar}<strong>${escapeHtml(e.name)}</strong>`;
                    }).join(', ');

                    textEl.innerHTML = `이 문서를 ${editorNames}님이 동시에 편집 중입니다. 편집 충돌이 발생할 수 있습니다.`;
                    banner.style.display = 'flex';
                } else {
                    banner.style.display = 'none';
                }
            } catch (e) {
                // 조회 실패는 무시
            }
        }

        // ── 위키 자동완성 (Autocomplete) ──
        let acVisible = false;
        let acType = 'link'; // 'link' or 'template'
        let acResults = [];
        let acSelectedIndex = -1;
        let acQuery = '';
        let acLastQuery = null;
        let acDebounceTimer = null;
        const acDiv = document.getElementById('wiki-autocomplete');

        function hideAutocomplete() {
            acVisible = false;
            acResults = [];
            acSelectedIndex = -1;
            acLastQuery = null;
            if (acDiv) acDiv.style.display = 'none';
        }

        function showAutocomplete(query, type) {
            acQuery = query;
            acType = type;
            acVisible = true;

            // window.getSelection()으로 실제 커서 위치 획득 (에디터 내부 구조에 무관)
            if (acDiv) {
                let positioned = false;
                const sel = window.getSelection();
                if (sel && sel.rangeCount > 0) {
                    const range = sel.getRangeAt(0).cloneRange();
                    range.collapse(true);
                    const rect = range.getBoundingClientRect();
                    if (rect.height > 0) {
                        let left = rect.left + window.scrollX;
                        let top = rect.bottom + window.scrollY + 4;
                        if (left + 260 > window.innerWidth) left = window.innerWidth - 270;
                        acDiv.style.left = `${left}px`;
                        acDiv.style.top = `${top}px`;
                        acDiv.style.display = 'block';
                        positioned = true;
                    }
                }
                if (!positioned) {
                    // fallback: 에디터 기준
                    const editorEl = document.querySelector('#editor');
                    if (editorEl) {
                        const rect = editorEl.getBoundingClientRect();
                        acDiv.style.left = `${rect.left + 50 + window.scrollX}px`;
                        acDiv.style.top = `${rect.top + 80 + window.scrollY}px`;
                        acDiv.style.display = 'block';
                    }
                }
            }

            if (acQuery === acLastQuery) return;
            acLastQuery = acQuery;

            clearTimeout(acDebounceTimer);
            acDebounceTimer = setTimeout(async () => {
                if (!acVisible) return;
                try {
                    // 쿼리가 비어있어도 API 호출 (최신순 등 반환 가능)
                    const res = await fetch(`/api/wiki/search-titles?q=${encodeURIComponent(acQuery)}&type=${acType}`);
                    if (!res.ok) return;
                    const data = await res.json();
                    acResults = data.results || [];
                    renderAutocompleteResults();
                } catch (e) {
                    console.error('Autocomplete fetch error:', e);
                }
            }, 300);
        }

        function renderAutocompleteResults() {
            if (!acDiv) return;

            if (acResults.length === 0) {
                acDiv.innerHTML = '<div class="list-group-item text-muted" style="font-size:0.85rem">결과 없음</div>';
                return;
            }

            acDiv.innerHTML = acResults.map((item, index) => `
                <div class="list-group-item autocomplete-item" data-index="${index}" onclick="selectAutocomplete(${index})">
                    <i class="mdi ${acType === 'template' ? 'mdi-toy-brick-outline' : 'mdi-file-document-outline'}"></i>
                    <span class="item-title">${escapeHtml(item.title)}</span>
                    <span class="item-type">${acType === 'template' ? '틀' : '문서'}</span>
                </div>
            `).join('');

            acSelectedIndex = 0;
            highlightAutocompleteItem();
        }

        function highlightAutocompleteItem() {
            const items = acDiv.querySelectorAll('.autocomplete-item');
            items.forEach((item, idx) => {
                if (idx === acSelectedIndex) {
                    item.classList.add('active');
                    item.scrollIntoView({ block: 'nearest' });
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function selectAutocomplete(index) {
            const item = acResults[index];
            if (!item || !editor) return;

            const selection = editor.getSelection();
            if (!selection) { hideAutocomplete(); return; }

            const [from] = selection;
            const line = from[0];
            const col = from[1];

            const md = editor.getMarkdown();
            const lines = md.split('\n');
            const lineText = lines[line - 1] || '';
            const textBefore = lineText.substring(0, col - 1);

            const trigger = acType === 'template' ? '{{' : '[[';
            const close = acType === 'template' ? '}}' : ']]';
            const lastTriggerIndex = textBefore.lastIndexOf(trigger);

            if (lastTriggerIndex !== -1) {
                // [[query 부분을 선택 후 교체 (setMarkdown 전체 교체 방지)
                editor.setSelection([line, lastTriggerIndex + 1], [line, col]);
                editor.insertText(`${trigger}${item.title}${close}`);
            }

            hideAutocomplete();
        }

        // 키보드 네비게이션 (Capturing 모드 사용)
        window.addEventListener('keydown', (e) => {
            if (!acVisible) return;

            // 한글 IME 등에서 Process 키가 들어올 때 무시
            if (e.key === 'Process') return;

            if (e.key === 'ArrowDown' || e.keyCode === 40) {
                if (acResults.length > 0) {
                    e.preventDefault();
                    e.stopPropagation(); // 에디터 커서 이동 방지
                    acSelectedIndex = (acSelectedIndex + 1) % acResults.length;
                    highlightAutocompleteItem();
                } else {
                    hideAutocomplete();
                }
            } else if (e.key === 'ArrowUp' || e.keyCode === 38) {
                if (acResults.length > 0) {
                    e.preventDefault();
                    e.stopPropagation(); // 에디터 커서 이동 방지
                    acSelectedIndex = (acSelectedIndex - 1 + acResults.length) % acResults.length;
                    highlightAutocompleteItem();
                } else {
                    hideAutocomplete();
                }
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.keyCode === 37 || e.keyCode === 39) {
                hideAutocomplete();
            } else if (e.key === 'Enter' || e.keyCode === 13) {
                if (acResults.length > 0 && acSelectedIndex >= 0) {
                    e.preventDefault();
                    e.stopPropagation();
                    selectAutocomplete(acSelectedIndex);
                } else {
                    hideAutocomplete();
                }
            } else if (e.key === 'Escape' || e.keyCode === 27) {
                e.preventDefault();
                e.stopPropagation();
                hideAutocomplete();
            }
        }, true);

        // ── 아이콘 자동완성 키보드 네비게이션 (Capturing 모드) ──
        window.addEventListener('keydown', (e) => {
            if (!iconAcVisible) return;
            if (e.key === 'Process') return;

            if (e.key === 'ArrowDown' || e.keyCode === 40) {
                if (iconAcResults.length > 0) {
                    e.preventDefault();
                    e.stopPropagation();
                    // 아래 행으로 이동 (ICON_AC_COLS 칸씩)
                    iconAcSelectedIndex = Math.min(iconAcSelectedIndex + ICON_AC_COLS, iconAcResults.length - 1);
                    highlightIconAcItem();
                } else {
                    hideIconAutocomplete();
                }
            } else if (e.key === 'ArrowUp' || e.keyCode === 38) {
                if (iconAcResults.length > 0) {
                    e.preventDefault();
                    e.stopPropagation();
                    iconAcSelectedIndex = Math.max(iconAcSelectedIndex - ICON_AC_COLS, 0);
                    highlightIconAcItem();
                } else {
                    hideIconAutocomplete();
                }
            } else if (e.key === 'ArrowRight' || e.keyCode === 39) {
                if (iconAcResults.length > 0) {
                    e.preventDefault();
                    e.stopPropagation();
                    iconAcSelectedIndex = (iconAcSelectedIndex + 1) % iconAcResults.length;
                    highlightIconAcItem();
                }
            } else if (e.key === 'ArrowLeft' || e.keyCode === 37) {
                if (iconAcResults.length > 0) {
                    e.preventDefault();
                    e.stopPropagation();
                    iconAcSelectedIndex = (iconAcSelectedIndex - 1 + iconAcResults.length) % iconAcResults.length;
                    highlightIconAcItem();
                }
            } else if (e.key === 'Enter' || e.keyCode === 13) {
                if (iconAcResults.length > 0 && iconAcSelectedIndex >= 0) {
                    e.preventDefault();
                    e.stopPropagation();
                    selectIconAutocomplete(iconAcSelectedIndex);
                } else {
                    hideIconAutocomplete();
                }
            } else if (e.key === 'Escape' || e.keyCode === 27) {
                e.preventDefault();
                e.stopPropagation();
                hideIconAutocomplete();
            }
        }, true);

        // ── 색상 자동완성 키보드 네비게이션 (Capturing 모드) ──
        window.addEventListener('keydown', (e) => {
            if (!colorAcVisible) return;
            if (e.key === 'Process') return;

            const swatchCount = COLOR_SWATCHES.length;
            const SWATCH_COLS = 10; // 스와치 한 줄에 10개

            if (e.key === 'ArrowRight' || e.keyCode === 39) {
                if (swatchCount > 0) {
                    e.preventDefault();
                    e.stopPropagation();
                    colorAcSelectedSwatchIndex = (colorAcSelectedSwatchIndex + 1) % swatchCount;
                    selectColorSwatch(colorAcSelectedSwatchIndex);
                }
            } else if (e.key === 'ArrowLeft' || e.keyCode === 37) {
                if (swatchCount > 0) {
                    e.preventDefault();
                    e.stopPropagation();
                    colorAcSelectedSwatchIndex = (colorAcSelectedSwatchIndex - 1 + swatchCount) % swatchCount;
                    selectColorSwatch(colorAcSelectedSwatchIndex);
                }
            } else if (e.key === 'ArrowDown' || e.keyCode === 40) {
                if (swatchCount > 0) {
                    e.preventDefault();
                    e.stopPropagation();
                    colorAcSelectedSwatchIndex = Math.min(colorAcSelectedSwatchIndex + SWATCH_COLS, swatchCount - 1);
                    selectColorSwatch(colorAcSelectedSwatchIndex);
                }
            } else if (e.key === 'ArrowUp' || e.keyCode === 38) {
                if (swatchCount > 0) {
                    e.preventDefault();
                    e.stopPropagation();
                    colorAcSelectedSwatchIndex = Math.max(colorAcSelectedSwatchIndex - SWATCH_COLS, 0);
                    selectColorSwatch(colorAcSelectedSwatchIndex);
                }
            } else if (e.key === 'Enter' || e.keyCode === 13) {
                e.preventDefault();
                e.stopPropagation();
                applyColorAutocomplete();
            } else if (e.key === 'Escape' || e.keyCode === 27) {
                e.preventDefault();
                e.stopPropagation();
                hideColorAutocomplete();
            }
        }, true);

        // 전역 클릭 시 자동완성 닫기
        document.addEventListener('mousedown', (e) => {
            if (acDiv && !acDiv.contains(e.target)) {
                setTimeout(hideAutocomplete, 100);
            }
            if (iconAcDiv && !iconAcDiv.contains(e.target)) {
                setTimeout(hideIconAutocomplete, 100);
            }
            if (colorAcDiv && !colorAcDiv.contains(e.target)) {
                setTimeout(hideColorAutocomplete, 100);
            }
        });

        // 에디터 변경 감지 및 트리거 실행
        function attachAutocomplete() {
            if (!editor) {
                setTimeout(attachAutocomplete, 100);
                return;
            }

            editor.on('change', () => {
                // change 이벤트 직후 selection이 확정되도록 한 프레임 뒤에 처리
                requestAnimationFrame(() => {
                    const selection = editor.getSelection();
                    if (!selection) { hideAutocomplete(); return; }

                    // 커서(드래그 없음)인지 확인
                    const [from, to] = selection;
                    if (from[0] !== to[0] || from[1] !== to[1]) {
                        hideAutocomplete();
                        return;
                    }

                    const md = editor.getMarkdown();
                    const lines = md.split('\n');
                    const lineText = lines[from[0] - 1] || '';
                    const textBefore = lineText.substring(0, from[1] - 1);

                    const linkMatch = textBefore.match(/\[\[([^\]\[]*)$/);
                    const templateMatch = textBefore.match(/\{\{([^\}\{]*)$/);
                    const biIconMatch = textBefore.match(/\{bi:([^}]*)$/);
                    const mdiIconMatch = textBefore.match(/\{mdi:([^}]*)$/);
                    const iconMatch = textBefore.match(/\{icon:([^}]*)$/);
                    const bgColorMatch = textBefore.match(/\{bg:([^}]*)$/);
                    const textColorMatch = textBefore.match(/\{color:([^}]*)$/);

                    if (linkMatch) {
                        hideIconAutocomplete();
                        hideColorAutocomplete();
                        showAutocomplete(linkMatch[1], 'link');
                    } else if (templateMatch) {
                        hideIconAutocomplete();
                        hideColorAutocomplete();
                        showAutocomplete(templateMatch[1], 'template');
                    } else if (iconMatch) {
                        hideAutocomplete();
                        hideColorAutocomplete();
                        showIconAutocomplete(iconMatch[1], 'icon');
                    } else if (biIconMatch) {
                        hideAutocomplete();
                        hideColorAutocomplete();
                        showIconAutocomplete(biIconMatch[1], 'bi');
                    } else if (mdiIconMatch) {
                        hideAutocomplete();
                        hideColorAutocomplete();
                        showIconAutocomplete(mdiIconMatch[1], 'mdi');
                    } else if (bgColorMatch) {
                        hideAutocomplete();
                        hideIconAutocomplete();
                        showColorAutocomplete(bgColorMatch[1], 'bg');
                    } else if (textColorMatch) {
                        hideAutocomplete();
                        hideIconAutocomplete();
                        showColorAutocomplete(textColorMatch[1], 'color');
                    } else {
                        hideAutocomplete();
                        hideIconAutocomplete();
                        hideColorAutocomplete();
                    }
                });
            });

            // 포커스 잃으면 닫기
            editor.on('blur', () => {
                setTimeout(() => {
                    if (!document.activeElement.closest('#wiki-autocomplete')) {
                        hideAutocomplete();
                    }
                    if (!document.activeElement.closest('#icon-autocomplete')) {
                        hideIconAutocomplete();
                    }
                    if (!document.activeElement.closest('#color-autocomplete')) {
                        hideColorAutocomplete();
                    }
                }, 200);
            });
        }

        // 에디터 초기화 대기 후 연결
        setTimeout(attachAutocomplete, 500);

    </script>

    <!-- ── 푸터 Placeholder ── -->
    <div id="app-footer-placeholder"></div>
