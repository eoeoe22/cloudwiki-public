<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="app-wiki-name">문서 편집 - CloudWiki</title>
    <link rel="icon" id="wiki-favicon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Toast UI Editor -->
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/theme/toastui-editor-dark.min.css" />

    <link rel="stylesheet" href="/style.css">
    <!-- Diff -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>
    <style>
        .diff-added {
            background-color: var(--wiki-diff-add-bg);
            color: var(--wiki-diff-add-text);
        }

        .diff-removed {
            background-color: var(--wiki-diff-del-bg);
            color: var(--wiki-diff-del-text);
            text-decoration: line-through;
        }

        .diff-container {
            max-height: 400px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            white-space: pre-wrap;
            background: var(--wiki-code-bg);
            padding: 10px;
            border: 1px solid var(--wiki-border);
            border-radius: 6px;
        }

        /* Toast UI Editor Customization */
        .toastui-editor-defaultUI {
            border: 2px solid var(--wiki-border) !important;
            border-radius: 10px;
        }

        .toastui-editor-toolbar {
            border-radius: 8px 8px 0 0 !important;
            background-color: var(--wiki-toc-bg);
        }

        /* Mobile Optimization for Toast UI Editor Toolbar */
        @media (max-width: 768px) {
            .toastui-editor-popup {
                max-width: 90vw !important;
                left: 5% !important;
                margin-left: 0 !important;
            }

            /* Fix toolbar dropdown (More button) overflow */
            .toastui-editor-dropdown-toolbar {
                flex-wrap: wrap;
                height: auto !important;
                overflow: visible !important;
            }
        }

        .conflict-textarea {
            height: 500px;
            font-family: monospace;
            font-size: 0.9rem;
            overflow-y: auto;
            resize: none;
        }

        /* 에디터 내부 높이를 conflict-textarea와 맞춤 */
        #conflict-local-editor .toastui-editor-defaultUI {
            border: 2px solid var(--wiki-border) !important;
            border-radius: 10px;
        }

        #conflict-local-editor .ProseMirror,
        #conflict-local-editor .toastui-editor {
            height: 440px !important;
        }
    </style>
</head>

<body>

    <!-- ── 사이드바 Placeholder (편집기는 모바일에서만 노출) ── -->
    <div id="app-sidebar-placeholder" class="d-lg-none"></div>

    <!-- ── 네비게이션 바 Placeholder ── -->
    <div id="app-header-placeholder"></div>

    <!-- Conflict Resolution UI -->
    <div id="conflict-ui" class="container mt-4" style="display: none;">
        <div class="alert alert-danger" role="alert">
            <h4 class="alert-heading"><i class="mdi mdi-alert-circle"></i> 편집 충돌 발생!</h4>
            <p>다른 사용자가 문서를 먼저 저장했습니다. 아래의 내용을 비교하여 충돌을 해결하세요.</p>
            <hr>
            <p class="mb-0">
                <strong>해결 방법:</strong> '최신본' 내용을 참고하여 '내 수정본'을 알맞게 수정한 뒤, [해결 및 저장] 버튼을 누르세요.
            </p>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <h5 class="text-center text-muted mb-0">최신본</h5>
                    <button id="serverViewToggle" class="btn btn-sm btn-outline-secondary" onclick="toggleServerView()">
                        <i class="mdi mdi-eye"></i> 프리뷰 보기
                    </button>
                </div>
                <!-- raw -->
                <div id="conflict-server-raw" class="form-control conflict-textarea"
                    style="overflow-y:auto; white-space:pre-wrap; font-family:monospace;"></div>
                <!-- preview (lazy init) -->
                <div id="conflict-server-preview" style="display:none; max-height:500px; overflow-y:auto;"></div>
            </div>
            <div class="col-md-4">
                <h5 class="text-center text-primary">내 수정본</h5>
                <div id="conflict-local-editor"></div> <!-- 에디터 마운트 포인트 -->
            </div>
            <div class="col-md-4">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <h5 class="text-center text-info mb-0">변경 사항</h5>
                    <button id="diffViewToggle" class="btn btn-sm btn-outline-secondary" onclick="toggleDiffView()">
                        <i class="mdi mdi-filter-variant"></i> 전체 보기
                    </button>
                </div>
                <div id="conflict-diff-view" class="diff-container conflict-textarea"></div>
            </div>
        </div>

        <div class="d-flex justify-content-end mt-3 gap-2">
            <button class="btn btn-secondary" onclick="cancelConflict()">
                <i class="mdi mdi-close"></i> 취소
            </button>
            <button class="btn btn-success" onclick="resolveConflict()">
                <i class="mdi mdi-content-save-check"></i> 해결 및 저장
            </button>
        </div>
    </div>

    <div class="wiki-container" id="main-editor-container" style="max-width: 1200px;">
        <div class="wiki-article">

            <h2 class="mb-4" id="editPageTitle">
                <i class="mdi mdi-pencil-box-multiple"></i> 문서 편집
            </h2>

            <!-- 제목 입력 -->
            <div class="mb-3">
                <label for="titleInput" class="form-label fw-bold">제목</label>
                <input type="text" id="titleInput" class="edit-title-input" placeholder="문서 제목을 입력하세요">
            </div>

            <div class="mb-3 row">
                <div class="col-md-6">
                    <label for="categoryInput" class="form-label fw-bold">카테고리 (분류)</label>
                    <input type="text" id="categoryInput" class="form-control">
                </div>
                <div class="col-md-6 d-flex align-items-end" id="adminLockContainer" style="display: none !important;">
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="isLockedCheck">
                        <label class="form-check-label text-danger fw-bold" for="isLockedCheck">
                            <i class="mdi mdi-lock"></i> 편집 잠금 (관리자 전용 문서로 설정)
                        </label>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label for="redirectInput" class="form-label fw-bold">문서 넘겨주기 (Redirect)</label>
                <input type="text" id="redirectInput" class="form-control"
                    placeholder="이 문서 접속 시 자동으로 이동할 문서의 제목을 입력하세요">
                <div class="form-text text-muted">이 문서의 내용을 유지하면서 다른 문서로 방문자를 보냅니다.</div>
            </div>

            <!-- Markdown 에디터 -->
            <div class="mb-3">
                <label class="form-label fw-bold">내용</label>
                <div id="editor"></div>
            </div>

            <!-- 변경 사항 미리보기 (접기/펼치기) -->
            <div class="mb-3" id="diffPreviewSection" style="display: none;">
                <details id="diffPreviewDetails">
                    <summary class="fw-bold text-primary" style="cursor: pointer; user-select: none;">
                        <i class="mdi mdi-information-outline"></i> 변경 사항 미리보기
                    </summary>
                    <div id="diffPreviewContainer" class="diff-container mt-2" style="font-size: 0.9em;">
                        <!-- Diff 내용이 여기에 렌더링 됩니다 -->
                    </div>
                </details>
            </div>

            <!-- 편집 요약 -->
            <div class="mb-3">
                <label for="summaryInput" class="form-label fw-bold">편집 요약</label>
                <input type="text" id="summaryInput" class="edit-summary-input" placeholder="변경 내용을 간단히 설명해주세요">
            </div>

            <!-- 버튼 -->
            <div class="edit-actions">
                <button class="btn btn-wiki" id="saveBtn" onclick="savePage()">
                    <i class="mdi mdi-check"></i> 저장
                </button>
                <button class="btn btn-wiki-outline" onclick="cancelEdit()">
                    <i class="mdi mdi-close"></i> 취소
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <!-- Toast UI Editor -->
    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
    <script src="https://uicdn.toast.com/editor/latest/i18n/ko-kr.min.js"></script>

    <script src="/js/common.js"></script>
    <script>
        let slug = null;
        let pageVersion = null;
        let originalContent = ''; // 기존 문서 내용 보관
        let editor = null;
        let AUTO_SAVE_KEY = '';
        let conflictEditor = null;   // 내 수정본 Toast UI 인스턴스
        let serverViewMode = 'raw';  // 최신본 뷰 상태
        let serverViewer = null;     // 최신본 Viewer 인스턴스 (lazy)
        let cachedDiffData = null;   // Diff 연산 결과
        let diffViewMode = 'summary';// Diff 보기 상태 ('summary' 또는 'all')

        function startAutoSave() {
            setInterval(() => {
                if (editor && slug && AUTO_SAVE_KEY) {
                    const content = editor.getMarkdown();
                    if (content && content.trim().length > 0) {
                        localStorage.setItem(AUTO_SAVE_KEY, content);
                    }
                }
            }, 10000); // 10 seconds
        }

        async function checkAutoSave() {
            if (!AUTO_SAVE_KEY) return;

            const savedContent = localStorage.getItem(AUTO_SAVE_KEY);
            if (savedContent) {
                const currentContent = editor.getMarkdown();
                // If identical to what we just loaded, no need to ask, just clear it.
                if (savedContent.trim() === currentContent.trim()) {
                    localStorage.removeItem(AUTO_SAVE_KEY);
                    return;
                }

                const result = await Swal.fire({
                    title: '작성 중인 내용이 있습니다',
                    text: '이전에 작성하던 내용을 불러오시겠습니까?',
                    icon: 'info',
                    showCancelButton: true,
                    confirmButtonText: '예, 불러오기',
                    cancelButtonText: '아니오, 삭제'
                });

                if (result.isConfirmed) {
                    editor.setMarkdown(savedContent);
                    Swal.fire({
                        icon: 'success',
                        title: '불러옴',
                        text: '저장된 내용을 불러왔습니다.',
                        timer: 1000,
                        showConfirmButton: false
                    });
                } else {
                    localStorage.removeItem(AUTO_SAVE_KEY);
                }
            }
        }

        // ── Marked 설정 ──
        marked.use({
            renderer: {
                html(token) {
                    const htmlStr = typeof token === 'string' ? token : (token.text || token.raw || '');
                    return escapeHtml(htmlStr);
                }
            }
        });
        marked.setOptions({
            gfm: true,
            breaks: true,
            headerIds: true,
        });

        // ── 커스텀 프리뷰 렌더링 ──
        let previewDebounce;
        async function updateCustomPreview() {
            if (!editor) return;
            // 마크다운 프리뷰 영역만 대상으로 함 (위지윅 편집 영역은 건드리지 않음)
            const mdPreview = document.querySelector('#editor .toastui-editor-md-preview');
            if (!mdPreview) return;

            const defaultContents = mdPreview.querySelectorAll('.toastui-editor-contents:not(#custom-wiki-preview)');
            defaultContents.forEach(el => el.style.display = 'none');

            let customPreview = document.getElementById('custom-wiki-preview');
            if (!customPreview) {
                customPreview = document.createElement('div');
                customPreview.id = 'custom-wiki-preview';
                customPreview.className = 'toastui-editor-contents wiki-content';
                customPreview.style.padding = '18px';

                if (defaultContents.length > 0) {
                    defaultContents[0].parentNode.appendChild(customPreview);
                } else {
                    mdPreview.appendChild(customPreview);
                }
            }

            const md = editor.getMarkdown();
            await renderWikiContent(md, slug, 'custom-wiki-preview');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadConfig();
            // 인증 확인
            try {
                const res = await fetch('/api/me');
                if (res.ok) {
                    currentUser = await res.json();
                    document.querySelectorAll('#navUserName, #userName').forEach(el => el.textContent = currentUser.name);
                    document.querySelectorAll('#userAvatar').forEach(el => el.src = currentUser.picture || '');
                    document.querySelectorAll('#navLogin').forEach(el => el.classList.add('d-none'));
                    document.querySelectorAll('#navUser').forEach(el => el.classList.remove('d-none'));
                    if (currentUser.role === 'admin' || currentUser.role === 'super_admin') {
                        document.querySelectorAll('#navAdminConsole').forEach(el => el.classList.remove('d-none'));
                    }
                } else {
                    Swal.fire({
                        icon: 'warning',
                        title: '로그인 필요',
                        text: '문서를 편집하려면 로그인이 필요합니다.',
                        confirmButtonText: '로그인',
                    }).then(() => {
                        window.location.href = '/auth/google';
                    });
                    return;
                }
            } catch (e) {
                window.location.href = '/auth/google';
                return;
            }

            // slug 파싱
            const params = new URLSearchParams(window.location.search);
            slug = params.get('slug');
            if (slug) AUTO_SAVE_KEY = 'wiki_autosave_' + slug;

            if (!slug) {
                Swal.fire('오류', '문서 슬러그가 지정되지 않았습니다.', 'error').then(() => {
                    window.location.href = '/';
                });
                return;
            }

            // Toast UI Editor 초기화
            const isMobile = window.innerWidth <= 768;

            // 커스텀 툴바 버튼 생성
            function createCustomButton(text, tooltip, onClick) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'toastui-editor-toolbar-icons';
                btn.style.backgroundImage = 'none';
                btn.style.margin = '0';
                btn.style.fontSize = '12px';
                btn.style.fontWeight = '700';
                btn.style.color = 'var(--wiki-text)';
                btn.style.width = '32px';
                btn.style.padding = '0';
                btn.style.lineHeight = '24px';
                btn.style.display = 'inline-flex';
                btn.style.alignItems = 'center';
                btn.style.justifyContent = 'center';
                btn.innerHTML = text;
                btn.setAttribute('aria-label', tooltip);
                btn.addEventListener('click', onClick);
                return btn;
            }

            const wikiLinkBtn = createCustomButton('[[ ]]', '위키 링크 삽입', () => {
                editor.insertText('[[문서제목]]');
            });

            const transclusionBtn = createCustomButton('{{ }}', '틀 삽입', () => {
                editor.insertText('{{틀제목}}');
            });

            const mdiBtn = createCustomButton('MDI', 'MDI 아이콘 삽입', async () => {
                const { value: iconName } = await Swal.fire({
                    title: 'MDI 아이콘 삽입',
                    input: 'text',
                    inputLabel: '아이콘 이름 (예: dots-vertical)',
                    inputPlaceholder: 'dots-vertical',
                    showCancelButton: true
                });
                if (iconName) {
                    editor.insertText(`{mdi:${iconName}}`);
                }
            });

            const biBtn = createCustomButton('<i class="mdi mdi-bootstrap" style="font-size:16px"></i>', 'Bootstrap Icon 삽입', async () => {
                const { value: iconName } = await Swal.fire({
                    title: 'Bootstrap Icon 삽입',
                    input: 'text',
                    inputLabel: '아이콘 이름 (예: three-dots-vertical)',
                    inputPlaceholder: 'three-dots-vertical',
                    showCancelButton: true
                });
                if (iconName) {
                    editor.insertText(`{bi:${iconName}}`);
                }
            });

            const footnoteBtn = createCustomButton('[*]', '각주 삽입', () => {
                editor.insertText('[* 각주 내용]');
            });

            // 커스텀 이미지 업로드 버튼
            const imageUploadBtn = createCustomButton('<i class="mdi mdi-image-plus" style="font-size:16px"></i>', '이미지 업로드', () => {
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'image/jpeg,image/png,image/gif,image/webp,video/mp4,video/webm,video/ogg';
                fileInput.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    await handleImageUpload(file, (url, alt) => {
                        editor.insertText(`![${alt}](${url})`);
                    });
                };
                fileInput.click();
            });

            const isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

            editor = new toastui.Editor({
                el: document.querySelector('#editor'),
                height: '600px',
                initialEditType: 'markdown',
                previewStyle: isMobile ? 'tab' : 'vertical',
                language: 'ko-KR',
                theme: isDarkMode ? 'dark' : 'light',
                usageStatistics: false,
                hideModeSwitch: true,
                toolbarItems: [
                    ['heading', 'bold', 'italic', 'strike'],
                    ['hr', 'quote'],
                    ['ul', 'ol', 'task'],
                    ['table', 'link'],
                    [
                        { name: 'wikiLink', tooltip: '위키 링크 삽입', el: wikiLinkBtn },
                        { name: 'transclusion', tooltip: '틀 삽입', el: transclusionBtn },
                        { name: 'mdiIcon', tooltip: 'MDI 아이콘', el: mdiBtn },
                        { name: 'biIcon', tooltip: 'Bootstrap 아이콘', el: biBtn },
                        { name: 'footnote', tooltip: '각주 삽입', el: footnoteBtn },
                        { name: 'imageUpload', tooltip: '이미지 업로드', el: imageUploadBtn }
                    ],
                    ['code', 'codeblock'],
                    ['scrollSync']
                ],
                hooks: {
                    addImageBlobHook: async (blob, callback) => {
                        await handleImageUpload(blob, callback);
                    }
                }
            });

            // ── 실시간 프리뷰 ──
            editor.on('change', () => {
                clearTimeout(previewDebounce);
                previewDebounce = setTimeout(() => {
                    updateCustomPreview();
                }, 300);
            });
            setTimeout(updateCustomPreview, 300);

            startAutoSave();

            // Dark Mode Theme Toggle
            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                    if (!editor) return;
                    const el = document.querySelector('.toastui-editor-defaultUI');
                    if (el) {
                        if (e.matches) {
                            el.classList.add('toastui-editor-dark');
                        } else {
                            el.classList.remove('toastui-editor-dark');
                        }
                    }
                });
            }

            // 반응형 Preview Style 변경
            window.addEventListener('resize', () => {
                if (!editor) return;
                const isMobileNow = window.innerWidth <= 768;
                // 현재 스타일 확인은 어려우니 그냥 조건에 맞춰 변경 시도 (내부적으로 체크하길 기대하거나, 상태 변수를 둠)
                // Toast UI Editor API: changePreviewStyle(style)
                // 불필요한 호출 방지를 위해 상태 추적
                // 하지만 editor 인스턴스에서 현재 style을 바로 알기 어려울 수 있으니 간단히 적용.
                const targetStyle = isMobileNow ? 'tab' : 'vertical';
                editor.changePreviewStyle(targetStyle);
            });

            // 관리자면 Lock ui 노출
            if (currentUser.role === 'admin' || currentUser.role === 'super_admin') {
                document.getElementById('adminLockContainer').style.display = 'block';
            }

            // 관리자 전용 카테고리 목록 불러오기
            let adminCategories = [];
            try {
                const catRes = await fetch('/api/wiki/admin-categories');
                if (catRes.ok) {
                    const catData = await catRes.json();
                    adminCategories = catData.categories || [];
                }
            } catch (e) { }

            // 카테고리 입력 시 관리자 전용 여부 경고
            const catInput = document.getElementById('categoryInput');
            const catWarning = document.createElement('div');
            catWarning.className = 'text-danger small mt-1 d-none';
            catWarning.id = 'categoryWarning';
            catWarning.innerHTML = '<i class="mdi mdi-alert"></i> 이 카테고리는 관리자만 적용할 수 있습니다.';
            catInput.parentNode.appendChild(catWarning);

            catInput.addEventListener('input', () => {
                const isAdmin = currentUser.role === 'admin' || currentUser.role === 'super_admin';
                const cats = catInput.value.split(',').map(c => c.trim()).filter(c => c);
                const blockedCat = !isAdmin && cats.find(c => adminCategories.includes(c));
                if (blockedCat) {
                    catWarning.innerHTML = `<i class="mdi mdi-alert"></i> "${blockedCat}" 카테고리는 관리자만 적용할 수 있습니다.`;
                    catWarning.classList.remove('d-none');
                } else {
                    catWarning.classList.add('d-none');
                }
            });
            // 기존 문서 불러오기
            try {
                const res = await fetch(`/api/wiki/${encodeURIComponent(slug)}`);
                if (res.ok) {
                    const page = await res.json();
                    document.getElementById('titleInput').value = page.title;
                    if (page.category) document.getElementById('categoryInput').value = page.category;
                    if (page.redirect_to) document.getElementById('redirectInput').value = page.redirect_to;
                    if (page.is_locked) document.getElementById('isLockedCheck').checked = true;

                    originalContent = page.content;
                    editor.setMarkdown(page.content);

                    // redirect를 통해 조회된 경우, 실제 문서의 slug로 교체 (저장 시 올바른 slug 사용)
                    if (page.slug && page.slug !== slug) {
                        slug = page.slug;
                        AUTO_SAVE_KEY = 'wiki_autosave_' + slug;
                    }

                    pageVersion = page.version;
                    document.getElementById('editPageTitle').innerHTML =
                        `<i class="mdi mdi-pencil-box-multiple"></i> 편집: ${escapeHtml(page.title)}`;
                    document.title = `편집: ${page.title} - ${appConfig.wikiName}`;
                    document.getElementById('diffPreviewSection').style.display = 'block'; // 편집일 때만 노출
                    checkAutoSave();
                } else {
                    // 새 문서
                    originalContent = '';
                    document.getElementById('titleInput').value = decodeURIComponent(slug).replace(/-/g, ' ');
                    document.getElementById('editPageTitle').innerHTML =
                        `<i class="mdi mdi-plus-circle"></i> 새 문서 만들기`;
                    document.title = `새 문서 - ${appConfig.wikiName}`;

                    // 템플릿 불러오기 버튼 추가
                    const templateBtn = document.createElement('button');
                    templateBtn.className = 'btn btn-sm btn-outline-primary ms-3';
                    templateBtn.innerHTML = '<i class="mdi mdi-content-copy"></i> 템플릿으로 시작하기';
                    templateBtn.onclick = openTemplateModal;
                    document.getElementById('editPageTitle').appendChild(templateBtn);
                    checkAutoSave();
                }
            } catch (e) {
                // 새 문서로 취급
                originalContent = '';
            }

            // 변경 사항 미리보기 이벤트 연동
            const diffDetails = document.getElementById('diffPreviewDetails');
            if (diffDetails) {
                diffDetails.addEventListener('toggle', (e) => {
                    if (diffDetails.open) {
                        renderLocalDiff();
                    }
                });
            }
        });

        // ── 변경 사항 (내 수정본) 렌더링 ──
        function renderLocalDiff() {
            const container = document.getElementById('diffPreviewContainer');
            if (!container) return;

            const currentContent = editor ? editor.getMarkdown() : '';
            if (originalContent === currentContent) {
                container.innerHTML = '<span class="text-muted">변경 사항이 없습니다.</span>';
                return;
            }

            const diffData = Diff.diffLines(originalContent, currentContent);

            let diffHtml = '';
            const contextLines = 3; // 주변 3줄 보여주기

            diffData.forEach((part, i) => {
                if (part.added || part.removed) {
                    const cls = part.added ? 'diff-added' : 'diff-removed';
                    diffHtml += `<span class="${cls}">${escapeHtml(part.value)}</span>`;
                } else {
                    let lines = part.value.split('\n');
                    let hasTrailingNewline = false;
                    if (lines[lines.length - 1] === '') {
                        lines.pop(); // remove trailing empty string
                        hasTrailingNewline = true;
                    }

                    let showTop = (i !== 0); // Not first block
                    let showBottom = (i !== diffData.length - 1); // Not last block

                    if (!showTop && !showBottom) {
                        diffHtml += `<span>${escapeHtml(part.value)}</span>`;
                    } else if (lines.length <= contextLines * 2 + 1) {
                        diffHtml += `<span>${escapeHtml(part.value)}</span>`;
                    } else {
                        let topTxt = '';
                        let bottomTxt = '';
                        if (showTop) {
                            topTxt = lines.slice(0, contextLines).join('\n') + '\n';
                        }
                        if (showBottom) {
                            bottomTxt = lines.slice(-contextLines).join('\n') + (hasTrailingNewline ? '\n' : '');
                        }

                        if (showTop) diffHtml += `<span>${escapeHtml(topTxt)}</span>`;
                        diffHtml += `<span style="color: grey; font-style: italic; background: #e9ecef; border-radius: 4px; padding: 0 4px;">... (생략됨) ...</span>\n`;
                        if (showBottom) diffHtml += `<span>${escapeHtml(bottomTxt)}</span>`;
                    }
                }
            });

            container.innerHTML = diffHtml;
        }

        // ── 템플릿 모달 ──
        async function openTemplateModal() {
            try {
                Swal.fire({
                    title: '템플릿 불러오기',
                    html: `
                        <div class="input-group mb-3">
                            <input type="text" id="templateSearchInput" class="form-control" placeholder="템플릿 검색어 입력">
                            <button class="btn btn-primary" id="templateSearchBtn" type="button"><i class="mdi mdi-magnify"></i> 검색</button>
                        </div>
                        <div id="templateList" class="list-group text-start" style="max-height: 300px; overflow-y: auto;">
                            <!-- Templates will be rendered here -->
                        </div>
                    `,
                    showConfirmButton: false,
                    showCloseButton: true,
                    didOpen: async () => {
                        const searchInput = document.getElementById('templateSearchInput');
                        const searchBtn = document.getElementById('templateSearchBtn');
                        const listContainer = document.getElementById('templateList');

                        const renderTemplates = (templates) => {
                            listContainer.innerHTML = '';
                            if (!templates || templates.length === 0) {
                                listContainer.innerHTML = '<div class="p-3 text-center text-muted">검색 결과가 없습니다.</div>';
                                return;
                            }

                            templates.forEach(t => {
                                // 템플릿: 틀: template: 등의 접두사를 제외한 제목 표시
                                const displayTitle = t.title.replace(/^(틀|template|템플릿):/i, '');
                                const btn = document.createElement('button');
                                btn.className = 'list-group-item list-group-item-action';
                                btn.textContent = displayTitle;
                                btn.onclick = async () => {
                                    Swal.close();
                                    await applyTemplate(t.slug);
                                };
                                listContainer.appendChild(btn);
                            });
                        };

                        const fetchTemplates = async (query = '') => {
                            listContainer.innerHTML = '<div class="p-3 text-center"><span class="spinner-border spinner-border-sm text-primary" role="status"></span> 불러오는 중...</div>';
                            try {
                                const res = await fetch(`/api/wiki/templates${query ? `?q=${encodeURIComponent(query)}` : ''}`);
                                if (!res.ok) throw new Error('템플릿 목록을 불러올 수 없습니다.');
                                const data = await res.json();
                                renderTemplates(data.templates);
                            } catch (err) {
                                listContainer.innerHTML = `<div class="p-3 text-center text-danger">${err.message}</div>`;
                            }
                        };

                        // Initial fetch (10 latest templates)
                        await fetchTemplates();

                        // Search events
                        searchBtn.onclick = () => fetchTemplates(searchInput.value.trim());
                        searchInput.onkeypress = (e) => {
                            if (e.key === 'Enter') {
                                e.preventDefault();
                                fetchTemplates(searchInput.value.trim());
                            }
                        };
                    }
                });

                async function applyTemplate(selectedSlug) {
                    try {
                        const tRes = await fetch(`/api/wiki/${encodeURIComponent(selectedSlug)}`);
                        if (!tRes.ok) throw new Error('템플릿 내용을 불러올 수 없습니다.');
                        const tPage = await tRes.json();

                        if (editor.getMarkdown().trim()) {
                            const confirm = await Swal.fire({
                                title: '내용 덮어쓰기',
                                text: '현재 작성 중인 내용이 사라집니다. 계속하시겠습니까?',
                                icon: 'warning',
                                showCancelButton: true,
                                confirmButtonText: '예, 덮어씁니다',
                                cancelButtonText: '아니오'
                            });
                            if (!confirm.isConfirmed) return;
                        }

                        editor.setMarkdown(tPage.content);
                        Swal.fire('완료', '템플릿을 불러왔습니다.', 'success');
                    } catch (err) {
                        Swal.fire('오류', err.message, 'error');
                    }
                }
            } catch (err) {
                Swal.fire('오류', err.message, 'error');
            }
        }

        // ── 저장 ──
        async function savePage() {
            const title = document.getElementById('titleInput').value.trim();
            const category = document.getElementById('categoryInput').value.trim();
            const redirect_to = document.getElementById('redirectInput').value.trim();
            const is_locked = document.getElementById('isLockedCheck').checked ? 1 : 0;
            const content = editor.getMarkdown();
            const summary = document.getElementById('summaryInput').value.trim();

            if (!title) {
                Swal.fire('오류', '제목을 입력해주세요.', 'warning');
                return;
            }

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 저장 중...';

            let isSuccess = false;

            try {
                const body = {
                    title,
                    content,
                    category: category || undefined,
                    redirect_to: redirect_to || undefined,
                    is_locked,
                    summary: summary || undefined,
                };

                if (pageVersion !== null) {
                    body.expected_version = pageVersion;
                }

                const res = await fetch(`/api/wiki/${encodeURIComponent(slug)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                if (res.status === 409) {
                    const data = await res.json();

                    // 버전 충돌 (Optimistic Locking Failure)
                    showConflictModal(data);

                    saveBtn.disabled = false;
                    saveBtn.innerHTML = '<i class="mdi mdi-check"></i> 저장';
                    return;
                }

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || '저장 실패');
                }

                if (AUTO_SAVE_KEY) localStorage.removeItem(AUTO_SAVE_KEY);

                isSuccess = true;
                Swal.fire({
                    icon: 'success',
                    title: '저장 완료!',
                    text: '문서가 성공적으로 저장되었습니다.',
                    timer: 1500,
                    showConfirmButton: false,
                }).then(() => {
                    window.location.href = `/wiki/${encodeURIComponent(slug)}`;
                });

            } catch (err) {
                Swal.fire('오류', err.message, 'error');
            } finally {
                if (!isSuccess) {
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = '<i class="mdi mdi-check"></i> 저장';
                }
            }
        }

        // ── 충돌 해결 UI ──
        function showConflictModal(data) {
            pageVersion = data.current_version;
            const serverContent = data.content || '';
            const localContent = editor.getMarkdown();

            // ── 최신본: raw div에 텍스트 세팅 ──
            document.getElementById('conflict-server-raw').textContent = serverContent;
            // 뷰 상태 초기화 (raw로 리셋)
            document.getElementById('conflict-server-raw').style.display = 'block';
            document.getElementById('conflict-server-preview').style.display = 'none';
            document.getElementById('serverViewToggle').innerHTML = '<i class="mdi mdi-eye"></i> 프리뷰 보기';
            serverViewMode = 'raw';
            // viewer가 이미 있으면 내용만 갱신
            if (serverViewer) {
                serverViewer.setMarkdown(serverContent);
            }

            // ── 내 수정본: conflict-ui가 block된 후 에디터 초기화 ──
            document.getElementById('conflict-ui').style.display = 'block';
            document.getElementById('main-editor-container').style.display = 'none';
            window.scrollTo(0, 0);

            if (!conflictEditor) {
                const isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                conflictEditor = new toastui.Editor({
                    el: document.querySelector('#conflict-local-editor'),
                    height: '500px',
                    initialEditType: 'markdown',
                    previewStyle: 'tab',          // 충돌 UI는 공간 절약을 위해 tab
                    initialValue: localContent,
                    language: 'ko-KR',
                    theme: isDarkMode ? 'dark' : 'light',
                    usageStatistics: false,
                    hideModeSwitch: true,
                    toolbarItems: [               // 최소한의 툴바만
                        ['heading', 'bold', 'italic', 'strike'],
                        ['ul', 'ol', 'task'],
                        ['table', 'link'],
                        ['code', 'codeblock'],
                    ],
                });
            } else {
                conflictEditor.setMarkdown(localContent);
            }

            // ── Diff 렌더링 (요약/전체 보기를 위해 데이터 보관 후 렌더링 호출) ──
            cachedDiffData = Diff.diffLines(serverContent, localContent);

            // 토글 버튼 상태 초기화
            diffViewMode = 'summary';
            document.getElementById('diffViewToggle').innerHTML = '<i class="mdi mdi-filter-variant"></i> 전체 보기';

            renderDiffView();
        }

        function toggleDiffView() {
            diffViewMode = (diffViewMode === 'summary') ? 'all' : 'summary';
            const btn = document.getElementById('diffViewToggle');
            if (diffViewMode === 'all') {
                btn.innerHTML = '<i class="mdi mdi-filter"></i> 요약 보기';
            } else {
                btn.innerHTML = '<i class="mdi mdi-filter-variant"></i> 전체 보기';
            }
            renderDiffView();
        }

        function renderDiffView() {
            if (!cachedDiffData) return;
            let diffHtml = '';

            if (diffViewMode === 'all') {
                cachedDiffData.forEach(part => {
                    const cls = part.added ? 'diff-added' : part.removed ? 'diff-removed' : '';
                    diffHtml += `<span class="${cls}">${escapeHtml(part.value)}</span>`;
                });
            } else {
                const contextLines = 2; // 보여줄 위/아래 줄 수

                cachedDiffData.forEach((part, i) => {
                    if (part.added || part.removed) {
                        const cls = part.added ? 'diff-added' : 'diff-removed';
                        diffHtml += `<span class="${cls}">${escapeHtml(part.value)}</span>`;
                    } else {
                        // 변경되지 않은 텍스트
                        let lines = part.value.split('\n');
                        let hasTrailingNewline = false;
                        if (lines[lines.length - 1] === '') {
                            lines.pop(); // 맨 끝 빈 요소 제거
                            hasTrailingNewline = true;
                        }

                        let showTop = (i !== 0); // 이전 요소가 수정사항이면 앞부분 노출
                        let showBottom = (i !== cachedDiffData.length - 1); // 다음 요소가 수정사항이면 뒷부분 노출

                        if (!showTop && !showBottom) {
                            // 수정사항 전혀 없을 때
                            diffHtml += `<span>${escapeHtml(part.value)}</span>`;
                        } else if (lines.length <= contextLines * 2 + 1) {
                            // 줄 수가 적으면 모두 표시
                            diffHtml += `<span>${escapeHtml(part.value)}</span>`;
                        } else {
                            let topTxt = '';
                            let bottomTxt = '';
                            if (showTop) {
                                topTxt = lines.slice(0, contextLines).join('\n') + '\n';
                            }
                            if (showBottom) {
                                bottomTxt = lines.slice(-contextLines).join('\n') + (hasTrailingNewline ? '\n' : '');
                            }

                            if (showTop) diffHtml += `<span>${escapeHtml(topTxt)}</span>`;
                            diffHtml += `<span style="color: grey; font-style: italic; background: #e9ecef; border-radius: 4px; padding: 0 4px;">... (생략됨) ...</span>\n`;
                            if (showBottom) diffHtml += `<span>${escapeHtml(bottomTxt)}</span>`;
                        }
                    }
                });
            }
            document.getElementById('conflict-diff-view').innerHTML = diffHtml;
        }

        function toggleServerView() {
            const raw = document.getElementById('conflict-server-raw');
            const preview = document.getElementById('conflict-server-preview');
            const btn = document.getElementById('serverViewToggle');

            if (serverViewMode === 'raw') {
                if (!serverViewer) {
                    const isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                    serverViewer = toastui.Editor.factory({
                        el: preview,
                        viewer: true,
                        initialValue: raw.textContent,
                        language: 'ko-KR',
                        theme: isDarkMode ? 'dark' : 'light',
                    });
                } else {
                    serverViewer.setMarkdown(raw.textContent); // 최신 값 반영
                }
                raw.style.display = 'none';
                preview.style.display = 'block';
                btn.innerHTML = '<i class="mdi mdi-code-tags"></i> Raw 보기';
                serverViewMode = 'preview';
            } else {
                raw.style.display = 'block';
                preview.style.display = 'none';
                btn.innerHTML = '<i class="mdi mdi-eye"></i> 프리뷰 보기';
                serverViewMode = 'raw';
            }
        }

        function resolveConflict() {
            // textarea 대신 conflictEditor에서 값 읽기
            const finalContent = conflictEditor ? conflictEditor.getMarkdown() : '';

            // Update main editor
            editor.setMarkdown(finalContent);

            // Hide Conflict UI
            document.getElementById('conflict-ui').style.display = 'none';
            document.getElementById('main-editor-container').style.display = 'block';

            // Retry Save
            savePage();
        }

        function cancelConflict() {
            Swal.fire({
                title: '충돌 해결 취소',
                text: '편집 내용을 버리고 최신 버전으로 새로고침 하시겠습니까?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: '새로고침 (내용 버림)',
                cancelButtonText: '계속 해결하기'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.reload();
                }
            });
        }


        // ── 미디어 업로드 처리 (Toast UI Hook) ──
        async function handleImageUpload(blob, callback) {
            if (!blob) return;

            if (blob.size > 15 * 1024 * 1024) {
                Swal.fire('오류', '파일 크기는 15MB 이하만 허용됩니다.', 'warning');
                return;
            }

            // 사용자에게 파일명 입력 요청
            const originalName = blob.name || 'image';
            const nameWithoutExt = originalName.replace(/\.[^.]+$/, '');
            const { value: customFilename, isConfirmed } = await Swal.fire({
                title: '이미지 파일명 입력',
                input: 'text',
                inputLabel: '파일명 (확장자 제외)',
                inputValue: nameWithoutExt,
                inputPlaceholder: '파일명을 입력하세요',
                showCancelButton: true,
                confirmButtonText: '업로드',
                cancelButtonText: '취소',
                inputValidator: (value) => {
                    if (!value || !value.trim()) {
                        return '파일명을 입력해주세요.';
                    }
                }
            });

            if (!isConfirmed || !customFilename) return;

            const formData = new FormData();
            formData.append('file', blob);
            formData.append('filename', customFilename.trim());

            try {
                const res = await fetch('/api/media', {
                    method: 'POST',
                    body: formData,
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.error || '업로드 실패');
                }

                const data = await res.json();

                // callback(url, altText)
                callback(data.url, data.filename);

            } catch (err) {
                console.error(err);
                Swal.fire('오류', err.message, 'error');
            }
        }

        // ── 취소 ──
        function cancelEdit() {
            if (editor && editor.getMarkdown().trim()) {
                // Check if content changed?
                // Toast UI doesn't track dirty state easily.
                // Just ask if there is content.
                Swal.fire({
                    title: '편집을 취소하시겠습니까?',
                    text: '저장하지 않은 변경사항이 사라집니다.',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: '나가기',
                    cancelButtonText: '계속 편집',
                }).then(result => {
                    if (result.isConfirmed) {
                        window.location.href = slug ? `/wiki/${encodeURIComponent(slug)}` : '/';
                    }
                });
            } else {
                window.location.href = slug ? `/wiki/${encodeURIComponent(slug)}` : '/';
            }
        }

    </script>
