name = "cloudwiki"
main = "src/index.ts"
compatibility_date = "2026-03-01"

[assets]
directory = "public"
binding = "ASSETS"
run_worker_first = ["/", "/wiki/*", "/mypage", "/profile/*", "/search", "/admin-media", "/sitemap.xml", "/robots.txt"]

[[d1_databases]]
binding = "DB"
database_name = "cloudwiki"
database_id = "4312cdfc-73a8-47f1-a5ea-dbd3efca5350"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "cloudwiki"

[[kv_namespaces]]
binding = "KV"
id = "c318df6c9f244489afba8670b0309e06"

[observability]
enabled = true
head_sampling_rate = 1.0

[vars]
GOOGLE_CLIENT_ID = "541709689530-1rl2sv6lm53b3kaf3s6ec9qurl6eanbn.apps.googleusercontent.com"
GOOGLE_REDIRECT_URI = "https://wiki.vialinks.xyz/auth/google/callback"
# GOOGLE_CLIENT_SECRET은 Cloudflare Workers 대시보드에서 Secret에 저장
TURNSTILE_SITE_KEY = "0x4AAAAAABkrf7cd8w3d1nxe"
# TURNSTILE_SECRET_KEY 는 Cloudflare Workers 대시보드에서 Secret에 저장
MEDIA_PUBLIC_URL = "https://wiki.vialinks.xyz/media"
MAX_UPLOAD_SIZE = "15728640" # 15MB
WIKI_NAME = "Cloudwiki"
WIKI_LOGO_URL = "/favicon.jpg"
WIKI_FAVICON_URL = "/favicon.ico" #아이콘과 로고를 교체하세요
SUPER_ADMIN_EMAILS = "eoe253326@gmail.com, gcrcdi@gmail.com" # 콤마로 구분하여 여러 명 지정 가능
SELECTED_ICONS_ONLY = "false" # false시 모든 아이콘 허용 
MCP_MODE = "open" # MCP 서버 모드: "disabled" (사용 안 함, 기본값), "open" (전체 개방)
ALLOW_CRAWL = "true" # robots.txt/사이트맵 관리: "true" (크롤링 허용, 사이트맵 자동 생성), "false" (전체 차단, 사이트맵 비활성화)
CUSTOM_HEADER = """

"""
# 구글 애널리스틱스, 애드센스등 외부 스크립트 삽입용

[triggers]
crons = ["0 0 * * *"] # 매일 자정 (UTC 기준)에 실행


