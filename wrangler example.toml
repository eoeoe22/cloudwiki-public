name = "cloudwiki" # 변경가능
main = "src/index.ts"
compatibility_date = "2026-03-01"

# Vite 클라이언트 빌드를 deploy 전에 자동 실행한다
# - 입력: src/client/*.ts
# - 출력: public/dist/*.js (Cloudflare Workers Assets로 서빙됨)
[build]
command = "npm run build"

[assets]
directory = "public"
binding = "ASSETS"
run_worker_first = ["/", "/w/*", "/wiki/*", "/mypage", "/edit", "/memo", "/profile/*", "/search", "/admin", "/admin-media", "/admin-bulk-manage", "/tickets", "/tickets/*", "/setup-profile", "/error", "/sitemap.xml", "/robots.txt", "/login", "/recent-changes", "/explore", "/all", "/components-json-builder", "/auth/discord", "/auth/discord/callback", "/auth/refresh-picture", "/blog", "/blog/*", "/blog-edit", "/sw.js"]


[[d1_databases]]
binding = "DB"
database_name = ""
database_id = ""

[[r2_buckets]]
binding = "MEDIA"
bucket_name = ""

[[kv_namespaces]]
binding = "KV"
id = ""

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "" # 원하는 이름으로 수정

# === 관리자 잡 러너 Durable Object ===
# AdminJobDO: 최고 관리자 전용 싱글턴 잡 러너 (역링크 전수 재인덱싱 / 대량 이동 / 대량 삭제).
# SQLite-backed(new_sqlite_classes) 라 Workers 프리 티어에서도 동작한다. 블록 그대로 사용.
[[durable_objects.bindings]]
name = "ADMIN_JOB_DO"
class_name = "AdminJobDO"

[[migrations]]
tag = "v3-admin-job"
new_sqlite_classes = ["AdminJobDO"]

[observability]
enabled = true
head_sampling_rate = 1.0

[vars]
WIKI_HOME_PAGE = "" #위키 홈페이지로 쓸 문서 제목
# === AdminJobDO 잡 러너 — alarm 틱(=호출 1회)당 서브리퀘스트(D1 쿼리+R2/Cache op) 예산 ===
# Workers 무료 플랜은 호출당 50 한도라 40, 유료 플랜은 1,000 한도라 950 권장.
JOB_SUBREQUEST_BUDGET = "40"

# 활성화할 공급자를 쉼표로 구분하여 나열 (예: "google,discord")
# 주의: 이미 사용자가 가입시 이용한 공급자를 목록에서 제거하면 오류가 발생합니다.
AUTH_PROVIDERS = "google,discord"
# Google OAuth
GOOGLE_CLIENT_ID = ""
GOOGLE_REDIRECT_URI = "https://도메인/auth/google/callback"
# GOOGLE_CLIENT_SECRET은 Cloudflare Workers 대시보드에서 비밀 변수로 저장

# Discord OAuth
DISCORD_CLIENT_ID = ""
DISCORD_REDIRECT_URI = "https://도메인/auth/discord/callback"
# DISCORD_CLIENT_SECRET → Cloudflare Workers 대시보드에서 비밀 변수로 저장

TURNSTILE_SITE_KEY = ""
# TURNSTILE_SECRET_KEY 는 Cloudflare Workers 대시보드에서 Secret에 저장

# CF_ACCOUNT_ID, CF_API_TOKEN 미설정시 작동에는 문제가 없으나, 통계 조회 불가.
# CF_ACCOUNT_ID, CF_API_TOKEN은 Cloudflare Workers 대시보드에서 Secret에 저장 (Analytics Engine 통계 조회용)


MEDIA_PUBLIC_URL = "https://도메인/media"
MAX_UPLOAD_SIZE = "15728640" # 15MB, 변경 가능
WIKI_NAME = "Testwiki" # 변경 가능, 사이트 전역에 적용되는 위키 이름

# Public 폴더에서 해당 이미지들을 교체하세요.
WIKI_LOGO_URL = "/favicon.jpg"
WIKI_FAVICON_URL = "/favicon.ico"

SUPER_ADMIN_EMAILS = "test@example.com, test2@example.com" # 콤마로 구분하여 여러 명 지정 가능
SELECTED_ICONS_ONLY = "false" # false 권장, true시 public/icons.json에 있는 아이콘만 자동완성에 들어감. (성능 개선 용도가 아님)
# 아이콘 선택 json 추출기 : https://vialinks.xyz/p/icons
MCP_MODE = "open" # MCP 서버 모드: "disabled" (사용 안 함, 기본값), "open" (전체 개방)
ALLOW_CRAWL = "true" # robots.txt/사이트맵 관리: "true" (크롤링 허용, 사이트맵 자동 생성, 봇 정책은 src/robots-txt.ts 직접 수정), "false" (전체 차단, 사이트맵 비활성화)
ENABLE_CONCURRENT_EDIT_DETECTION = "true" # 문서 동시편집 감지 (KV)
EDIT_REQUEST_ENABLED = "false" # 편집 요청: "true" 시 ACL 미달 사용자의 편집을 편집 요청으로 보류(검토자 승인/반려). edit_acl_min_age_days > 0 필요.
WIKI_VISIBILITY = "open" # 문서 열람 권한: "open" (비로그인 사용자도 열람 가능), "closed" (로그인 필요)
LAYOUT_MODE = "default" # 문서 조회 페이지 레이아웃 모드: "default" (우측 사이드바에 트렌딩/최근 변경), "left-toc" (좌측 사이드바에 현재 문서 목차, 우측 숨김), "right-toc"(좌측 사이드바에 현재 목차, 좌측 숨김) "docs" (좌측=슬래시 그룹 문서 트리, 우측=현재 문서 목차, 기술 문서 스타일), "wide" (좌우 사이드바 숨김, 본문 중앙 풀폭 몰입 읽기, 목차는 플로팅 버튼)
WIKI_THEME = "default" # 컬러 테마(스킨): "default" (빌트인 색). 추가 스킨은 scripts/themes/<이름>.mjs 파일로 정의(index.mjs 에 등록) 후 이름 지정 시 빌드 타임에 색 토큰 교체. 멀티 스킨(WIKI_THEMES) 모드에서는 사용자 미선택 시 기본 선택 스킨으로 쓰인다. 스킨이 다크 모드 전용(darkOnly, 예: "astro")이면 활성인 동안 밝기가 다크로 고정되고 라이트/다크 토글이 숨겨진다.
WIKI_THEMES = "default,astro,vector,bootstrap,via" # 사용자 선택형 멀티 스킨 허용 목록(콤마 구분, THEMES 키, 예: "default,astro,vector"). 2개 이상이면 각 스킨을 html[data-wiki-theme] 로 스코프 베이킹하고 개인 설정 모달에서 사용자가 전환(브라우저 한정). 비우면 단일 스킨 모드(WIKI_THEME 만 적용).
EMAIL_RESTRICTION = "" # 이메일 도메인 가입 제한 설정: "" 또는 "none" (제한 없음), "whitelist" (허용 도메인만), "blacklist" (차단 도메인 제외)
EMAIL_LIST = "example.com, example.example.com" # 콤마로 구분된 도메인 목록 (EMAIL_RESTRICTION이 whitelist 또는 blacklist일 때 사용)
ENABLED_EXTENSIONS = "" # 확장 기능 활성화, 쉼표로 구분. 예 : "freq,extension1,extension2"


# 로그인 페이지에서 노출할 메시지 및 약관
LOGIN_MESSAGE = ""
# 로그인 페이지에서 해당하는 버튼 클릭시 아래에 설정된 문서를 위키 문법 렌더링 없이 텍스트 원문으로 표시
PRIVACY_POLICY = "위키/개인정보처리방침"
TERMS_OF_SERVICE = "위키/이용약관"
WIKI_SYNTAX = "위키/위키 문법 가이드" # 문법 가이드 문서 제목 입력, 에디터 페이지와 MCP 도구에서 문법 도움말은 해당 문서로 안내됨.

# 구글 애널리스틱스, 애드센스등 외부 스크립트 삽입용
CUSTOM_HEADER = """

"""

# 사이드바 / 푸터 내용 커스터마이징
# 위키에 내장된 빌더(배포 도메인 기준 /components-json-builder)에서 제작 후
# 나온 결과물 json을 붙여넣으세요. 예: https://도메인/components-json-builder

SIDEBAR = """

"""
FOOTER = """

"""

# === Discord Webhook ===
# DISCORD_COMMUNITY_WEBHOOK_URL, DISCORD_ADMIN_WEBHOOK_URL 은 Workers 대시보드에서 시크릿으로 설정
# URL 이 비어있으면 해당 채널은 자동 비활성. EVENTS 가 비어있으면 모든 이벤트 차단(긴급 음소거).
DISCORD_ADMIN_EVENTS = "signup_pending,signup_rejected,ticket_create,ticket_status,user_ban,user_role_change,super_admin_action,pending_edit"
DISCORD_COMMUNITY_EVENTS = "user_joined,discussion_create,announcement_publish"
WIKI_PUBLIC_BASE_URL = "https://도메인"

# === Web Push (VAPID) ===
# VAPID 공개키 (P-256 uncompressed point, base64url 65바이트). 클라이언트에 노출됨.
# 비밀키 는 wrangler secret 으로 등록:
#   wrangler secret put VAPID_PRIVATE_KEY
# 빈 값이면 Web Push 기능이 자동 비활성화됩니다.
VAPID_PUBLIC_KEY = ""
VAPID_SUBJECT = "" # 예: mailto:admin@example.com


[triggers]
crons = ["0 0 * * *"] # 매일 자정 (UTC 기준)에 실행
